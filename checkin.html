<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#5b8def">
<title>콕매치 민턴LIVE 출석</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f6f8fc;--card:#fff;--line:#e3e9f3;--txt:#18202d;--mut:#6f7a8a;
  --blue:#5b8def;--blue2:#eaf1fe;--green:#35a56a;--red:#e35b55;--amber:#f0a73a;
  --shadow:0 18px 45px rgba(35,55,90,.12);
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:'Noto Sans KR',system-ui,-apple-system,sans-serif;
  background:linear-gradient(180deg,#edf4ff 0%,#f8fafc 46%,#fff 100%);
  color:var(--txt);
}
.wrap{max-width:720px;margin:0 auto;padding:18px 14px 34px}
.hero{
  padding:22px 18px;
  border:1px solid rgba(91,141,239,.22);
  border-radius:26px;
  background:linear-gradient(135deg,#ffffff 0%,#eef5ff 100%);
  box-shadow:var(--shadow);
}
.eyebrow{font-size:13px;font-weight:900;color:#4f78c9;letter-spacing:.02em}
h1{margin:8px 0 8px;font-size:28px;line-height:1.18}
.sub{margin:0;color:var(--mut);font-size:15px;line-height:1.55}
.notice{
  margin:14px 0 0;
  padding:11px 13px;
  border-radius:18px;
  background:rgba(255,255,255,.8);
  border:1px solid var(--line);
  color:#344055;
  font-size:13px;
  line-height:1.5;
}
.last-sent{
  margin:12px 0 0;
  padding:11px 13px;
  border-radius:17px;
  border:1px solid #bbf7d0;
  background:#f0fdf4;
  color:#166534;
  font-size:14px;
  font-weight:900;
  line-height:1.45;
}
.last-sent b{color:#0f5132}
.last-sent.hidden{display:none}
.vote-summary{
  margin:12px 0 0;
  display:grid;
  grid-template-columns:1.35fr repeat(3,minmax(0,.88fr));
  gap:7px;
}
.vote-chip{
  padding:9px 8px;
  border:1px solid var(--line);
  border-radius:15px;
  background:rgba(255,255,255,.82);
  text-align:center;
}
.vote-chip b{display:block;font-size:18px;line-height:1;color:#315fb2}
.vote-chip span{display:block;margin-top:4px;font-size:11px;font-weight:900;color:var(--mut)}
.vote-chip.total{
  text-align:left;
  padding:11px 12px;
  background:linear-gradient(135deg,#eef5ff 0%,#fff 100%);
  border-color:#bfdbfe;
}
.vote-chip.total b{font-size:24px;color:#315fb2}
.vote-chip.total span{font-size:12px;color:#4f78c9}
.vote-chip.ready{border-color:#bbf7d0;background:#f0fdf4}
.vote-chip.ready b{color:#16834f}
.vote-chip.warn{border-color:#fed7aa;background:#fff7ed}
.vote-chip.warn b{color:#b45309}
.vote-summary.hidden{display:none}
.panel{
  margin-top:16px;
  padding:14px;
  border:1px solid var(--line);
  border-radius:24px;
  background:rgba(255,255,255,.86);
  box-shadow:0 10px 28px rgba(35,55,90,.08);
}
.event-panel.hidden{display:none}
.event-title{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  margin-bottom:10px;
}
.event-title b{font-size:18px}
.event-title span{font-size:12px;color:var(--mut);font-weight:900}
.event-score{
  display:grid;
  grid-template-columns:1fr auto 1fr;
  gap:8px;
  align-items:stretch;
  margin-bottom:10px;
}
.event-team{
  padding:12px 10px;
  border-radius:18px;
  border:1px solid rgba(91,141,239,.24);
  background:#eef5ff;
  text-align:center;
}
.event-team.red{border-color:#ffd3cf;background:#fff1f0}
.event-team span{display:block;font-size:12px;color:var(--mut);font-weight:900}
.event-team b{display:block;margin-top:4px;font-size:32px;line-height:1;color:#315fb2}
.event-team.red b{color:#bd3b35}
.event-vs{display:flex;align-items:center;justify-content:center;color:var(--mut);font-size:12px;font-weight:900}
.event-chip{
  display:inline-flex;
  align-items:center;
  padding:6px 9px;
  border-radius:999px;
  background:#f2f5fa;
  color:#4b5668;
  font-size:12px;
  font-weight:900;
  margin:0 5px 6px 0;
}
.event-chip.gold{background:#fff5df;color:#9a610b}
.event-section-title{
  margin:10px 0 6px;
  font-size:12px;
  font-weight:900;
  color:#6b7280;
}
.event-list{display:flex;flex-direction:column;gap:7px;margin-top:8px}
.event-row{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  padding:12px;
  border:1px solid var(--line);
  border-radius:16px;
  background:#fff;
}
.event-row-main{
  min-width:0;
  flex:1;
  display:grid;
  grid-template-columns:auto minmax(0,1fr);
  gap:10px;
  align-items:center;
}
.event-court-badge{
  min-width:62px;
  min-height:54px;
  padding:8px 9px;
  border-radius:16px;
  background:#eaf1fe;
  color:#315fb2;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  font-weight:900;
  line-height:1;
}
.event-court-badge b{font-size:23px;line-height:1}
.event-court-badge span{font-size:12px;margin-top:4px}
.event-row.next .event-court-badge{background:#edf7ff;color:#2563eb}
.event-row.soon .event-court-badge,.event-row.due .event-court-badge{background:#fee2e2;color:#b91c1c}
.event-match-title{
  font-size:15px;
  font-weight:900;
  color:#273244;
  line-height:1.25;
  margin-bottom:5px;
}
.event-teams{
  display:flex;
  flex-direction:column;
  gap:3px;
}
.event-teamline{
  min-width:0;
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  align-items:center;
  gap:8px;
  font-size:18px;
  font-weight:900;
  color:#111827;
  line-height:1.28;
  letter-spacing:-.02em;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}
.event-team-player{
  min-width:0;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}
.event-teamline.b{color:#374151}
.event-row.next{
  border-color:#bfdbfe;
  background:linear-gradient(135deg,#f8fbff 0%,#fff 100%);
}
.event-row.next:first-child{
  border-color:#5b8def;
  box-shadow:0 8px 20px rgba(91,141,239,.14);
}
.event-row.soon,.event-row.due{
  border-color:#fecaca;
  background:#fff7f7;
}
.event-row strong{display:block;font-size:15px}
.event-row small{display:block;color:var(--mut);font-size:12px;margin-top:2px}
.event-row .event-cue{color:#315fb2;font-weight:900}
.event-row.due .event-cue,.event-row.soon .event-cue{color:#b91c1c}
.event-row em{
  flex-shrink:0;
  font-style:normal;
  font-size:13px;
  font-weight:900;
  color:#4f78c9;
  background:#eaf1fe;
  border-radius:999px;
  padding:8px 10px;
  align-self:center;
  white-space:nowrap;
}
.event-complete-action{
  margin-top:9px;
  display:flex;
  gap:7px;
  flex-wrap:wrap;
}
.event-complete-btn,.event-undo-btn{
  width:100%;
  border:1.5px solid #bfdbfe;
  border-radius:14px;
  padding:12px 13px;
  background:#eef5ff;
  color:#315fb2;
  font-size:15px;
  font-weight:1000;
  font-family:inherit;
  cursor:pointer;
  box-shadow:0 8px 18px rgba(91,141,239,.12);
}
.event-complete-btn.due,.event-complete-btn.soon{
  border-color:#fecaca;
  background:#fff1f2;
  color:#b91c1c;
}
.event-undo-btn{
  border-color:#fed7aa;
  background:#fff7ed;
  color:#9a610b;
}
.event-row.soon em,.event-row.due em{
  color:#fff;
  background:#dc2626;
  animation:eventPulse 1.2s ease-in-out infinite;
}
@keyframes eventPulse{
  0%,100%{box-shadow:0 0 0 0 rgba(220,38,38,.22)}
  50%{box-shadow:0 0 0 6px rgba(220,38,38,.08)}
}
@media(max-width:430px){
  .event-row{padding:11px 10px;gap:8px}
  .event-row-main{grid-template-columns:auto minmax(0,1fr);gap:8px}
  .event-court-badge{min-width:56px;min-height:50px;border-radius:14px}
  .event-court-badge b{font-size:21px}
  .event-teamline{font-size:17px}
  .event-row em{font-size:12px;padding:7px 8px}
}
.toolbar{
  display:flex;
  gap:8px;
  align-items:center;
  margin-bottom:12px;
}
.member-fold{
  border:1px solid var(--line);
  border-radius:18px;
  background:#fff;
  overflow:hidden;
}
.member-fold summary{
  cursor:pointer;
  list-style:none;
  padding:13px 14px;
  font-size:15px;
  font-weight:900;
  color:#344055;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
}
.member-fold summary::-webkit-details-marker{display:none}
.member-fold summary:after{
  content:'보기';
  flex-shrink:0;
  font-size:12px;
  color:#4f78c9;
  background:#eaf1fe;
  border-radius:999px;
  padding:5px 9px;
}
.member-fold[open] summary{border-bottom:1px solid var(--line)}
.member-fold[open] summary:after{content:'접기'}
.member-fold #players{padding:0 10px 10px}
.my-card-wrap{margin-bottom:12px}
.my-card-wrap.hidden{display:none}
.my-card{
  border:1.5px solid #c8dbfb;
  border-radius:24px;
  background:linear-gradient(180deg,#fff 0%,#f8fbff 100%);
  box-shadow:0 14px 34px rgba(35,55,90,.085);
  padding:17px;
}
.my-card-head{display:flex;align-items:center;gap:13px;margin-bottom:13px}
.my-avatar{
  width:58px;height:58px;border-radius:20px;
  display:flex;align-items:center;justify-content:center;
  background:#eaf1fe;color:#315fb2;border:1px solid #bfdbfe;
  font-size:23px;font-weight:1000;flex-shrink:0;
}
.my-card-name{font-size:24px;font-weight:1000;letter-spacing:-.055em;line-height:1.16;color:#18202d}
.my-card-state{font-size:13px;font-weight:1000;color:#16834f;margin-top:5px}
.my-status-chips{
  display:flex;
  flex-wrap:wrap;
  gap:6px;
  margin-top:8px;
}
.my-status-chip{
  display:inline-flex;
  align-items:center;
  min-height:28px;
  padding:6px 9px;
  border-radius:999px;
  border:1px solid var(--line);
  background:#fff;
  color:var(--mut);
  font-size:12px;
  font-weight:1000;
  line-height:1;
  white-space:nowrap;
}
.my-status-chip.on{
  border-color:#cfeeda;
  background:#f4fbf7;
  color:#3f7c58;
  box-shadow:0 0 0 4px rgba(145,209,170,.12);
}
.my-status-chip.warn{
  border-color:#ead2a8;
  background:#fff9ef;
  color:#8c672b;
}
.my-action-panel{border:1px solid #e3eaf5;border-radius:22px;background:#fff;padding:10px;box-shadow:inset 0 1px 0 rgba(255,255,255,.8);}
.my-card .game-request{margin-top:10px}
.pick-guide{
  border:1px dashed #c8dbfb;border-radius:20px;padding:14px;
  background:#f8fbff;color:#4f78c9;font-size:14px;font-weight:900;line-height:1.5;
}
.other-roster-title{margin:12px 0 8px;color:#6f7a8a;font-size:12px;font-weight:1000;letter-spacing:.04em}
.version-chip{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  margin-top:10px;
  padding:5px 9px;
  border:1px solid var(--line);
  border-radius:999px;
  background:rgba(255,255,255,.76);
  color:#8a94a5;
  font-size:11px;
  font-weight:900;
  line-height:1;
}
.search{
  flex:1;
  height:46px;
  padding:0 14px;
  border:1px solid var(--line);
  border-radius:16px;
  font-size:16px;
  background:#fff;
}
.pill{
  padding:9px 12px;
  border-radius:999px;
  background:var(--blue2);
  color:#406fc7;
  font-weight:900;
  font-size:13px;
  white-space:nowrap;
}
.player{
  padding:14px;
  border:1px solid var(--line);
  border-radius:20px;
  background:#fff;
  margin-top:10px;
}
.player.locked{border-color:#f3cf8f;background:#fffaf0}
.player.recent{border-color:#9bd7ff;box-shadow:0 0 0 4px rgba(91,141,239,.14)}
.phead{
  display:flex;
  justify-content:space-between;
  gap:10px;
  align-items:flex-start;
  margin-bottom:10px;
}
.name{font-size:18px;font-weight:900}
.meta{color:var(--mut);font-size:13px;margin-top:3px}
.badge{
  padding:7px 10px;
  border-radius:999px;
  background:#f2f5fa;
  color:#4b5668;
  font-weight:900;
  font-size:12px;
  white-space:nowrap;
}
.badge.selected{background:#eaf1fe;color:#315fb2}
.buttons{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}
.main-actions{margin-top:10px;grid-template-columns:repeat(3,minmax(0,1fr))}
.my-action-panel .main-actions{margin-top:0;gap:8px}
.status-section{
  margin-top:9px;
  border:1px solid var(--line);
  border-radius:17px;
  background:#fbfcff;
  overflow:hidden;
}
.status-section.active{
  border-color:#9bd7ff;
  background:#f4f8ff;
  box-shadow:0 0 0 3px rgba(91,141,239,.10);
}
.status-section summary{
  cursor:pointer;
  padding:11px 12px;
  font-size:14px;
  font-weight:900;
  color:#344055;
  list-style:none;
  display:flex;
  justify-content:space-between;
  gap:8px;
  align-items:center;
}
.status-section summary::-webkit-details-marker{display:none}
.status-section summary small{
  color:var(--mut);
  font-size:12px;
  font-weight:900;
  white-space:nowrap;
}
.compact-actions{
  padding:0 12px 12px;
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:8px;
}
.game-request{
  margin-top:10px;
  border:1px solid var(--line);
  border-radius:18px;
  background:#fbfcff;
  overflow:hidden;
}
.game-request summary{
  cursor:pointer;
  padding:11px 12px;
  font-size:14px;
  font-weight:900;
  color:#344055;
  list-style:none;
}
.game-request summary::-webkit-details-marker{display:none}
.request-body{padding:0 12px 12px;display:grid;grid-template-columns:1fr 1fr;gap:8px}
.request-field{display:flex;flex-direction:column;gap:5px;min-width:0}
.request-field label{font-size:12px;font-weight:900;color:var(--mut);padding-left:2px}
.request-field.full{grid-column:1/-1}
.request-body select,.request-body input{
  height:42px;
  border:1px solid var(--line);
  border-radius:13px;
  padding:0 10px;
  font:inherit;
  background:#fff;
  min-width:0;
}
.request-body input{grid-column:1/-1}
.request-body button{grid-column:1/-1;background:var(--blue);color:#fff}
.request-status{
  margin:0 12px 12px;
  padding:10px 11px;
  border-radius:14px;
  border:1px solid #bfdbfe;
  background:#eff6ff;
  color:#1d4ed8;
  font-size:13px;
  font-weight:900;
  line-height:1.45;
}
.request-status.done{
  border-color:#bbf7d0;
  background:#f0fdf4;
  color:#166534;
}
.request-status.cancelled{
  border-color:#fed7aa;
  background:#fff7ed;
  color:#9a3412;
}
.request-status small{display:block;margin-top:3px;color:inherit;opacity:.72;font-size:12px;font-weight:800}
button{
  appearance:none;
  border:1px solid var(--line);
  border-radius:15px;
  padding:13px 10px;
  font:inherit;
  font-weight:900;
  background:#fff;
  color:#273246;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:2px;
  min-height:52px;
  transition:.15s ease;
}
button small{display:block;font-size:11px;font-weight:700;line-height:1.25;color:rgba(39,50,70,.62)}
button.primary small{color:rgba(255,255,255,.82)}
button:disabled{opacity:.55}
button.active{
  background:linear-gradient(135deg,#35c978,#159456);
  color:#fff;
  border-color:#14864e;
  box-shadow:0 9px 22px rgba(21,148,86,.28);
}
button.active small{color:rgba(255,255,255,.86)}
button.sent:not(.applied){background:linear-gradient(135deg,#35a56a,#1e7b4b);border-color:#187347;color:#fff}
.status-icon{display:block;font-size:16px;line-height:1;margin-bottom:3px;opacity:.88}
.main-actions .status-btn{min-height:54px;font-size:16px;}
.main-actions .status-btn span{font-size:16px;}
.my-action-panel .status-btn{
  min-height:74px;
  border-radius:20px;
  border:1.5px solid #d8e2ef;
  background:#fff;
  color:#344055;
  box-shadow:0 8px 18px rgba(35,55,90,.045);
}
.my-action-panel .status-btn.active{
  background:linear-gradient(135deg,#35c978,#159456);
  color:#fff;
  border-color:#159456;
  box-shadow:0 10px 24px rgba(21,148,86,.25);
}
.my-action-panel .status-btn.sent:not(.applied){
  background:linear-gradient(135deg,#5b8def,#4778d8);
  border-color:#4778d8;
  color:#fff;
}
.my-action-panel .status-btn span:last-child{font-size:17px;font-weight:1000;letter-spacing:-.02em}
.empty{
  padding:28px 14px;
  text-align:center;
  color:var(--mut);
  line-height:1.55;
}
.toast{
  position:fixed;
  left:14px;right:14px;bottom:16px;
  max-width:680px;margin:0 auto;
  padding:14px 16px;
  border-radius:18px;
  background:#18202d;
  color:#fff;
  font-weight:900;
  text-align:center;
  box-shadow:0 16px 44px rgba(0,0,0,.26);
  transform:translateY(120%);
  transition:.22s ease;
  z-index:10;
}
.toast.show{transform:translateY(0)}
@media (min-width:620px){.buttons:not(.main-actions){grid-template-columns:repeat(3,minmax(0,1fr))}}
@media(max-width:520px){.request-body,.compact-actions{grid-template-columns:1fr}.vote-summary{grid-template-columns:1.15fr repeat(3,minmax(0,.8fr));gap:5px}.vote-chip{padding:8px 5px}.vote-chip.total{padding:9px 10px}.vote-chip.total b{font-size:22px}.vote-chip b{font-size:16px}.vote-chip span{font-size:10px}}

/* ── 민턴LIVE calm design layer: 가안 톤 적용 ── */
:root{
  --bg:#f7f9fd;--card:#fff;--line:#e4ebf5;--txt:#263041;--mut:#7a8494;
  --blue:#7fa8ee;--blue2:#f3f7ff;--green:#91d1aa;--red:#e99da1;--amber:#c99a58;
  --blue-deep:#436eb8;--green-deep:#3f7c58;--red-deep:#a85f63;--amber-soft:#fff9ef;
  --shadow:0 14px 34px rgba(35,55,90,.075);
}
body{
  background:linear-gradient(180deg,#fff 0%,#f1f6ff 260px,#f7f9fd 100%);
  color:var(--txt);
}
.wrap{max-width:430px;padding:18px 14px 38px;}
.hero,
.panel,
.my-card,
.member-fold,
.player,
.event-row{
  border-color:var(--line);
  border-radius:24px;
  background:rgba(255,255,255,.93);
  box-shadow:var(--shadow);
}
.hero{
  background:rgba(255,255,255,.92);
  padding:18px 16px;
}
.eyebrow{
  color:var(--blue-deep);
  letter-spacing:.14em;
}
h1{color:var(--txt);letter-spacing:-.055em;}
.sub,
.notice,
.event-title span,
.event-chip,
.event-section-title,
.meta,
.member-fold summary,
.event-row small{color:var(--mut);}
.notice{
  border-color:var(--line);
  background:#fbfdff;
  border-radius:18px;
}
.last-sent{
  border-color:#cfeeda;
  background:#f4fbf7;
  color:var(--green-deep);
  box-shadow:none;
}
.vote-chip{
  border-color:var(--line);
  border-radius:18px;
  background:#fbfdff;
}
.vote-chip.total{
  border-color:#c8dbfb;
  background:var(--blue2);
}
.vote-chip b,
.vote-chip.total b,
.event-court-badge,
.event-row .event-cue{color:var(--blue-deep);}
.vote-chip.total span{color:var(--blue-deep);}
.vote-chip.ready{
  border-color:#cfeeda;
  background:#f4fbf7;
}
.vote-chip.ready b{color:var(--green-deep);}
.vote-chip.warn{

  return map[key]||statusLabel(key);
}
function normalizeText(s){
  return String(s||'').toLowerCase().replace(/\s+/g,'');
}
function chosungText(s){
  return String(s||'').split('').map(ch=>{
    const code=ch.charCodeAt(0)-0xac00;
    if(code>=0&&code<=11171)return CHO[Math.floor(code/588)]||ch;
    return ch;
  }).join('');
}
function playerMatchesQuery(p,q){
  const needle=normalizeText(q);
  if(!needle)return true;
  const name=normalizeText(p.name);

function getLastSent(){
  try{return JSON.parse(localStorage.getItem(lastKey())||'null');}catch(e){return null;}
}
function getLastComplete(){
  try{
    const v=JSON.parse(localStorage.getItem(LAST_COMPLETE_KEY)||'null');
    return v&&Date.now()-(v.savedAt||0)<45000?v:null;
  }catch(e){return null;}
}
function setLastComplete(v){
  try{localStorage.setItem(LAST_COMPLETE_KEY,JSON.stringify({...v,savedAt:Date.now()}));}catch(e){}
}

  try{localStorage.removeItem(LAST_COMPLETE_KEY);}catch(e){}
}
function setLastSent(req){
  const savedAt=Date.now();
  try{localStorage.setItem(lastKey(),JSON.stringify({...req,savedAt}));}catch(e){}
  if(req&&req.playerName){
    try{localStorage.setItem('kokmatch_live_viewer_last',JSON.stringify({name:req.playerName,memberId:req.playerId||'',source:'checkin',checkinId,savedAt}));}catch(e){}
  }
}
function latestStatusRequest(playerId){
  return statusRequests
    .filter(r=>r.playerId===playerId&&r.status&&!r.ignoredAt&&r.type!=='reservation')
    .sort((a,b)=>(b.createdAt||0)-(a.createdAt||0))[0]||null;
}
function getSelectedStatus(p){
  const req=latestStatusRequest(p.id);
  const last=getLastSent();
  let selected=p.status;
  let ts=p.lastStatusAt||0;
  if(req&&(req.createdAt||0)>=ts){
    selected=req.status;
    ts=req.createdAt||0;
  }
  if(last&&last.playerId===p.id&&(last.savedAt||0)>=ts){
    selected=last.status;
  }
  return selected;
}

  const started=players.filter(p=>['wait','playing'].includes(p.status)).length;
  return {
    started,
    wait:count('wait'),
    playing:count('playing'),
    rest:count('rest'),
    invited:count('invited')
  };
}

  if(row&&row.endAt){
    return Math.max(0,Math.ceil((Number(row.endAt)-Date.now())/60000));
  }
  const n=Number(row?.remain);
  if(!Number.isFinite(n))return '진행중';
  return n;
}
function remainText(row){
  const n=remainMinutes(row);
  if(typeof n==='string')return n;
  return n<=0?'종료임박':`약 ${n}분 남음`;
}

function renderEvent(){

    </div>`:'';
    return `<div class="event-row next ${esc(m.cueState||'')}">
    <div class="event-row-main">

        <div class="event-teams next-teams">${nextTeamLine(m)}</div>
        ${action}
      </div>
    </div>
  </div>`;
  }).join('');
  const undo=lastComplete?`<div class="event-row">
    <div class="event-row-main">
      <div class="event-court-badge"><b>↩</b><span>복구</span></div>
      <div>
        <div class="event-match-title">방금 코트 종료를 요청했어요</div>

        <div class="event-complete-action"><button class="event-undo-btn" onclick="sendCourtCompleteUndo('${esc(lastComplete.token)}')">되돌리기 요청</button></div>
      </div>
    </div>
    <em>45초</em>
  </div>`:'';
  el.innerHTML=`<div class="event-title"><b>민턴LIVE 현황</b><span>${esc(updated)} 업데이트</span></div>
    <div>${summary}</div>
    ${next||undo?`<div class="event-section-title">다음 대진</div><div class="event-list">${undo}${next}</div>`:''}
    ${active?`<div class="event-section-title">진행중 코트</div><div class="event-list">${active}</div>`:''}`;
}
function render(){

  const box=document.getElementById('players');

  if(!session){

    sub.textContent='출석 링크를 확인하고 있습니다.';

  renderVoteSummary();

    .filter(p=>query||!selectedId||p.id!==selectedId)

  sub.textContent=selectedPlayer
    ? `${session.title||'민턴LIVE'} · 시작 ${summary?.started||0}명`
    : `시작 ${summary?.started||0}명 · 내 이름을 찾아주세요`;
  count.textContent=`${query?matchedPlayers.length:allPlayers.length}명`;
  if(!players.length){
    box.className='empty';box.textContent=selectedId&&!query?'다른 선수 명단은 접어두었습니다. 필요하면 명단을 열어 확인하세요.':'검색된 선수가 없습니다.';
    return;
  }
  box.className='';
  box.innerHTML=players.map(p=>playerCardHtml(p,sendingKey?'disabled':'')).join('');
}
function statusButtonSpec(p,key){
  const selected=getSelectedStatus(p);
  if(key==='toggle'){
    if(selected==='wait')return {key:'wait',label:'종료',action:'done'};
    if(selected==='done')return {key:'done',label:'다시 시작',action:'wait'};
    return {key:'wait',label:'시작',action:'wait'};
  }
  return {key,label:compactLabel(key),action:key};
}
function statusButtons(p,keys,disabled){
  const existing=new Set((session?.statuses||[]).map(s=>s.key));
  const selected=getSelectedStatus(p);
  return keys.filter(k=>k==='toggle'||existing.has(k)).map(k=>{
    const spec=statusButtonSpec(p,k);
    const last=getLastSent();
    const applied=p.status===spec.key;
    const sent=last&&last.playerId===p.id&&last.status===spec.key;
    const active=selected===spec.key;
    const cls=['status-btn',active?'active':'',applied?'applied':'',sent&&!applied?'sent':''].filter(Boolean).join(' ');
    const iconMap={wait:'▶',rest:'☕',done:'⏹'};
    const icon=iconMap[spec.key]||'•';
    return `<button class="${cls}" ${disabled} onclick="sendStatus('${esc(p.id)}','${esc(spec.action)}')"><span class="status-icon">${esc(icon)}</span><span>${esc(spec.label)}</span></button>`;
  }).join('');
}
function statusSection(p,title,keys,disabled){
  const existing=new Set((session?.statuses||[]).map(s=>s.key));
  const usable=keys.filter(k=>existing.has(k));
  if(!usable.length)return '';
  const selected=getSelectedStatus(p);
  const active=usable.includes(selected);
  const state=active?compactLabel(selected):'선택';
  return `<details class="status-section ${active?'active':''}" ${active?'open':''}>
    <summary><span>${esc(title)}</span><small>${esc(state)}</small></summary>
    <div class="compact-actions">${statusButtons(p,usable,disabled)}</div>
  </details>`;
}
function playerCardHtml(p,disabled,opts={}){
  const locked=!!p.locked;
  const last=getLastSent();
  const recent=last&&last.playerId===p.id;
  const selected=getSelectedStatus(p);
  const requested=!!latestStatusRequest(p.id);
  const highlighted=opts.forceHighlight||recent||requested;
  const disabledAttr=disabled?'disabled':'';
  const mainButtons=statusButtons(p,MAIN_STATUS_KEYS,disabledAttr);
  const subSection=statusSection(p,'상태 변경',SUB_STATUS_KEYS,disabledAttr);
  return `<article class="player ${locked?'locked':''} ${highlighted?'recent':''}">
    <div class="phead">
      <div>
        <div class="name">${esc(p.name)}${p.isGuest?' <span class="meta">게스트</span>':''}</div>
        <div class="meta">현재 ${esc(compactLabel(selected))} · ${p.games||0}게임${locked?' · 경기중 예약 반영':''}</div>
      </div>
      <div class="badge ${highlighted?'selected':''}">${highlighted?'전송완료':(locked?'경기중':compactLabel(selected))}</div>
    </div>
    <div class="buttons main-actions">${mainButtons}</div>
    ${subSection}
    ${gameRequestBox(p,disabledAttr)}
  </article>`;
}
function renderMyCard(last,players){
  const el=document.getElementById('myCard');
  if(!el)return;
  const fold=document.getElementById('playerListFold');
  const selected=last&&last.playerId?players.find(p=>p.id===last.playerId):null;

      <div class="buttons main-actions">${mainButtons}</div>
      ${subSection}
      ${gameRequestBox(selected,disabledAttr)}

}
function requestPlayerOptions(selfId,selected){
  const players=(session?.players||[]).filter(p=>p.id!==selfId&&p.status!=='invited'&&p.status!=='done');
  return '<option value="">선택 안 함</option>'+players.map(p=>{
    const reserveHint=p.locked||p.status==='playing'?' · 예약':'';
    return `<option value="${esc(p.id)}" ${p.id===selected?'selected':''}>${esc(p.name)} · ${esc(compactLabel(p.status))}${reserveHint}</option>`;
  }).join('');
}
function playerReservationRequests(playerId){
  return reservationRequests
    .filter(r=>r.playerId===playerId||(r.team1||[]).includes(playerId)||(r.team2||[]).includes(playerId))
    .sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));
}
function reservationRequestLabel(req){
  const names=id=>{
    const p=(session?.players||[]).find(x=>x.id===id);
    return p?.name||'선수';
  };
  const a=(req.team1||[]).map(names).join(' · ');
  const b=(req.team2||[]).map(names).join(' · ');
  return req.mode==='match'?`${a} vs ${b}`:`${a} 같은 편`;
}
function gameRequestBox(p,disabled){
  if(p.status==='invited'||getSelectedStatus(p)==='done')return '';
  const reqs=playerReservationRequests(p.id);
  const pending=reqs.find(r=>!r.appliedAt&&!r.ignoredAt);
  const recentCancelled=reqs.find(r=>r.ignoredAt&&Date.now()-(r.ignoredAt||0)<10*60*1000);
  const recentApplied=reqs.find(r=>r.appliedAt&&Date.now()-(r.appliedAt||0)<5*60*1000);
  if(pending){
    return `<details class="game-request" open>
      <summary>게임 신청</summary>
      <div class="request-status">신청 접수됨 · 자동 반영 대기
        <small>${esc(reservationRequestLabel(pending))}</small>
      </div>
    </details>`;
  }
  const cancelledHtml=recentCancelled?`<div class="request-status cancelled">최근 신청이 자동 취소됐습니다.<small>${esc(recentCancelled.reason||reservationRequestLabel(recentCancelled))}</small></div>`:'';
  const recentHtml=recentApplied?`<div class="request-status done">최근 신청이 자동 접수됐습니다.<small>${esc(reservationRequestLabel(recentApplied))}</small></div>`:'';
  return `<details class="game-request">
    <summary>게임 신청</summary>
    ${cancelledHtml||recentHtml}
    <div class="request-body">
      <div class="request-field full"><label>같은 편으로 뛸 선수</label><select id="reqPartner_${esc(p.id)}">${requestPlayerOptions(p.id,'')}</select></div>
      <div class="request-field"><label>상대 1명 선택</label><select id="reqOpp1_${esc(p.id)}">${requestPlayerOptions(p.id,'')}</select></div>
      <div class="request-field"><label>상대 1명 더 선택</label><select id="reqOpp2_${esc(p.id)}">${requestPlayerOptions(p.id,'')}</select></div>
      <button ${disabled} onclick="sendGameRequest('${esc(p.id)}')">게임 신청 보내기</button>
    </div>
  </details>`;
}
async function sendStatus(playerId,status){
  if(isSampleMode()){
    if(!session||sendingKey)return;
    if(sessionExpired())return showEndedLink();
    const p=(session.players||[]).find(x=>x.id===playerId);
    if(!p)return toast('선수를 찾지 못했습니다.');
    if(status==='done'&&!confirm(`${p.name}님, 오늘 운동을 종료할까요?\n종료하면 이후 대진 후보에서 빠집니다.`))return;
    p.status=status;
    p.statusLabel=compactLabel(status);
    p.locked=false;
    if(status==='wait')p.joinedAt=p.joinedAt||Date.now();
    const req={
      playerId:p.id,
      playerName:p.name,
      status,
      statusLabel:compactLabel(status),
      createdAt:Date.now(),
      source:'sample-checkin'
    };
    setLastSent(req);
    toast(`${p.name} · ${compactLabel(status)} 반영 완료`);
    render();
    return;
  }
  if(!db||!checkinId||!session||sendingKey)return;
  if(sessionExpired())return showEndedLink();
  const p=(session.players||[]).find(x=>x.id===playerId);
  if(!p)return toast('선수를 찾지 못했습니다.');
  if(status==='done'&&!confirm(`${p.name}님, 오늘 운동을 종료할까요?\n종료하면 이후 대진 후보에서 빠집니다.`))return;
  const last=getLastSent();
  if(last&&last.playerId===p.id&&last.status===status&&Date.now()-(last.savedAt||0)<10000){
    return toast('방금 같은 상태를 전송했어요.');
  }
  sendingKey=playerId+'_'+status;
  render();
  const req={
    playerId:p.id,
    playerName:p.name,
    status,
    statusLabel:compactLabel(status),
    createdAt:Date.now(),
    source:'member-checkin'
  };
  try{
    await db.ref(checkinPath()+'/requests').push(req);
    setLastSent(req);
    toast(`${p.name} · ${compactLabel(status)} 전송 완료`);
    if(p.locked&&['rest','done'].includes(status)){
      setTimeout(()=>location.reload(),900);
    }
  }catch(e){
    toast('전송에 실패했습니다. 잠시 후 다시 눌러주세요.');
  }finally{
    sendingKey='';
    render();
  }
}
async function sendCourtComplete(queueId,matchId,court){
  if(!db||!checkinId||!session||sendingKey)return;
  if(sessionExpired())return showEndedLink();
  const last=getLastSent();
  if(!last||!last.playerId)return toast('먼저 본인 이름에서 시작 버튼을 눌러 주세요.');
  const courtText=court?`${court}코트`:'해당 코트';
  if(!confirm(`${courtText} 경기가 끝났나요?\n확인하면 이 다음 대진이 코트에 들어갑니다.`))return;
  const token='ct_'+Date.now().toString(36)+'_'+Math.random().toString(36).slice(2,7);
  const req={
    type:'court-complete',
    queueId,
    matchId,
    court,
    token,
    playerId:last.playerId,
    playerName:last.playerName,
    createdAt:Date.now(),
    source:'member-court-complete'
  };
  sendingKey='court_complete_'+matchId;
  renderEvent();
  try{
    await db.ref(checkinPath()+'/requests').push(req);
    setLastComplete({token,matchId,queueId,court});
    toast(`${courtText} 종료 요청 완료`);
  }catch(e){
    toast('종료 요청 전송에 실패했습니다.');
  }finally{
    sendingKey='';
    renderEvent();
  }
}
async function sendCourtCompleteUndo(token){
  if(!db||!checkinId||!session||sendingKey)return;
  if(!token)return;
  const req={type:'court-complete-undo',token,createdAt:Date.now(),source:'member-court-complete-undo'};
  sendingKey='court_undo';
  try{
    await db.ref(checkinPath()+'/requests').push(req);
    clearLastComplete();
    toast('되돌리기 요청을 보냈어요.');
  }catch(e){
    toast('되돌리기 요청에 실패했습니다.');
  }finally{
    sendingKey='';
    renderEvent();
  }
}
async function sendGameRequest(playerId){
  if(!db||!checkinId||!session||sendingKey)return;
  if(sessionExpired())return showEndedLink();
  const p=(session.players||[]).find(x=>x.id===playerId);
  if(!p)return toast('선수를 찾지 못했습니다.');
  const partnerId=document.getElementById('reqPartner_'+playerId)?.value||'';
  const opp1=document.getElementById('reqOpp1_'+playerId)?.value||'';
  const opp2=document.getElementById('reqOpp2_'+playerId)?.value||'';
  const ids=[playerId,partnerId,opp1,opp2].filter(Boolean);
  if(!partnerId)return toast('같은 편으로 뛸 선수를 선택해 주세요.');
  if(new Set(ids).size!==ids.length)return toast('같은 선수가 중복 선택됐어요.');
  if((opp1&&!opp2)||(!opp1&&opp2))return toast('상대를 지정하려면 2명을 모두 선택해 주세요.');
  const mode=opp1&&opp2?'match':'pair';
  const req={
    type:'reservation',
    mode,
    playerId:p.id,
    playerName:p.name,
    team1:[p.id,partnerId],
    team2:mode==='match'?[opp1,opp2]:[],
    createdAt:Date.now(),
    source:'member-game-request'
  };
  sendingKey=playerId+'_reservation';
  render();
  try{
    const ref=db.ref(checkinPath()+'/requests').push();
    await ref.set(req);
    reservationRequests.push({key:ref.key,...req});
    toast(mode==='match'?'4명 경기 신청을 보냈어요.':'같은 편 신청을 보냈어요.');
  }catch(e){
    toast('전송에 실패했습니다. 잠시 후 다시 눌러주세요.');
  }finally{
    sendingKey='';
    render();
  }
}
function boot(){
  const vEl=document.getElementById('appVersion');
  if(vEl)vEl.textContent='v'+APP_VERSION;
  checkinId=qs('id');
  if(!checkinId){
    document.getElementById('players').textContent='출석 링크가 올바르지 않습니다.';
    return;
  }
  if(new URLSearchParams(location.search).has('sample')){
    session=sampleSession();
    render();
    if(eventTimer)clearInterval(eventTimer);
    eventTimer=setInterval(renderEvent,10000);
    return;
  }
  try{
    firebase.initializeApp(FB_CONFIG);
    db=firebase.database();
  }catch(e){
    document.getElementById('players').textContent='서버 연결에 실패했습니다.';
    return;
  }
  db.ref(checkinPath()+'/session').on('value',snap=>{
    session=snap.val();
    if(!session){
      renderEvent();
      const fold=document.getElementById('playerListFold');
      if(fold)fold.open=true;
      document.getElementById('sessionSub').textContent='종료된 출석 링크입니다.';
      document.getElementById('players').className='empty';
      document.getElementById('players').textContent='관리자가 링크를 종료했거나 아직 명단을 공유하지 않았습니다.';
      return;
    }
    if(sessionExpired()){
      showEndedLink();
      return;
    }
    render();
  });
  db.ref(checkinPath()+'/requests').on('value',snap=>{
    const raw=snap.val()||{};
    const rows=Object.keys(raw).map(key=>({key,...raw[key]}));
    statusRequests=rows
      .filter(r=>!r.ignoredAt&&r.type!=='reservation'&&r.status)
      .sort((a,b)=>(a.createdAt||0)-(b.createdAt||0));
    reservationRequests=rows
      .filter(r=>r.type==='reservation'&&(!r.ignoredAt||Date.now()-(r.ignoredAt||0)<10*60*1000))
      .sort((a,b)=>(a.createdAt||0)-(b.createdAt||0));
    render();
  });
  document.getElementById('search').addEventListener('input',e=>{
    query=e.target.value.trim();
    const fold=document.getElementById('playerListFold');
    if(fold&&query)fold.open=true;
    render();
  });
  if(!eventTimer){
    eventTimer=setInterval(()=>renderEvent(),5000);
  }
  document.addEventListener('visibilitychange',()=>{
    if(!document.hidden)renderEvent();
  });
}
boot();

<script>
(function(){
  if(!('serviceWorker' in navigator))return;
  let refreshing=false;
  navigator.serviceWorker.addEventListener('controllerchange',()=>{
    if(refreshing)return;
    refreshing=true;
    location.reload();
  });
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('sw.js').then(reg=>{
      reg.update().catch(()=>{});
      if(reg.waiting)reg.waiting.postMessage('skipWaiting');
      reg.addEventListener('updatefound',()=>{
        const nw=reg.installing;
        if(!nw)return;
        nw.addEventListener('statechange',()=>{
          if(nw.state==='installed'&&navigator.serviceWorker.controller){
            nw.postMessage&&nw.postMessage('skipWaiting');
          }
        });
      });
    }).catch(()=>{});
    document.addEventListener('visibilitychange',()=>{
      if(document.visibilityState==='visible'){
        navigator.serviceWorker.getRegistration().then(r=>r&&r.update()).catch(()=>{});
      }
    });
  });
})();
</script>
