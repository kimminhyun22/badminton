<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#5b8def">
<title>콕매치 민턴LIVE 내 경기</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f6f8fc;--card:#fff;--line:#e3e9f3;--txt:#18202d;--mut:#6f7a8a;
  --blue:#5b8def;--blue2:#eaf1fe;--green:#35a56a;--red:#e35b55;--amber:#f0a73a;
  --shadow:0 18px 45px rgba(35,55,90,.12);
  --safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:'Noto Sans KR',system-ui,-apple-system,sans-serif;
  background:linear-gradient(180deg,#edf4ff 0%,#f8fafc 46%,#fff 100%);
  color:var(--txt);
}
.wrap{max-width:720px;margin:0 auto;padding:18px 14px 34px}
.hero{
  padding:22px 18px;
  border:1px solid rgba(91,141,239,.22);
  border-radius:26px;
  background:linear-gradient(135deg,#ffffff 0%,#eef5ff 100%);
  box-shadow:var(--shadow);
}
.hero.hidden{display:none}
.eyebrow{font-size:13px;font-weight:900;color:#4f78c9;letter-spacing:.02em}
h1{margin:8px 0 8px;font-size:28px;line-height:1.18}
.sub{margin:0;color:var(--mut);font-size:15px;line-height:1.55}
.notice{
  margin:14px 0 0;
  padding:11px 13px;
  border-radius:18px;
  background:rgba(255,255,255,.8);
  border:1px solid var(--line);
  color:#344055;
  font-size:13px;
  line-height:1.5;
}
.last-sent{
  margin:12px 0 0;
  padding:11px 13px;
  border-radius:17px;
  border:1px solid #bbf7d0;
  background:#f0fdf4;
  color:#166534;
  font-size:14px;
  font-weight:900;
  line-height:1.45;
}
.last-sent b{color:#0f5132}
.last-sent.hidden{display:none}
.vote-summary{
  margin:12px 0 0;
  display:grid;
  grid-template-columns:1.35fr repeat(2,minmax(0,.88fr));
  gap:7px;
}
.vote-chip{
  padding:9px 8px;
  border:1px solid var(--line);
  border-radius:15px;
  background:rgba(255,255,255,.82);
  text-align:center;
}
.vote-chip b{display:block;font-size:18px;line-height:1;color:#315fb2}
.vote-chip span{display:block;margin-top:4px;font-size:11px;font-weight:900;color:var(--mut)}
.vote-chip.total{
  text-align:left;
  padding:11px 12px;
  background:linear-gradient(135deg,#eef5ff 0%,#fff 100%);
  border-color:#bfdbfe;
}
.vote-chip.total b{font-size:24px;color:#315fb2}
.vote-chip.total span{font-size:12px;color:#4f78c9}
.vote-chip.ready{border-color:#bbf7d0;background:#f0fdf4}
.vote-chip.ready b{color:#16834f}
.vote-chip.warn{border-color:#fed7aa;background:#fff7ed}
.vote-chip.warn b{color:#b45309}
.vote-summary.hidden{display:none}
.panel{
  margin-top:16px;
  padding:14px;
  border:1px solid var(--line);
  border-radius:24px;
  background:rgba(255,255,255,.86);
  box-shadow:0 10px 28px rgba(35,55,90,.08);
}
.event-panel.hidden{display:none}
.event-title{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  margin-bottom:10px;
}
.event-title b{font-size:18px}
.event-title span{font-size:12px;color:var(--mut);font-weight:900}
.event-score{
  display:grid;
  grid-template-columns:1fr auto 1fr;
  gap:8px;
  align-items:stretch;
  margin-bottom:10px;
}
.event-team{
  padding:12px 10px;
  border-radius:18px;
  border:1px solid rgba(91,141,239,.24);
  background:#eef5ff;
  text-align:center;
}
.event-team.red{border-color:#ffd3cf;background:#fff1f0}
.event-team span{display:block;font-size:12px;color:var(--mut);font-weight:900}
.event-team b{display:block;margin-top:4px;font-size:32px;line-height:1;color:#315fb2}
.event-team.red b{color:#bd3b35}
.event-vs{display:flex;align-items:center;justify-content:center;color:var(--mut);font-size:12px;font-weight:900}
.event-chip{
  display:inline-flex;
  align-items:center;
  padding:6px 9px;
  border-radius:999px;
  background:#f2f5fa;
  color:#4b5668;
  font-size:12px;
  font-weight:900;
  margin:0 5px 6px 0;
}
.event-chip.gold{background:#fff5df;color:#9a610b}
.event-section-title{
  margin:10px 0 6px;
  font-size:12px;
  font-weight:900;
  color:#6b7280;
}
.event-list{display:flex;flex-direction:column;gap:7px;margin-top:8px}
.event-row{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  padding:12px;
  border:1px solid var(--line);
  border-radius:16px;
  background:#fff;
}
.event-row-main{
  min-width:0;
  flex:1;
  display:grid;
  grid-template-columns:auto minmax(0,1fr);
  gap:10px;
  align-items:center;
}
.event-row-main.full{grid-template-columns:minmax(0,1fr)}
.event-court-badge{
  min-width:62px;
  min-height:54px;
  padding:8px 9px;
  border-radius:16px;
  background:#eaf1fe;
  color:#315fb2;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  font-weight:900;
  line-height:1;
}
.event-court-badge b{font-size:23px;line-height:1}
.event-court-badge span{font-size:12px;margin-top:4px}
.event-row.next .event-court-badge{background:#edf7ff;color:#2563eb}
.event-row.soon .event-court-badge,.event-row.due .event-court-badge{background:#fee2e2;color:#b91c1c}
.event-match-title{
  font-size:15px;
  font-weight:900;
  color:#273244;
  line-height:1.25;
  margin-bottom:5px;
}
.event-teams{
  display:flex;
  flex-direction:column;
  gap:3px;
}
.event-teamline{
  min-width:0;
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  align-items:center;
  gap:8px;
  font-size:18px;
  font-weight:900;
  color:#111827;
  line-height:1.28;
  letter-spacing:-.02em;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}
.event-team-player{
  min-width:0;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}
.event-teamline.b{color:#374151}
.event-teams.active-teams{
  display:block;
  min-width:0;
}
.event-active-line{
  min-width:0;
  display:grid;
  grid-template-columns:minmax(0,1fr) 34px minmax(0,1fr);
  align-items:center;
  gap:8px;
}
.event-active-pair{
  min-width:0;
  display:grid;
  gap:2px;
  justify-items:center;
  padding:7px 6px;
  border:1px solid rgba(91,141,239,.22);
  border-radius:15px;
  background:#f8fbff;
}
.event-active-pair.b{
  border-color:#dbe4f2;
  background:#fff;
}
.event-active-player{
  max-width:100%;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
  color:#111827;
  font-size:16px;
  font-weight:1000;
  line-height:1.18;
  letter-spacing:-.035em;
}
.event-active-plus{
  color:#7a8798;
  font-size:10px;
  font-weight:1000;
  line-height:1;
}
.event-active-vs{
  width:30px;
  height:30px;
  display:grid;
  place-items:center;
  border-radius:999px;
  background:#f2f5fb;
  color:#7a8798;
  font-style:normal;
  font-size:11px;
  font-weight:1000;
  line-height:1;
  text-transform:uppercase;
}
.event-row.next{
  border-color:#bfdbfe;
  background:linear-gradient(135deg,#f8fbff 0%,#fff 100%);
}
.event-row.next:first-child{
  border-color:#5b8def;
  box-shadow:0 8px 20px rgba(91,141,239,.14);
}
.event-row.soon,.event-row.due{
  border-color:#fecaca;
  background:#fff7f7;
}
.event-row strong{display:block;font-size:15px}
.event-row small{display:block;color:var(--mut);font-size:12px;margin-top:2px}
.event-row .event-cue{color:#315fb2;font-weight:900}
.event-row.due .event-cue,.event-row.soon .event-cue{color:#b91c1c}
.event-row em{
  flex-shrink:0;
  font-style:normal;
  font-size:13px;
  font-weight:900;
  color:#4f78c9;
  background:#eaf1fe;
  border-radius:999px;
  padding:8px 10px;
  align-self:center;
  white-space:nowrap;
}
.event-active-meta{
  flex:0 0 92px;
  display:flex;
  flex-direction:column;
  align-items:stretch;
  justify-content:center;
  gap:7px;
}
.event-active-meta em{align-self:stretch;text-align:center;}
.event-official-complete{
  min-height:40px;
  border:1.5px solid #e3a7aa;
  border-radius:8px;
  background:#fff4f4;
  color:#b42318;
  padding:7px 8px;
  font:inherit;
  font-size:12px;
  font-weight:1000;
  cursor:pointer;
}
.event-official-complete:disabled{opacity:.42;cursor:not-allowed;}
.event-official-active-yield{
  width:100%;
  min-height:44px;
  border:1.5px solid #f59e0b;
  border-radius:8px;
  background:#fff7e8;
  color:#9a5800;
  padding:5px 6px;
  font:inherit;
  font-size:11px;
  font-weight:1000;
  line-height:1.15;
  word-break:keep-all;
  cursor:pointer;
}
.event-official-active-yield small{display:block;margin-top:2px;color:#b46b00;font-size:9px;}
.event-official-active-yield:disabled{opacity:.42;cursor:not-allowed;}
.event-complete-action{
  margin-top:9px;
  display:flex;
  gap:7px;
  flex-wrap:wrap;
}
.event-complete-btn,.event-undo-btn{
  width:100%;
  border:1.5px solid #bfdbfe;
  border-radius:14px;
  padding:12px 13px;
  background:#eef5ff;
  color:#315fb2;
  font-size:15px;
  font-weight:1000;
  font-family:inherit;
  cursor:pointer;
  box-shadow:0 8px 18px rgba(91,141,239,.12);
}
.event-complete-btn.due,.event-complete-btn.soon{
  border-color:#fecaca;
  background:#fff1f2;
  color:#b91c1c;
}
.event-undo-btn{
  border-color:#fed7aa;
  background:#fff7ed;
  color:#9a610b;
}
.event-row.soon em,.event-row.due em{
  color:#fff;
  background:#dc2626;
  animation:eventPulse 1.2s ease-in-out infinite;
}
@keyframes eventPulse{
  0%,100%{box-shadow:0 0 0 0 rgba(220,38,38,.22)}
  50%{box-shadow:0 0 0 6px rgba(220,38,38,.08)}
}
@media(max-width:430px){
  .event-row{padding:11px 10px;gap:8px}
  .event-row-main{grid-template-columns:auto minmax(0,1fr);gap:8px}
  .event-court-badge{min-width:56px;min-height:50px;border-radius:14px}
  .event-court-badge b{font-size:21px}
  .event-teamline{font-size:17px}
  .event-active-line{grid-template-columns:minmax(0,1fr) 30px minmax(0,1fr);gap:6px}
  .event-active-pair{padding:6px 5px;border-radius:14px}
  .event-active-player{font-size:15px}
  .event-active-vs{width:28px;height:28px;font-size:10px}
  .event-row em{font-size:12px;padding:7px 8px}
  .event-active-meta{flex-basis:82px;gap:6px}
  .event-official-complete{min-height:38px;padding:6px 5px;font-size:11px}
}
@media(max-width:370px){
  .event-row.event-active{flex-wrap:wrap}
  .event-row.event-active .event-row-main{flex:1 1 100%}
  .event-row.event-active .event-active-meta{
    flex:1 1 100%;
    display:grid;
    grid-template-columns:minmax(0,1fr);
  }
  .event-row.event-active .event-active-meta em:only-child{grid-column:1/-1}
}
.toolbar{
  display:flex;
  gap:8px;
  align-items:center;
  margin-bottom:12px;
}
.panel.hidden{display:none}
.member-fold{
  border:1px solid var(--line);
  border-radius:18px;
  background:#fff;
  overflow:hidden;
}
.member-fold summary{
  cursor:pointer;
  list-style:none;
  padding:13px 14px;
  font-size:15px;
  font-weight:900;
  color:#344055;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
}
.member-fold summary::-webkit-details-marker{display:none}
.member-fold summary:after{
  content:'보기';
  flex-shrink:0;
  font-size:12px;
  color:#4f78c9;
  background:#eaf1fe;
  border-radius:999px;
  padding:5px 9px;
}
.member-fold[open] summary{border-bottom:1px solid var(--line)}
.member-fold[open] summary:after{content:'접기'}
.member-fold #players{padding:0 10px 10px}
.my-card-wrap{margin-bottom:12px}
.my-card-wrap.hidden{display:none}
.my-card{
  border:1.5px solid #c8dbfb;
  border-radius:24px;
  background:linear-gradient(180deg,#fff 0%,#f8fbff 100%);
  box-shadow:0 14px 34px rgba(35,55,90,.085);
  padding:17px;
}
.my-card-head{display:flex;align-items:center;gap:13px;margin-bottom:13px}
.my-card-info{min-width:0;flex:1}
.my-card-change{
  flex-shrink:0;
  min-height:42px;
  padding:0 14px;
  border:1.5px solid #d8e2ef;
  border-radius:999px;
  background:#fff;
  color:#4f78c9;
  font-size:13px;
  font-weight:1000;
  box-shadow:none;
}
.my-avatar{
  width:58px;height:58px;border-radius:20px;
  display:flex;align-items:center;justify-content:center;
  background:#eaf1fe;color:#315fb2;border:1px solid #bfdbfe;
  font-size:23px;font-weight:1000;flex-shrink:0;
}
.my-card-name{font-size:24px;font-weight:1000;letter-spacing:-.055em;line-height:1.16;color:#18202d}
.my-card-state{font-size:13px;font-weight:1000;color:#16834f;margin-top:5px}
.my-status-chips{
  display:flex;
  flex-wrap:wrap;
  gap:6px;
  margin-top:8px;
}
.my-status-chip{
  display:inline-flex;
  align-items:center;
  min-height:28px;
  padding:6px 9px;
  border-radius:999px;
  border:1px solid var(--line);
  background:#fff;
  color:var(--mut);
  font-size:12px;
  font-weight:1000;
  line-height:1;
  white-space:nowrap;
}
.my-status-chip.on{
  border-color:#cfeeda;
  background:#f4fbf7;
  color:#3f7c58;
  box-shadow:0 0 0 4px rgba(145,209,170,.12);
}
.my-status-chip.warn{
  border-color:#ead2a8;
  background:#fff9ef;
  color:#8c672b;
}
.my-action-panel{border:1px solid #e3eaf5;border-radius:22px;background:#fff;padding:10px;box-shadow:inset 0 1px 0 rgba(255,255,255,.8);}
.my-card .game-request{margin-top:10px}
.my-current-match{
  margin-bottom:10px;
  padding:13px;
  border:1.5px solid #f1cdcf;
  border-radius:18px;
  background:#fff7f7;
  color:#712b31;
}
.my-current-match-head{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
}
.my-current-match-head span{
  display:flex;
  align-items:center;
  gap:7px;
  font-size:13px;
  font-weight:1000;
}
.my-current-match-head span:before{
  content:'';
  width:9px;
  height:9px;
  border-radius:50%;
  background:#dc3545;
  box-shadow:0 0 0 4px rgba(220,53,69,.12);
  flex-shrink:0;
}
.my-current-match-head b{
  font-size:16px;
  color:#b42331;
}
.my-current-match-teams{
  display:grid;
  grid-template-columns:minmax(0,1fr) minmax(0,1.25fr);
  gap:8px;
  margin-top:11px;
}
.my-current-match-team{
  min-width:0;
  padding:9px 10px;
  border:1px solid #f4dfe1;
  border-radius:13px;
  background:#fff;
}
.my-current-match-team small{
  display:block;
  margin-bottom:3px;
  color:#9b6a70;
  font-size:11px;
  font-weight:900;
}
.my-current-match-team strong{
  display:block;
  color:#263041;
  font-size:14px;
  line-height:1.35;
  overflow-wrap:anywhere;
}
.my-current-match-time{
  margin-top:8px;
  color:#8f444b;
  font-size:12px;
  font-weight:900;
  text-align:right;
}
.next-queue-notice{
  margin-top:10px;
  padding:12px 13px;
  border-radius:18px;
  border:1.5px solid #c8dbfb;
  background:linear-gradient(135deg,#f8fbff 0%,#fff 100%);
  color:#315fb2;
  font-size:14px;
  font-weight:1000;
  line-height:1.45;
}
.next-queue-title{
  display:block;
}
.next-queue-notice small{
  display:block;
  margin-top:3px;
  color:#6f7a8a;
  font-size:12px;
  font-weight:900;
}
.queue-defer-btn{
  margin-top:9px;
  width:100%;
  min-height:44px;
  border-radius:15px;
  border:1.5px solid #ead2a8;
  background:#fff9ef;
  color:#8c672b;
  font-weight:1000;
  font-size:15px;
  font-family:inherit;
  letter-spacing:-.03em;
}
.queue-defer-btn:active{transform:translateY(1px);}
.queue-entry-actions{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
  margin-top:9px;
}
.queue-entry-actions.member-rest-only{grid-template-columns:1fr;}
.queue-enter-btn,.queue-rest-btn{
  min-height:42px;
  border-radius:15px;
  font-weight:1000;
  font-size:14px;
}
.queue-enter-btn{
  border:1.5px solid #bcd4fb;
  background:#f4f8ff;
  color:#315fb2;
}
.queue-rest-btn{
  border:1.5px solid #cfeeda;
  background:#f4fbf7;
  color:#3f7c58;
}
.queue-enter-btn:active,.queue-rest-btn:active{transform:translateY(1px);}
.rest-guide{
  margin-top:10px;
  padding:12px 13px;
  border-radius:18px;
  border:1.5px solid #d6eadf;
  background:#f4fbf7;
  color:#23754a;
  font-size:14px;
  font-weight:1000;
  line-height:1.45;
}
.rest-guide small{
  display:block;
  margin-top:3px;
  color:#6f7a8a;
  font-size:12px;
  font-weight:900;
}
.pick-guide{
  border:1px dashed #c8dbfb;border-radius:20px;padding:14px;
  background:#f8fbff;color:#4f78c9;font-size:14px;font-weight:900;line-height:1.5;
}
.other-roster-title{margin:12px 0 8px;color:#6f7a8a;font-size:12px;font-weight:1000;letter-spacing:.04em}
.version-chip{
  display:none;
  align-items:center;
  justify-content:center;
  margin-top:10px;
  padding:5px 9px;
  border:1px solid var(--line);
  border-radius:999px;
  background:rgba(255,255,255,.76);
  color:#8a94a5;
  font-size:11px;
  font-weight:900;
  line-height:1;
}
.search{
  flex:1;
  height:46px;
  padding:0 14px;
  border:1px solid var(--line);
  border-radius:16px;
  font-size:16px;
  background:#fff;
}
.pill{
  padding:9px 12px;
  border-radius:999px;
  background:var(--blue2);
  color:#406fc7;
  font-weight:900;
  font-size:13px;
  white-space:nowrap;
}
.player{
  padding:14px;
  border:1px solid var(--line);
  border-radius:20px;
  background:#fff;
  margin-top:10px;
}
.player.locked{border-color:#f3cf8f;background:#fffaf0}
.player.recent{border-color:#9bd7ff;box-shadow:0 0 0 4px rgba(91,141,239,.14)}
.phead{
  display:flex;
  justify-content:space-between;
  gap:10px;
  align-items:flex-start;
  margin-bottom:10px;
}
.name{font-size:18px;font-weight:900}
.meta{color:var(--mut);font-size:13px;margin-top:3px}
.badge{
  padding:7px 10px;
  border-radius:999px;
  background:#f2f5fa;
  color:#4b5668;
  font-weight:900;
  font-size:12px;
  white-space:nowrap;
}
.badge.selected{background:#eaf1fe;color:#315fb2}
.buttons{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}
.main-actions{margin-top:10px;grid-template-columns:none;grid-auto-flow:column;grid-auto-columns:minmax(0,1fr)}
.my-action-panel .main-actions{margin-top:0;gap:8px}
.status-section{
  margin-top:9px;
  border:1px solid var(--line);
  border-radius:17px;
  background:#fbfcff;
  overflow:hidden;
}
.status-section.active{
  border-color:#9bd7ff;
  background:#f4f8ff;
  box-shadow:0 0 0 3px rgba(91,141,239,.10);
}
.status-section summary{
  cursor:pointer;
  padding:11px 12px;
  font-size:14px;
  font-weight:900;
  color:#344055;
  list-style:none;
  display:flex;
  justify-content:space-between;
  gap:8px;
  align-items:center;
}
.status-section summary::-webkit-details-marker{display:none}
.status-section summary small{
  color:var(--mut);
  font-size:12px;
  font-weight:900;
  white-space:nowrap;
}
.compact-actions{
  padding:0 12px 12px;
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:8px;
}
.game-request{
  margin-top:10px;
  border:1px solid var(--line);
  border-radius:18px;
  background:#fbfcff;
  overflow:hidden;
}
.game-request summary{
  cursor:pointer;
  padding:11px 12px;
  font-size:14px;
  font-weight:900;
  color:#344055;
  list-style:none;
}
.game-request summary::-webkit-details-marker{display:none}
.request-body{padding:0 12px 12px;display:grid;grid-template-columns:1fr 1fr;gap:8px}
.request-field{display:flex;flex-direction:column;gap:5px;min-width:0}
.request-field label{font-size:12px;font-weight:900;color:var(--mut);padding-left:2px}
.request-field.full{grid-column:1/-1}
.request-help{
  grid-column:1/-1;
  color:var(--mut);
  font-size:12px;
  font-weight:900;
  line-height:1.45;
}
.request-body select,.request-body input{
  height:42px;
  border:1px solid var(--line);
  border-radius:13px;
  padding:0 10px;
  font:inherit;
  background:#fff;
  min-width:0;
}
.request-body input{grid-column:1/-1}
.request-body button{grid-column:1/-1;background:var(--blue);color:#fff}
.request-status{
  margin:0 12px 12px;
  padding:10px 11px;
  border-radius:14px;
  border:1px solid #bfdbfe;
  background:#eff6ff;
  color:#1d4ed8;
  font-size:13px;
  font-weight:900;
  line-height:1.45;
}
.request-status.done{
  border-color:#bbf7d0;
  background:#f0fdf4;
  color:#166534;
}
.request-status.consent{
  border-color:#fed7aa;
  background:#fff7ed;
  color:#9a5b08;
}
.request-status.cancelled{
  border-color:#fed7aa;
  background:#fff7ed;
  color:#9a3412;
}
.request-status small{display:block;margin-top:3px;color:inherit;opacity:.72;font-size:12px;font-weight:800}
.request-chip{
  display:inline-flex;
  align-items:center;
  margin:0 5px 2px 0;
  padding:4px 7px;
  border-radius:999px;
  background:rgba(255,255,255,.72);
  border:1px solid currentColor;
  color:inherit;
  font-size:10px;
  font-weight:1000;
  line-height:1;
  vertical-align:middle;
}
.request-consent-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:9px}
.request-consent-actions button{padding:10px 12px;border-radius:14px;border:1.5px solid var(--line);background:#fff;color:var(--txt);font-weight:1000}
.request-consent-actions button.accept{border-color:#bdebd0;background:#eefbf4;color:#167244}
.request-consent-actions button.decline{border-color:#f4c7ce;background:#fff5f6;color:#a33b47}
button{
  appearance:none;
  border:1px solid var(--line);
  border-radius:15px;
  padding:13px 10px;
  font:inherit;
  font-weight:900;
  background:#fff;
  color:#273246;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:2px;
  min-height:52px;
  transition:.15s ease;
}
button small{display:block;font-size:11px;font-weight:700;line-height:1.25;color:rgba(39,50,70,.62)}
button.primary small{color:rgba(255,255,255,.82)}
button:disabled{opacity:.55}
button.active{
  background:linear-gradient(135deg,#35c978,#159456);
  color:#fff;
  border-color:#14864e;
  box-shadow:0 9px 22px rgba(21,148,86,.28);
}
button.active small{color:rgba(255,255,255,.86)}
button.sent:not(.applied){background:linear-gradient(135deg,#35a56a,#1e7b4b);border-color:#187347;color:#fff}
.status-icon{display:block;font-size:16px;line-height:1;margin-bottom:3px;opacity:.88}
.main-actions .status-btn{min-height:54px;font-size:16px;}
.main-actions .status-btn span{font-size:16px;}
.my-action-panel .status-btn{
  min-height:74px;
  border-radius:20px;
  border:1.5px solid #d8e2ef;
  background:#fff;
  color:#344055;
  box-shadow:0 8px 18px rgba(35,55,90,.045);
}
.my-action-panel .status-btn.active{
  background:linear-gradient(135deg,#35c978,#159456);
  color:#fff;
  border-color:#159456;
  box-shadow:0 10px 24px rgba(21,148,86,.25);
}
.my-action-panel .status-btn.sent:not(.applied){
  background:linear-gradient(135deg,#5b8def,#4778d8);
  border-color:#4778d8;
  color:#fff;
}
.my-action-panel .status-btn span:last-child{font-size:17px;font-weight:1000;letter-spacing:-.02em}
.empty{
  padding:28px 14px;
  text-align:center;
  color:var(--mut);
  line-height:1.55;
}
.toast{
  position:fixed;
  left:14px;right:14px;bottom:16px;
  max-width:680px;margin:0 auto;
  padding:14px 16px;
  border-radius:18px;
  background:#18202d;
  color:#fff;
  font-weight:900;
  text-align:center;
  box-shadow:0 16px 44px rgba(0,0,0,.26);
  transform:translateY(120%);
  transition:.22s ease;
  z-index:10;
}
.toast.show{transform:translateY(0)}
@media (min-width:620px){.buttons:not(.main-actions){grid-template-columns:repeat(3,minmax(0,1fr))}}
@media(max-width:520px){.request-body,.compact-actions{grid-template-columns:1fr}.vote-summary{grid-template-columns:1.15fr repeat(2,minmax(0,.8fr));gap:5px}.vote-chip{padding:8px 5px}.vote-chip.total{padding:9px 10px}.vote-chip.total b{font-size:22px}.vote-chip b{font-size:16px}.vote-chip span{font-size:10px}}

/* ── 민턴LIVE calm design layer: 가안 톤 적용 ── */
:root{
  --bg:#f7f9fd;--card:#fff;--line:#e4ebf5;--txt:#263041;--mut:#7a8494;
  --blue:#7fa8ee;--blue2:#f3f7ff;--green:#91d1aa;--red:#e99da1;--amber:#c99a58;
  --blue-deep:#436eb8;--green-deep:#3f7c58;--red-deep:#a85f63;--amber-soft:#fff9ef;
  --shadow:0 14px 34px rgba(35,55,90,.075);
}
body{
  background:linear-gradient(180deg,#fff 0%,#f1f6ff 260px,#f7f9fd 100%);
  color:var(--txt);
}
.wrap{max-width:430px;padding:18px 14px 38px;}
.hero,
.panel,
.my-card,
.member-fold,
.player,
.event-row{
  border-color:var(--line);
  border-radius:24px;
  background:rgba(255,255,255,.93);
  box-shadow:var(--shadow);
}
.hero{
  background:rgba(255,255,255,.92);
  padding:18px 16px;
}
.eyebrow{
  display:none;
  color:var(--blue-deep);
  letter-spacing:.14em;
}
h1{color:var(--txt);letter-spacing:-.055em;}
.sub,
.notice,
.event-title span,
.event-chip,
.event-section-title,
.meta,
.member-fold summary,
.event-row small{color:var(--mut);}
.notice{
  border-color:var(--line);
  background:#fbfdff;
  border-radius:18px;
}
.last-sent{
  border-color:#cfeeda;
  background:#f4fbf7;
  color:var(--green-deep);
  box-shadow:none;
}
.vote-chip{
  border-color:var(--line);
  border-radius:18px;
  background:#fbfdff;
}
.vote-chip.total{
  border-color:#c8dbfb;
  background:var(--blue2);
}
.vote-chip b,
.vote-chip.total b,
.event-court-badge,
.event-row .event-cue{color:var(--blue-deep);}
.vote-chip.total span{color:var(--blue-deep);}
.vote-chip.ready{
  border-color:#cfeeda;
  background:#f4fbf7;
}
.vote-chip.ready b{color:var(--green-deep);}
.vote-chip.warn{
  border-color:#ead2a8;
  background:var(--amber-soft);
}
.vote-chip.warn b{color:#8c672b;}
.panel{background:rgba(255,255,255,.92);}
.event-team{
  border-color:#c8dbfb;
  background:var(--blue2);
}
.event-team.red{
  border-color:#f1cdcf;
  background:#fff7f7;
}
.event-team b{color:var(--blue-deep);}
.event-team.red b{color:var(--red-deep);}
.event-row{
  box-shadow:none;
  border-radius:20px;
}
.event-row.next{
  border-color:#d9e6fb;
  background:linear-gradient(180deg,#fff,#f7faff);
}
.event-row.next:first-child{
  border-color:#c8dbfb;
  box-shadow:0 0 0 3px rgba(127,168,238,.10);
}
.event-row.soon,
.event-row.due{
  border-color:#f0d7aa;
  background:var(--amber-soft);
}
.event-court-badge{
  background:var(--blue2);
  border:1px solid #c8dbfb;
}
.event-row.next .event-court-badge{background:var(--blue2);color:var(--blue-deep);}
.event-row.soon .event-court-badge,
.event-row.due .event-court-badge{
  background:#fff7f7;
  border-color:#f1cdcf;
  color:var(--red-deep);
}
.event-teamline,
.event-match-title{color:var(--txt);}
.event-teamline.b{color:#4b5565;}
.event-row em{
  background:var(--blue2);
  color:var(--blue-deep);
}
.event-row.soon em,
.event-row.due em{
  background:#fff7f7;
  border:1px solid #f1cdcf;
  color:var(--red-deep);
  animation:none;
}
.event-complete-btn,
.event-undo-btn,
.status-btn,
.btn{
  border-radius:18px;
  box-shadow:none;
}
.event-complete-btn{
  border-color:#c8dbfb;
  background:var(--blue2);
  color:var(--blue-deep);
}
.event-complete-btn.due,
.event-complete-btn.soon{
  border-color:#f1cdcf;
  background:#fff7f7;
  color:var(--red-deep);
}
.event-undo-btn{
  border-color:#ead2a8;
  background:var(--amber-soft);
  color:#8c672b;
}
.my-card{
  border-color:#c8dbfb;
  background:linear-gradient(180deg,#fff 0%,#f7faff 100%);
  padding:18px 16px;
}
.my-avatar{
  background:var(--blue2);
  color:var(--blue-deep);
  border-color:#c8dbfb;
}
.my-card-name{color:var(--txt);}
.my-card-state{color:var(--green-deep);}
.my-action-panel{
  border-color:var(--line);
  background:#fff;
  border-radius:22px;
}
.status-btn{
  border:1.5px solid var(--line);
  background:#fff;
  color:var(--mut);
}
.status-btn.active,
.status-btn.applied{
  border-color:var(--green);
  background:#f4fbf7;
  color:var(--green-deep);
  box-shadow:0 0 0 4px rgba(145,209,170,.14);
}
.status-btn.sent:not(.applied){
  border-color:#c8dbfb;
  background:var(--blue2);
  color:var(--blue-deep);
}
.status-section{
  border-color:var(--line);
  border-radius:18px;
  background:#fbfdff;
}
.status-section.active{
  border-color:#c8dbfb;
  background:var(--blue2);
  box-shadow:0 0 0 3px rgba(127,168,238,.10);
}
.member-fold summary:after{
  background:var(--blue2);
  color:var(--blue-deep);
}
.search{
  border-color:var(--line);
  border-radius:18px;
  background:#fff;
  color:var(--txt);
}
.pill{
  background:var(--blue2);
  color:var(--blue-deep);
}
.player{
  border-radius:20px;
  box-shadow:none;
}
.player.locked{
  border-color:#ead2a8;
  background:var(--amber-soft);
}
.player.recent{
  border-color:#c8dbfb;
  box-shadow:0 0 0 4px rgba(127,168,238,.12);
}
.player.selectable{
  cursor:pointer;
  border-color:#c8dbfb;
  background:linear-gradient(180deg,#fff 0%,#f7fbff 100%);
}
.player.selectable:active{
  transform:scale(.992);
}
.player.selectable .badge{
  border-color:#c8dbfb;
  background:var(--blue2);
  color:var(--blue-deep);
}
.select-hint{
  margin-top:10px;
  color:var(--blue-deep);
  font-size:.82rem;
  font-weight:1000;
}
.badge.selected,
.request-status.done{
  background:var(--blue2);
  color:var(--blue-deep);
}
.request-status.done.waiting-player{
  border-color:#fed7aa;
  background:#fff7ed;
  color:#9a5b08;
}
.request-status.done.blocked{
  border-color:#e5e7eb;
  background:#f8fafc;
  color:#475569;
}
.request-status.cancelled{
  background:#fff7f7;
  color:var(--red-deep);
}
.toast{
  background:#263041;
  box-shadow:0 16px 44px rgba(35,48,65,.22);
}

/* 민턴LIVE 회원페이지: 내 상태 우선 + 다음 대진 압축형 */
.my-card-wrap{
  margin:12px 0 14px;
}
.event-panel{
  margin-top:14px;
}
.event-title{
  margin-bottom:8px;
}
.event-title b{
  color:var(--txt);
  letter-spacing:-.04em;
}
.event-pause-banner{
  margin:10px 0 12px;
  padding:13px 14px;
  border:1.5px solid #efb1b5;
  border-radius:8px;
  background:#fff1f2;
  color:#9f2630;
}
.event-pause-banner strong{display:block;font-size:16px;line-height:1.3;}
.event-pause-banner span{display:block;margin-top:4px;font-size:12px;font-weight:900;line-height:1.5;}
.event-row.next{
  border-color:#cfeeda;
  background:linear-gradient(180deg,#fff 0%,#f7fcf9 100%);
  border-radius:20px;
  padding:11px 12px;
}
.event-row.next:first-child{
  border-color:var(--green);
  box-shadow:0 0 0 3px rgba(145,209,170,.13);
}
.event-row.next.soon,
.event-row.next.due{
  border-color:#f1cdcf;
  background:#fff7f7;
}
.event-row.finish{border-color:#bbf7d0;background:#f0fdf4;}
.event-row.finish .event-cue{color:#166534;}
.event-row.next .event-row-main{
  grid-template-columns:auto minmax(0,1fr);
  gap:10px;
}
.event-rank-badge{
  width:38px;
  height:38px;
  display:grid;
  place-items:center;
  border:1px solid var(--green);
  border-radius:999px;
  background:#f4fbf7;
  color:var(--green-deep);
  font-size:.92rem;
  font-weight:1000;
  line-height:1;
}
.event-row.next.soon .event-rank-badge,
.event-row.next.due .event-rank-badge{
  border-color:#f1cdcf;
  background:#fff1f1;
  color:var(--red-deep);
}
.next-teams{
  display:block;
}
.event-next-line{
  min-width:0;
  display:grid;
  grid-template-columns:minmax(0,1fr) 24px minmax(0,1fr);
  align-items:center;
  gap:8px;
  white-space:nowrap;
  color:var(--txt);
  font-size:.93rem;
  font-weight:1000;
  line-height:1.25;
  letter-spacing:-.055em;
}
.event-next-pair{
  min-width:0;
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  align-items:center;
  gap:8px;
}
.event-next-pair.a .event-next-player{text-align:right;}
.event-next-pair.b .event-next-player{text-align:left;}
.event-next-player{
  min-width:0;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}
.event-dot{
  display:none;
}
.event-next-line em{
  margin:0;
  color:var(--mut);
  font-style:normal;
  font-size:.64rem;
  font-weight:1000;
  text-transform:lowercase;
  text-align:center;
}
.event-row.next .event-complete-action{
  margin-top:8px;
}
.event-row.next .event-complete-action.split{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
}
.event-row.next .event-complete-btn{
  min-height:44px;
  border-color:#cfeeda;
  background:#f4fbf7;
  color:var(--green-deep);
}
.event-row.next .event-rest-btn{
  min-height:44px;
  border:1.5px solid #ead2a8;
  border-radius:14px;
  background:#fff9ef;
  color:#8c672b;
  font-weight:1000;
}
.event-official-queue-actions{
  display:grid;
  grid-template-columns:1fr;
  gap:8px;
  margin-top:10px;
}
.event-official-queue-actions.split{grid-template-columns:repeat(2,minmax(0,1fr));}
.event-official-queue-actions button{
  min-width:0;
  min-height:44px;
  border-radius:8px;
  padding:8px 10px;
  font:inherit;
  font-size:13px;
  font-weight:1000;
  cursor:pointer;
}
.event-official-enter{
  border:1.5px solid #2f9168;
  background:#2f9168;
  color:#fff;
}
.event-official-yield{
  border:1.5px solid #e0b76a;
  background:#fff8e8;
  color:#83570e;
}
.event-official-queue-actions button:disabled{opacity:.42;cursor:not-allowed;}
.event-wait-pill{
  display:inline-flex;
  width:100%;
  min-height:34px;
  align-items:center;
  justify-content:center;
  border:1.5px solid #cfeeda;
  border-radius:14px;
  background:#f4fbf7;
  color:var(--green-deep);
  font-size:12px;
  font-weight:1000;
}
.event-row.expected{
  border-style:dashed;
  border-color:#d6eadf;
  background:#fbfffd;
  box-shadow:none;
}
.event-row.expected:first-child{
  border-color:#d6eadf;
  box-shadow:none;
}
.event-row.expected .event-rank-badge{
  border-color:#d6eadf;
  background:#f4fbf7;
  color:#3f7c58;
}
.event-row.expected .event-cue{
  display:block;
  margin-top:4px;
  color:#7a8798;
  font-size:.74rem;
  font-weight:900;
  line-height:1.35;
}
.event-row.next.soon .event-complete-btn,
.event-row.next.due .event-complete-btn{
  border-color:#f1cdcf;
  background:#fff7f7;
  color:var(--red-deep);
}
.event-section-title{
  color:#8792a2;
  letter-spacing:-.02em;
}
.event-row:not(.next){
  border-color:#d9e6fb;
  background:#fbfdff;
}
.event-row.soon:not(.next),
.event-row.due:not(.next){
  border-color:#ead2a8;
  background:var(--amber-soft);
}
@media(max-width:370px){
  .event-next-line{
    grid-template-columns:minmax(0,1fr) 22px minmax(0,1fr);
    gap:6px;
    font-size:.88rem;
  }
  .event-next-line em{
    margin:0;
    line-height:.9;
  }
  .event-next-player{
    min-width:0;
  }
}
.complete-picker-backdrop{
  position:fixed;
  inset:0;
  z-index:80;
  display:flex;
  align-items:flex-end;
  justify-content:center;
  padding:18px;
  background:rgba(21,30,43,.42);
  backdrop-filter:blur(8px);
}
.complete-picker-backdrop.hidden{display:none}
.complete-picker{
  width:min(540px,100%);
  border:1px solid var(--line);
  border-radius:28px;
  background:#fff;
  box-shadow:0 22px 70px rgba(24,39,64,.22);
  padding:18px;
}
.complete-picker-head{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:12px;
  margin-bottom:12px;
}
.complete-picker-head b{
  display:block;
  font-size:1.15rem;
  color:var(--txt);
  letter-spacing:-.04em;
}
.complete-picker-head span{
  display:block;
  margin-top:4px;
  color:var(--mut);
  font-size:.82rem;
  font-weight:800;
}
.complete-picker-close{
  border:1px solid var(--line);
  background:#fff;
  color:var(--mut);
  border-radius:999px;
  min-width:56px;
  padding:9px 12px;
  font-weight:1000;
}
.complete-picker-list{
  display:grid;
  gap:10px;
}
.complete-picker-card{
  width:100%;
  border:1.5px solid var(--line);
  border-radius:20px;
  background:#fbfdff;
  padding:13px;
  text-align:left;
  color:var(--txt);
  font-weight:1000;
}
.complete-picker-card.soon,
.complete-picker-card.due{
  border-color:#f1cdcf;
  background:#fff7f7;
}
.complete-picker-card-top{
  display:flex;

function chosungText(s){
  return String(s||'').split('').map(ch=>{
    const code=ch.charCodeAt(0)-0xac00;
    if(code>=0&&code<=11171)return CHO[Math.floor(code/588)]||ch;
    return ch;
  }).join('');

  const needle=normalizeText(q);

async function claimOfficialInvite(actorOverride){
  const actor=actorOverride?.isClubOfficial?actorOverride:selectedOfficialPlayer();

  if(officialClaimPromise){
    const activeClaim=officialClaimPromise;
    if(officialClaimPlayerId===String(actor.id))return activeClaim;
    await activeClaim;
    if(String(selectedOfficialPlayer()?.id||'')!==String(actor.id))return false;
    return claimOfficialInvite(actor);
  }
  officialClaimPlayerId=String(actor.id);
  const currentClaim=(async()=>{
    claimingOfficial=true;
    officialGrantError='';
    render();
    try{
      const callable=firebase.functions().httpsCallable('claimDailyOfficialInvite');
      const result=await callable({
        checkinId,
        playerId:actor.id,
        ...(pendingOfficialInvite?{inviteToken:pendingOfficialInvite}:{}),
        clientId:officialClientId()
      });
      const grant=result?.data||{};
      if(!grant.grantToken||!grant.expiresAt)throw new Error('grant-missing');
      if(String(grant.playerId||'')!==String(actor.id))throw new Error('grant-player-mismatch');
      if(String(selectedOfficialPlayer()?.id||'')!==String(actor.id))return false;
      officialGrantToken=grant.grantToken;
      officialGrantPlayerId=String(grant.playerId);
      try{localStorage.setItem(officialGrantKey(),JSON.stringify({token:grant.grantToken,expiresAt:grant.expiresAt,playerId:officialGrantPlayerId}));}catch(e){}
      if(pendingOfficialInvite){
        pendingOfficialInvite='';
        try{sessionStorage.removeItem('kokmatch_pending_official_invite_'+checkinId);}catch(e){}
        clearOfficialInviteFromAddress();

      toast(`${actor.name} 임원 권한 연결 완료 · 운영 작업이 바로 반영됩니다.`);
      return true;
    }catch(e){
      officialGrantError=officialCallableError(e);
      toast(officialGrantError);
      return false;
    }finally{
      claimingOfficial=false;
      render();
    }
  })();
  officialClaimPromise=currentClaim;
  try{return await currentClaim;}
  finally{
    if(officialClaimPromise===currentClaim){
      officialClaimPromise=null;
      officialClaimPlayerId='';
    }
  }
}

    .sort((a,b)=>(a.createdAt||0)-(b.createdAt||0))
    .forEach(req=>{
      const sig=[req.type,req.queueId||'',req.playerId||'',req.createdAt||''].join('|');
      if(seen.has(sig))return;

      const item={...list.splice(idx,1)[0],pendingYield:true};

function nextQueueTimeInfo(q){

  if(eventFlowPaused())return {main:'진행 일시 정지',detail:'재개 후 순서 유지'};
  if(q.restPass)return {main:'조금 쉬고 대기',detail:''};
  if(q.cueState==='free'){
    return {main:'입장 준비',detail:'클럽 임원 확인 중'};
  }
  if(q.cueState==='handoff')return {main:'입장 준비',detail:'클럽 임원 확인 중'};
  if(q.cueState==='due'){
    return {main:'입장 준비',detail:'클럽 임원 확인 중'};
  }
  const m=queueTargetMatch(q);
  const endAt=Number(m?.endAt||0);
  if(endAt){
    const remain=Math.max(0,Math.ceil((endAt-Date.now())/60000));
    const time=clockText(endAt);
    const remainText=remain<=0?'종료임박':`약 ${remain}분 후`;
    return {
      main:time?`${time} 전후`:'진행 중 경기 종료 후',
      detail:remainText

    detail:''

}

function memberQueueCueText(q){

function statusButtonSpec(p,key){
  if(key==='toggle'){
    const selected=getSelectedStatus(p);
    if(selected==='wait')return {key:'wait',label:'종료',action:'done'};
    if(selected==='done')return {key:'done',label:'복귀',action:'wait'};
    return {key:'wait',label:'복귀',action:'wait'};
  }
  const labels={wait:'복귀',rest:'휴식',done:'종료'};
  return {key,label:labels[key]||compactLabel(key),action:key};
}
function statusActionKeys(p,keys){
  const selected=getSelectedStatus(p);
  if(selected==='wait')return keys.filter(key=>key==='rest'||key==='done');
  if(selected==='rest')return keys.filter(key=>key==='wait'||key==='done');
  if(selected==='done')return keys.filter(key=>key==='wait');
  return keys.filter(key=>key==='rest'||key==='done');
}
function statusButtons(p,keys,disabled){

    const last=getLastSent();
    const applied=p.status===spec.key;
    const sent=last&&last.playerId===p.id&&last.status===spec.key;
    const active=selected===spec.key;
    const cls=['status-btn',active?'active':'',applied?'applied':'',sent&&!applied?'sent':''].filter(Boolean).join(' ');
    const iconMap={wait:'▶',rest:'☕',done:'⏹'};

    return `<button class="${cls}" ${disabled} onclick="sendStatus('${esc(p.id)}','${esc(spec.action)}')"><span class="status-icon">${esc(icon)}</span><span>${esc(spec.label)}</span></button>`;

function confirmStatusChange(p,status){
  const current=getSelectedStatus(p);
  if(current===status)return true;
  const nextQ=nextQueueForPlayer(p.id);
  const nextOrder=nextQ?parseInt(nextQ.idx,10)||(eventNextList().findIndex(q=>queueIdentity(q)===queueIdentity(nextQ))+1):0;
  const nextWarn=nextQ&&['rest','done'].includes(status)
    ? nextOrder===1
      ? `\n\n다음 대진 1순위라 곧 입장할 차례예요.\n이 버튼을 누르면 1순위 대진이 바로 조정됩니다.`
      : `\n\n현재 다음 대진 ${nextOrder||''}순위에 포함되어 있어요.\n이 버튼을 누르면 준비된 대진이 조정될 수 있습니다.`
    : '';
  if(status==='wait'){
    return confirm(`${p.name}님, 대진에 복귀할까요?\n복귀하면 다시 자동대진 후보에 포함됩니다.`);
  }
  if(status==='rest'){
    const extra=nextOrder===1?'\n정말 쉬어야 할 때만 확인해 주세요.':p.locked?'\n현재 대기표나 경기에서 빠질 수 있습니다.':'\n휴식 중에는 새 대진에 배정되지 않습니다.';
    return confirm(`${p.name}님, 잠시 휴식으로 전환할까요?${nextWarn}${extra}`);
  }
  if(status==='done'){
    return confirm(`${p.name}님, 오늘 운동을 종료할까요?${nextWarn}\n종료하면 새 대진에 배정되지 않습니다. 필요하면 다시 복귀할 수 있어요.`);
  }
  return true;
}

function reservationConsentState(req,playerId){

function gameRequestBox(p,disabled){

        ? '임원 접수 완료 · 상대 경기 중'
        : (isPartner?'파트너 접수 완료':'게임 등록 완료');
    const mainText=stateClass==='waiting-player'?prefix:`${prefix} · ${status}`;
    const detailHtml=activeReservation.statusDetail?`<small>${esc(activeReservation.statusDetail)}</small>`:'';
    return `<details class="game-request" open>
      <summary>${isPartner?'파트너 접수':'게임 등록'}</summary>
      <div class="request-status done ${esc(stateClass)}"><span class="request-chip">임원 접수</span>${esc(mainText)}
        ${detailHtml}
        <small>${esc(sessionReservationLabel(activeReservation))}</small>

  return cancelledHtml||'';

function createOfficialOperationId(prefix){
  const safePrefix=String(prefix||'op').replace(/[^a-zA-Z0-9_-]/g,'').slice(0,18)||'op';
  try{
    const bytes=new Uint8Array(12);
    crypto.getRandomValues(bytes);
    return `dov2_${safePrefix}_${Array.from(bytes,b=>b.toString(16).padStart(2,'0')).join('')}`;
  }catch(e){
    return `dov2_${safePrefix}_${Date.now().toString(36)}_${Math.random().toString(36).slice(2,12)}`;
  }
}
function officialCallableError(error){
  const message=String(error?.message||'').replace(/^Firebase:\s*/,'').trim();
  if(message.includes('임원 운영')||message.includes('민턴LIVE')||message.includes('현재 상태'))return message;
  if(error?.code==='functions/permission-denied')return '명부의 임원 등록을 확인하지 못했습니다. 아래 다시 연결을 눌러 주세요.';
  if(error?.code==='functions/failed-precondition')return '경기 상태가 이미 바뀌었습니다. 현재 화면을 확인한 뒤 다시 처리해 주세요.';
  return '서버 즉시 처리 연결에 실패했습니다. 네트워크를 확인한 뒤 다시 눌러 주세요.';
}
async function pushOfficialRequest(req,successText){
  if(eventFlowPaused()&&officialFlowOperationType(req?.type)){
    toast('현재 진행이 일시 정지되어 있습니다. 재개 후 다시 처리해 주세요.');
    return false;
  }
  if(isSampleMode()){
    officialRequests.push({key:'sample_'+Date.now(),...req,appliedAt:Date.now()});
    toast(successText);
    return true;
  }
  if(!db||!checkinId||!session||sendingKey||claimingOfficial)return false;
  if(sessionExpired()){showEndedLink();return false;}
  req={...req,operationId:req.operationId||createOfficialOperationId(req.type)};
  const actor=officialActor(req.actorPlayerId);
  if(!officialServerReady()&&actor){
    const claimed=await claimOfficialInvite(actor);
    if(!claimed&&!officialServerReady())return false;
  }
  const serverReady=officialServerReady();
  const serverCapable=officialServerCapable();
  const connected=operatorConnected();
  if(serverCapable&&!serverReady){
    toast('명부 임원 권한을 확인하지 못했습니다. 다시 연결을 눌러 주세요.');
    refreshOfficialConnection();
    return false;
  }
  if(!serverReady&&!connected){
    toast('운영 권한 연결에 실패했습니다. 네트워크와 명부 임원 등록을 확인해 주세요.');
    refreshOfficialConnection();
    return false;
  }
  sendingKey='official_'+req.type;
  refreshOfficialConnection();
  try{
    if(serverReady){
      const callable=firebase.functions().httpsCallable('submitDailyOfficialRequest');
      const result=await callable({checkinId,grantToken:officialGrantToken,command:req});
      const receipt=result?.data||{};
      const row={
        key:receipt.requestId||req.operationId,
        ...req,
        serverRevision:Number(receipt.resultRevision||0),
        ...(receipt.status==='applied'?{serverAppliedAt:Date.now()}:{serverRejectedAt:Date.now(),serverReason:receipt.reason||'현재 상태에서 처리할 수 없습니다.'})
      };
      officialRequests=officialRequests.filter(item=>item.key!==row.key);
      officialRequests.push(row);
      if(receipt.status!=='applied'){
        toast(row.serverReason);
        render();
        return false;
      }
      toast(`${successText} · 바로 반영됨`);
      return true;
    }
    const ref=db.ref(checkinPath()+'/requests/'+req.operationId);
    await ref.set(req);
    officialRequests.push({key:req.operationId,...req});
    toast(`${successText} · 관리자 앱에서 자동 적용 중`);
    return true;
  }catch(e){
    if(serverReady&&e?.code==='functions/permission-denied'){
      clearOfficialGrant('임원 운영 연결 시간이 끝났습니다. 다시 연결을 눌러 주세요.');
      toast(officialGrantError);
      render();
      return false;
    }
    toast(serverReady?officialCallableError(e):'운영 요청 전송에 실패했습니다. 다시 눌러 주세요.');
    return false;
  }finally{
    sendingKey='';
    refreshOfficialConnection();
  }
}

  if(!q)return toast('입장할 다음 대진이 없습니다.');
  if(!(q.playerIds||[]).includes(playerId))return toast('다음 대진 선수만 입장할 수 있어요.');
  const targetCourt=court||q.targetCourt;
  if(!targetCourt||q.cueState!=='free')return toast('빈 코트가 있을 때만 바로 입장할 수 있어요.');
  if(!confirm(`${targetCourt}코트에 지금 입장할까요?`))return;
  if(isSampleMode()){
    const idx=(session.event.next||[]).findIndex(item=>String(item.queueId||item.id||'')===String(q.queueId||q.id||queueId||''));
    if(idx>=0){
      const item=session.event.next.splice(idx,1)[0];
      session.event.active=session.event.active||[];
      session.event.active.push({
        id:'sample_free_'+Date.now(),
        court:Number(targetCourt)||targetCourt,
        seq:(session.event.active.length||0)+1,
        type:item.type,
        teamMode:false,
        labelA:item.labelA||'A팀',
        labelB:item.labelB||'B팀',
        t1:item.t1||[],
        t2:item.t2||[],
        t1Ids:item.t1Ids||[],
        t2Ids:item.t2Ids||[],
        playerIds:item.playerIds||[],
        remain:15,
        startedAt:Date.now(),
        endAt:Date.now()+15*60000,
        timerState:'normal'
      });
      session.event.activeCount=(session.event.active||[]).length;
      session.event.next.forEach((x,i)=>{x.idx=i+1;});
    }
    toast(`${targetCourt}코트 입장 처리했어요.`);
    render();
    return;
  }
  if(!db||!checkinId||!session||sendingKey)return;
  if(sessionExpired())return showEndedLink();
  const req={
    type:'queue-enter-free',
    queueId:q.queueId||q.id||queueId||'',
    court:targetCourt,
    playerId:p.id,
    playerName:p.name,
    createdAt:Date.now(),
    source:'member-queue-enter-free'
  };
  sendingKey='queue_enter_free_'+p.id;
  renderEvent();
  try{
    await db.ref(checkinPath()+'/requests').push(req);
    toast(`${targetCourt}코트 입장 요청 완료`);
  }catch(e){
    toast('입장 요청 전송에 실패했습니다.');
  }finally{
    sendingKey='';
    renderEvent();
  }
}
async function sendQueueRestPass(playerId,queueId,court){
  if(blockPausedOperation('잠시 쉬기를 처리'))return;
  const p=(session?.players||[]).find(x=>x.id===playerId);
  if(!p)return toast('선수를 찾지 못했습니다.');
  if(!confirmPlayerIdentity(p))return;
  const q=(queueId?queueById(queueId):null)||nextQueueForPlayer(playerId);
  if(!q)return toast('조금 쉬고 입장할 다음 대진이 없습니다.');
  if(!(q.playerIds||[]).includes(playerId))return toast('다음 대진 선수만 요청할 수 있어요.');
  const targetCourt=court||q.targetCourt;
  if(!targetCourt||q.cueState!=='free')return toast('코트가 비어 있을 때만 조금 쉬고 입장할 수 있어요.');
  if(!confirm(`이번 빈 코트(${targetCourt}코트)는 잠깐 쉬고 넘길까요?\n다음 종료 코트가 생기면 다시 입장 순서가 됩니다.`))return;
  if(isSampleMode()){
    const nextList=session.event.next||[];
    const idx=nextList.findIndex(item=>String(item.queueId||item.id||'')===String(q.queueId||q.id||queueId||''));
    if(idx>=0){
      const item=nextList[idx];
      item.restPass=true;
      item.restPassText=`${p.name}님이 조금 쉬고 입장`;
      item.cueState='hold';
      item.cue='조금 쉬고 입장 대기';
      item.cueDetail='다음 종료 코트 우선';
      item.targetCourt=null;
      const nextItem=nextList.slice(idx+1).find(x=>!x.restPass);
      if(nextItem){
        nextItem.targetCourt=targetCourt;
        nextItem.cueState='free';
        nextItem.cue=`${targetCourt}코트 입장 가능`;
        nextItem.cueDetail='빈 코트';
      }
    }
    toast('조금 쉬고 입장으로 표시했어요.');
    render();
    return;
  }
  if(!db||!checkinId||!session||sendingKey)return;
  if(sessionExpired())return showEndedLink();
  const req={
    type:'queue-rest-pass',
    queueId:q.queueId||q.id||queueId||'',
    court:targetCourt,
    playerId:p.id,
    playerName:p.name,
    createdAt:Date.now(),
    source:'member-queue-rest-pass'
  };
  sendingKey='queue_rest_pass_'+p.id;
  renderEvent();
  try{
    await db.ref(checkinPath()+'/requests').push(req);
    toast('조금 쉬고 입장 요청 완료');
  }catch(e){
    toast('요청 전송에 실패했습니다.');
  }finally{
    sendingKey='';
    renderEvent();
  }
}
async function sendCourtComplete(queueId,matchId,court,mode){
  if(blockPausedOperation('경기 종료를 처리'))return;
  if(!db||!checkinId||!session||sendingKey)return;
  if(sessionExpired())return showEndedLink();
  const last=getLastSent();
  if(!last||!last.playerId)return toast('먼저 본인 이름을 선택해 주세요.');
  const activeMatch=activeMatchById(matchId);
  if(!activeMatch)return toast('진행 중 경기를 다시 확인해 주세요.');
  const q=queueId?queueById(queueId):null;
  const isQueueMode=mode!=='self'&&!!queueId;
  if(!isQueueMode)return toast('경기 종료는 다음 입장 대진에서 처리해 주세요.');
  if(isQueueMode&&!q)return toast('다음 대진을 다시 확인해 주세요.');
  if(isQueueMode){
    if(!canQueueCompleteCourt(q))return toast('아직 입장 순서가 아닙니다.');
    if(!isHandoffReadyMatch(activeMatch,q))return toast('아직 입장 가능한 코트가 아닙니다.');
  }
  const courtText=court?`${court}코트`:(activeMatch.court?`${activeMatch.court}코트`:'해당 코트');
  const confirmText=isQueueMode
    ? `${activeMatchLabel(activeMatch)}\n\n입장할까요?`
    : `${activeMatchLabel(activeMatch)}\n\n종료할까요?`;
  if(!confirm(confirmText))return;
  const token='ct_'+Date.now().toString(36)+'_'+Math.random().toString(36).slice(2,7);
  const req={
    type:'court-complete',
    queueId:queueId||'',
    matchId,
    court,
    token,
    playerId:last.playerId,
    playerName:last.playerName,
    createdAt:Date.now(),
    source:'member-court-complete'
  };
  sendingKey='court_complete_'+matchId+'_'+(queueId||'self');
  renderEvent();
  try{
    await db.ref(checkinPath()+'/requests').push(req);
    setLastComplete({token,matchId,queueId:queueId||'',court});
    toast(isQueueMode?`${courtText} 입장 요청 완료`:`${courtText} 종료 요청 완료`);
  }catch(e){
    toast('종료 요청 전송에 실패했습니다.');
  }finally{
    sendingKey='';
    renderEvent();
  }
}
async function sendCourtCompleteUndo(token,operation){
  const lastComplete=getLastComplete();
  if(lastComplete?.official&&lastComplete.actorPlayerId){
    await sendOfficialCourtUndo(lastComplete.actorPlayerId,token,operation||lastComplete.operation||'court-complete');
    return;
  }
  if(!db||!checkinId||!session||sendingKey)return;
  if(!token)return;
  const req={type:'court-complete-undo',token,createdAt:Date.now(),source:'member-court-complete-undo'};
  sendingKey='court_undo';
  try{
    await db.ref(checkinPath()+'/requests').push(req);
    clearLastComplete();
    toast('종료 취소 요청을 보냈어요.');
  }catch(e){
    toast('종료 취소 요청에 실패했습니다.');
  }finally{
    sendingKey='';
    renderEvent();
  }
}
async function sendGameRequest(playerId){
  const p=(session?.players||[]).find(x=>x.id===playerId);
  toast(`${p?.name||'선수'}님의 파트너 요청은 클럽 임원이 현장에서 접수합니다.`);
}
async function sendReservationConsent(reqKey,playerId,accept){
  if(blockPausedOperation('게임신청을 처리'))return;
  if(!db||!checkinId||!session||sendingKey)return;
  if(sessionExpired())return showEndedLink();
  const req=reservationRequests.find(r=>r.key===reqKey);
  const p=(session.players||[]).find(x=>x.id===playerId);
  if(!req||!p)return toast('신청 정보를 찾지 못했습니다.');
  sendingKey=playerId+'_consent';
  render();
  try{
    const ref=db.ref(checkinPath()+'/requests/'+reqKey);
    if(accept){
      await ref.child('consents/'+playerId).set('accepted');
      req.consents={...(req.consents||{}),[playerId]:'accepted'};
      toast('동의 완료 · 모두 동의하면 예약됩니다.');
    }else{
      const reason=`${p.name}님이 게임신청을 거절했습니다.`;
      await ref.update({ignoredAt:Date.now(),ignoredBy:'member-reservation-decline',reason});
      req.ignoredAt=Date.now();
      req.reason=reason;
      toast('게임신청을 거절했습니다.');
    }
  }catch(e){
    toast('처리에 실패했습니다. 잠시 후 다시 눌러주세요.');
  }finally{
    sendingKey='';
    render();
  }
}
async function sendReservationCancel(reqKey,playerId){
  if(blockPausedOperation('게임신청을 취소'))return;
  if(isSampleMode()){
    if(!session||sendingKey)return;
    const req=reservationRequests.find(r=>r.key===reqKey);
    const p=(session.players||[]).find(x=>x.id===playerId);
    if(!req||!p)return toast('신청 정보를 찾지 못했습니다.');
    if(!confirm('이 게임신청을 취소할까요?\n필요하면 다시 신청할 수 있습니다.'))return;
    const reason=req.playerId===playerId
      ? `${p.name}님이 게임신청을 취소했습니다.`
      : `${p.name}님이 게임신청 동의를 취소했습니다.`;
    req.ignoredAt=Date.now();
    req.reason=reason;
    toast('게임신청을 취소했습니다.');
    render();
    return;
  }
  if(!db||!checkinId||!session||sendingKey)return;
  if(sessionExpired())return showEndedLink();
  const req=reservationRequests.find(r=>r.key===reqKey);
  const p=(session.players||[]).find(x=>x.id===playerId);
  if(!req||!p)return toast('신청 정보를 찾지 못했습니다.');
  if(!confirm('이 게임신청을 취소할까요?\n필요하면 다시 신청할 수 있습니다.'))return;
  sendingKey=playerId+'_reservation_cancel';
  render();
  try{
    const reason=req.playerId===playerId
      ? `${p.name}님이 게임신청을 취소했습니다.`
      : `${p.name}님이 게임신청 동의를 취소했습니다.`;
    await db.ref(checkinPath()+'/requests/'+reqKey).update({ignoredAt:Date.now(),ignoredBy:'member-reservation-cancel',reason});
    req.ignoredAt=Date.now();
    req.reason=reason;
    toast('게임신청을 취소했습니다.');
  }catch(e){
    toast('취소 처리에 실패했습니다.');
  }finally{
    sendingKey='';
    render();
  }
}
function boot(){
  const vEl=document.getElementById('appVersion');
  if(vEl)vEl.textContent='v'+APP_VERSION;
  const sampleMode=new URLSearchParams(location.search).has('sample');
  const officialLink=officialInviteFromSearch(location.search);
  checkinId=officialLink.checkinId||qs('id')||(sampleMode?'SAMPLE':'');
  if(!checkinId){
    document.getElementById('players').textContent='민턴LIVE 링크가 올바르지 않습니다.';
    return;
  }
  const inviteFromLink=officialLink.token;
  if(inviteFromLink&&/^[a-f0-9]{48}$/i.test(inviteFromLink)){
    pendingOfficialInvite=inviteFromLink;
    try{sessionStorage.setItem('kokmatch_pending_official_invite_'+checkinId,pendingOfficialInvite);}catch(e){}
  }else{
    try{pendingOfficialInvite=sessionStorage.getItem('kokmatch_pending_official_invite_'+checkinId)||'';}catch(e){}
  }
  officialGrantToken=loadOfficialGrant();
  if(sampleMode){
    session=sampleSession();
    if(qs('paused')==='1'){
      session.event.paused=true;
      session.event.pausedAt=Date.now();
      session.event.pauseReason='생일축하·공지';
    }
    partyResponses=['s2','s4','s6','s10','s13','s18'].reduce((rows,id)=>{
      rows[id]={attending:true,revision:1,updatedAt:Date.now(),source:'sample'};
      return rows;
    },{});
    const samplePlayerId=qs('player');
    const samplePlayer=(session.players||[]).find(p=>p.id===samplePlayerId);
    if(samplePlayer){
      setLastSent({
        playerId:samplePlayer.id,
        playerName:samplePlayer.name,
        status:samplePlayer.status,
        statusLabel:compactLabel(samplePlayer.status),
        source:'member-identity'
      });
    }
    render();
    if(eventTimer)clearInterval(eventTimer);
    eventTimer=setInterval(refreshLiveTimers,1000);
    return;
  }
  try{
    firebase.initializeApp(FB_CONFIG);
    db=firebase.database();
  }catch(e){
    document.getElementById('players').textContent='서버 연결에 실패했습니다.';
    return;
  }
  db.ref(checkinPath()+'/session').on('value',snap=>{
    session=snap.val();
    if(!session){
      renderEvent();
      const fold=document.getElementById('playerListFold');
      if(fold)fold.open=true;
      document.getElementById('sessionSub').textContent='종료된 민턴LIVE 링크입니다.';
      document.getElementById('players').className='empty';
      document.getElementById('players').textContent='관리자가 링크를 종료했거나 아직 명단을 공유하지 않았습니다.';
      return;
    }
    if(sessionExpired()){
      showEndedLink();
      return;
    }
    const official=selectedOfficialPlayer();
    if(official&&!officialServerReady()&&!officialGrantError)claimOfficialInvite(official);
    render();
  });
  db.ref(checkinPath()+'/requests').on('value',snap=>{
    const raw=snap.val()||{};
    const rows=Object.keys(raw).map(key=>({key,...raw[key]}));
    statusRequests=rows
      .filter(r=>!r.ignoredAt&&r.type!=='reservation'&&r.status)
      .sort((a,b)=>(a.createdAt||0)-(b.createdAt||0));
    reservationRequests=rows
      .filter(r=>r.type==='reservation'&&(!r.ignoredAt||Date.now()-(r.ignoredAt||0)<10*60*1000))
      .sort((a,b)=>(a.createdAt||0)-(b.createdAt||0));
    queueYieldRequests=rows
      .filter(r=>['queue-yield','queue-defer'].includes(r.type)&&!r.appliedAt&&!r.ignoredAt)
      .sort((a,b)=>(a.createdAt||0)-(b.createdAt||0));
    officialRequests=rows
      .filter(r=>String(r.type||'').startsWith('official-')&&Date.now()-Number(r.createdAt||0)<OFFICIAL_OPERATION_TTL_MS)
      .sort((a,b)=>(a.createdAt||0)-(b.createdAt||0));
    render();
  });
  db.ref(checkinPath()+'/party').on('value',snap=>{
    partyResponses=snap.val()||{};
    render();
  });
  db.ref(checkinPath()+'/operator').on('value',snap=>{
    operatorState=snap.val()||null;
    refreshOfficialConnection();
  });
  document.getElementById('search').addEventListener('input',e=>{
    query=e.target.value.trim();
    if(query)identityLookupOpen=true;
    const fold=document.getElementById('playerListFold');
    if(fold&&query)fold.open=true;
    render();
  });
  if(!eventTimer){
    eventTimer=setInterval(refreshLiveTimers,1000);
  }
  document.addEventListener('visibilitychange',()=>{
    if(!document.hidden)refreshLiveTimers();
  });
}
boot();
</script>
<script>
(function(){
  if(!('serviceWorker' in navigator))return;
  let refreshing=false;
  navigator.serviceWorker.addEventListener('controllerchange',()=>{
    if(refreshing)return;
    refreshing=true;
    location.reload();
  });
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('sw.js').then(reg=>{
      reg.update().catch(()=>{});
      if(reg.waiting)reg.waiting.postMessage('skipWaiting');
      reg.addEventListener('updatefound',()=>{
        const nw=reg.installing;
        if(!nw)return;
        nw.addEventListener('statechange',()=>{
          if(nw.state==='installed'&&navigator.serviceWorker.controller){
            nw.postMessage&&nw.postMessage('skipWaiting');
          }
        });
      });
    }).catch(()=>{});
    document.addEventListener('visibilitychange',()=>{
      if(document.visibilityState==='visible'){
        navigator.serviceWorker.getRegistration().then(r=>r&&r.update()).catch(()=>{});
      }
    });
  });
})();
</script>
