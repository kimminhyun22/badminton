<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#5b8def">
<title>콕매치 민턴LIVE 출석</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f6f8fc;--card:#fff;--line:#e3e9f3;--txt:#18202d;--mut:#6f7a8a;
  --blue:#5b8def;--blue2:#eaf1fe;--green:#35a56a;--red:#e35b55;--amber:#f0a73a;
  --shadow:0 18px 45px rgba(35,55,90,.12);
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:'Noto Sans KR',system-ui,-apple-system,sans-serif;
  background:linear-gradient(180deg,#edf4ff 0%,#f8fafc 46%,#fff 100%);
  color:var(--txt);
}
.wrap{max-width:720px;margin:0 auto;padding:18px 14px 34px}
.hero{
  padding:22px 18px;
  border:1px solid rgba(91,141,239,.22);
  border-radius:26px;
  background:linear-gradient(135deg,#ffffff 0%,#eef5ff 100%);
  box-shadow:var(--shadow);
}
.eyebrow{font-size:13px;font-weight:900;color:#4f78c9;letter-spacing:.02em}
h1{margin:8px 0 8px;font-size:28px;line-height:1.18}
.sub{margin:0;color:var(--mut);font-size:15px;line-height:1.55}
.notice{
  margin:14px 0 0;
  padding:12px 13px;
  border-radius:18px;
  background:rgba(255,255,255,.8);
  border:1px solid var(--line);
  color:#344055;
  font-size:14px;
  line-height:1.5;
}
.last-sent{
  margin:12px 0 0;
  padding:11px 13px;
  border-radius:17px;
  border:1px solid #bbf7d0;
  background:#f0fdf4;
  color:#166534;
  font-size:14px;
  font-weight:900;
  line-height:1.45;
}
.last-sent b{color:#0f5132}
.last-sent.hidden{display:none}
.panel{
  margin-top:16px;
  padding:14px;
  border:1px solid var(--line);
  border-radius:24px;
  background:rgba(255,255,255,.86);
  box-shadow:0 10px 28px rgba(35,55,90,.08);
}
.event-panel.hidden{display:none}
.event-title{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  margin-bottom:10px;
}
.event-title b{font-size:18px}
.event-title span{font-size:12px;color:var(--mut);font-weight:900}
.event-score{
  display:grid;
  grid-template-columns:1fr auto 1fr;
  gap:8px;
  align-items:stretch;
  margin-bottom:10px;
}
.event-team{
  padding:12px 10px;
  border-radius:18px;
  border:1px solid rgba(91,141,239,.24);
  background:#eef5ff;
  text-align:center;
}
.event-team.red{border-color:#ffd3cf;background:#fff1f0}
.event-team span{display:block;font-size:12px;color:var(--mut);font-weight:900}
.event-team b{display:block;margin-top:4px;font-size:32px;line-height:1;color:#315fb2}
.event-team.red b{color:#bd3b35}
.event-vs{display:flex;align-items:center;justify-content:center;color:var(--mut);font-size:12px;font-weight:900}
.event-chip{
  display:inline-flex;
  align-items:center;
  padding:6px 9px;
  border-radius:999px;
  background:#f2f5fa;
  color:#4b5668;
  font-size:12px;
  font-weight:900;
  margin:0 5px 6px 0;
}
.event-chip.gold{background:#fff5df;color:#9a610b}
.event-list{display:flex;flex-direction:column;gap:7px;margin-top:8px}
.event-row{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  padding:10px 11px;
  border:1px solid var(--line);
  border-radius:16px;
  background:#fff;
}
.event-row strong{display:block;font-size:14px}
.event-row small{display:block;color:var(--mut);font-size:12px;margin-top:2px}
.event-row em{
  flex-shrink:0;
  font-style:normal;
  font-size:12px;
  font-weight:900;
  color:#4f78c9;
  background:#eaf1fe;
  border-radius:999px;
  padding:6px 8px;
}
.toolbar{
  display:flex;
  gap:8px;
  align-items:center;
  margin-bottom:12px;
}
.search{
  flex:1;
  height:46px;
  padding:0 14px;
  border:1px solid var(--line);
  border-radius:16px;
  font-size:16px;
  background:#fff;
}
.pill{
  padding:9px 12px;
  border-radius:999px;
  background:var(--blue2);
  color:#406fc7;
  font-weight:900;
  font-size:13px;
  white-space:nowrap;
}
.player{
  padding:14px;
  border:1px solid var(--line);
  border-radius:20px;
  background:#fff;
  margin-top:10px;
}
.player.locked{border-color:#f3cf8f;background:#fffaf0}
.player.recent{border-color:#9bd7ff;box-shadow:0 0 0 4px rgba(91,141,239,.14)}
.phead{
  display:flex;
  justify-content:space-between;
  gap:10px;
  align-items:flex-start;
  margin-bottom:10px;
}
.name{font-size:18px;font-weight:900}
.meta{color:var(--mut);font-size:13px;margin-top:3px}
.badge{
  padding:7px 10px;
  border-radius:999px;
  background:#f2f5fa;
  color:#4b5668;
  font-weight:900;
  font-size:12px;
  white-space:nowrap;
}
.badge.selected{background:#eaf1fe;color:#315fb2}
.buttons{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}
.main-actions{margin-top:10px;grid-template-columns:repeat(2,minmax(0,1fr))}
.status-section{
  margin-top:9px;
  border:1px solid var(--line);
  border-radius:17px;
  background:#fbfcff;
  overflow:hidden;
}
.status-section.active{
  border-color:#9bd7ff;
  background:#f4f8ff;
  box-shadow:0 0 0 3px rgba(91,141,239,.10);
}
.status-section summary{
  cursor:pointer;
  padding:11px 12px;
  font-size:14px;
  font-weight:900;
  color:#344055;
  list-style:none;
  display:flex;
  justify-content:space-between;
  gap:8px;
  align-items:center;
}
.status-section summary::-webkit-details-marker{display:none}
.status-section summary small{
  color:var(--mut);
  font-size:12px;
  font-weight:900;
  white-space:nowrap;
}
.compact-actions{
  padding:0 12px 12px;
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:8px;
}
.game-request{
  margin-top:10px;
  border:1px solid var(--line);
  border-radius:18px;
  background:#fbfcff;
  overflow:hidden;
}
.game-request summary{
  cursor:pointer;
  padding:11px 12px;
  font-size:14px;
  font-weight:900;
  color:#344055;
  list-style:none;
}
.game-request summary::-webkit-details-marker{display:none}
.request-body{padding:0 12px 12px;display:grid;grid-template-columns:1fr 1fr;gap:8px}
.request-body select,.request-body input{
  height:42px;
  border:1px solid var(--line);
  border-radius:13px;
  padding:0 10px;
  font:inherit;
  background:#fff;
  min-width:0;
}
.request-body input{grid-column:1/-1}
.request-body button{grid-column:1/-1;background:var(--blue);color:#fff}
button{
  appearance:none;
  border:1px solid transparent;
  border-radius:15px;
  padding:13px 10px;
  font:inherit;
  font-weight:900;
  background:#f2f5fa;
  color:#273246;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:2px;
  min-height:52px;
  transition:.15s ease;
}
button small{display:block;font-size:11px;font-weight:700;line-height:1.25;color:rgba(39,50,70,.62)}
button.primary small{color:rgba(255,255,255,.82)}
button:disabled{opacity:.55}
button.active{
  background:linear-gradient(135deg,#4d86f7,#315fb2);
  color:#fff;
  border-color:#2d62c8;
  box-shadow:0 9px 22px rgba(49,95,178,.28);
}
button.active small{color:rgba(255,255,255,.86)}
button.sent:not(.applied){background:linear-gradient(135deg,#35a56a,#1e7b4b);border-color:#187347}
.empty{
  padding:28px 14px;
  text-align:center;
  color:var(--mut);
  line-height:1.55;
}
.toast{
  position:fixed;
  left:14px;right:14px;bottom:16px;
  max-width:680px;margin:0 auto;
  padding:14px 16px;
  border-radius:18px;
  background:#18202d;
  color:#fff;
  font-weight:900;
  text-align:center;
  box-shadow:0 16px 44px rgba(0,0,0,.26);
  transform:translateY(120%);
  transition:.22s ease;
  z-index:10;
}
.toast.show{transform:translateY(0)}
@media (min-width:620px){.buttons:not(.main-actions){grid-template-columns:repeat(3,minmax(0,1fr))}}
@media(max-width:520px){.request-body,.compact-actions{grid-template-columns:1fr}}
</style>
</head>
<body>
<main class="wrap">
  <section class="hero">
    <div class="eyebrow">KOKMATCH CHECK-IN</div>
    <h1>민턴LIVE 상태를 알려주세요</h1>
    <p class="sub" id="sessionSub">명단을 불러오는 중입니다.</p>
    <div class="notice">1. 이름/초성으로 내 카드 찾기 → 2. 참석 또는 시작 선택. 버튼에 불이 켜지면 전송 완료입니다.</div>
    <div class="last-sent hidden" id="lastSent"></div>
  </section>
  <section class="panel event-panel hidden" id="eventPanel"></section>
  <section class="panel">
    <div class="toolbar">
      <input id="search" class="search" placeholder="이름·초성 검색 예) 김민현, ㄱㅁㅎ" autocomplete="off">
      <span class="pill" id="countPill">0명</span>
    </div>
    <div id="players" class="empty">명단을 불러오는 중입니다.</div>
  </section>
</main>
<div id="toast" class="toast"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script>
const FB_CONFIG={
  apiKey:"AIzaSyAo2AfN_ekzelCe17x1s6CVqCet0Hsq4II",
  authDomain:"kokmatch-23b31.firebaseapp.com",
  databaseURL:"https://kokmatch-23b31-default-rtdb.firebaseio.com",
  projectId:"kokmatch-23b31",
  storageBucket:"kokmatch-23b31.firebasestorage.app",
  messagingSenderId:"57349245242",
  appId:"1:57349245242:web:6c0ac6f4cc131b44192803"
};
let db=null,checkinId='',session=null,query='',sendingKey='',statusRequests=[];
const CHO=['ㄱ','ㄲ','ㄴ','ㄷ','ㄸ','ㄹ','ㅁ','ㅂ','ㅃ','ㅅ','ㅆ','ㅇ','ㅈ','ㅉ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];
const MAIN_STATUS_KEYS=['planned','wait'];
const SUB_STATUS_KEYS=['lesson','rest','last'];
function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
function qs(k){return new URLSearchParams(location.search).get(k)||'';}
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  clearTimeout(toast._t);toast._t=setTimeout(()=>el.classList.remove('show'),2600);
}
function statusLabel(key){
  const s=(session?.statuses||[]).find(x=>x.key===key);
  return s?.label||key;
}
function statusInfo(key){
  return (session?.statuses||[]).find(x=>x.key===key)||{key,label:statusLabel(key),desc:''};
}
function compactLabel(key){
  const map={planned:'참석',wait:'시작',lesson:'레슨',rest:'휴식',last:'마지막',done:'종료'};
  return map[key]||statusLabel(key);
}
function normalizeText(s){
  return String(s||'').toLowerCase().replace(/\s+/g,'');
}
function chosungText(s){
  return String(s||'').split('').map(ch=>{
    const code=ch.charCodeAt(0)-0xac00;
    if(code>=0&&code<=11171)return CHO[Math.floor(code/588)]||ch;
    return ch;
  }).join('');
}
function playerMatchesQuery(p,q){
  const needle=normalizeText(q);
  if(!needle)return true;
  const name=normalizeText(p.name);
  const cho=normalizeText(chosungText(p.name));
  return name.includes(needle)||cho.includes(needle);
}
function voteDeadlineText(){
  if(!session?.voteDeadlineAt)return '';
  return `${session.voteDeadlineAt} 참석투표 ${session.voteClosed?'마감':'마감 예정'}`;
}
function checkinPath(){
  return 'live/checkin_'+checkinId;
}
function lastKey(){
  return 'kokmatch_checkin_last_'+checkinId;
}
function getLastSent(){
  try{return JSON.parse(localStorage.getItem(lastKey())||'null');}catch(e){return null;}
}
function setLastSent(req){
  try{localStorage.setItem(lastKey(),JSON.stringify({...req,savedAt:Date.now()}));}catch(e){}
}
function latestStatusRequest(playerId){
  return statusRequests
    .filter(r=>r.playerId===playerId&&r.status&&!r.ignoredAt&&r.type!=='reservation')
    .sort((a,b)=>(b.createdAt||0)-(a.createdAt||0))[0]||null;
}
function getSelectedStatus(p){
  const req=latestStatusRequest(p.id);
  const last=getLastSent();
  let selected=p.status;
  let ts=p.lastStatusAt||0;
  if(req&&(req.createdAt||0)>=ts){
    selected=req.status;
    ts=req.createdAt||0;
  }
  if(last&&last.playerId===p.id&&(last.savedAt||0)>=ts){
    selected=last.status;
  }
  return selected;
}
function renderLastSent(){
  const el=document.getElementById('lastSent');
  if(!el)return;
  const last=getLastSent();
  if(!last){
    el.className='last-sent hidden';
    el.textContent='';
    return;
  }
  const when=last.savedAt?new Date(last.savedAt).toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'}):'방금';
  el.className='last-sent';
  el.innerHTML=`최근 전송: <b>${esc(last.playerName)} · ${esc(compactLabel(last.status))}</b> (${esc(when)})`;
}
function remainText(v){
  const n=Number(v);
  if(!Number.isFinite(n))return '진행중';
  return n<=0?'종료임박':`약 ${n}분 남음`;
}
function teamNames(row){
  const a=(row.t1||[]).join(' · ');
  const b=(row.t2||[]).join(' · ');
  return `${a} vs ${b}`;
}
function renderEvent(){
  const el=document.getElementById('eventPanel');
  if(!el)return;
  const ev=session?.event;
  const has=ev&&(ev.activeCount||ev.completed||ev.resultCount||(ev.next||[]).length||(ev.mvp||[]).length);
  if(!has){
    el.className='panel event-panel hidden';
    el.innerHTML='';
    return;
  }
  el.className='panel event-panel';
  const updated=ev.updatedAt?new Date(ev.updatedAt).toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'}):'방금';
  const score=ev.teamMode?`<div class="event-score">
    <div class="event-team"><span>${esc(ev.teamBlue||'청팀')}</span><b>${ev.blueWins||0}</b></div>
    <div class="event-vs">VS</div>
    <div class="event-team red"><span>${esc(ev.teamWhite||'홍팀')}</span><b>${ev.whiteWins||0}</b></div>
  </div>`:'';
  const mvp=(ev.mvp||[]).length?`<span class="event-chip gold">MVP ${esc(ev.mvp.map(x=>x.name).join(' · '))}</span>`:'';
  const summary=`<span class="event-chip">${ev.activeCount||0}경기 진행중</span><span class="event-chip">${ev.completed||0}경기 완료</span>${mvp}`;
  const active=(ev.active||[]).slice(0,4).map(m=>`<div class="event-row">
    <div><strong>${m.court}코트 진행중</strong><small>${esc(teamNames(m))}</small></div>
    <em>${esc(remainText(m.remain))}</em>
  </div>`).join('');
  const next=(ev.next||[]).slice(0,4).map(m=>`<div class="event-row">
    <div><strong>다음 준비 ${m.idx}</strong><small>${esc(teamNames(m))}</small></div>
    <em>대기</em>
  </div>`).join('');
  el.innerHTML=`<div class="event-title"><b>민턴LIVE 현황</b><span>${esc(updated)} 업데이트</span></div>
    ${score}
    <div>${summary}</div>
    ${active?`<div class="event-list">${active}</div>`:''}
    ${next?`<div class="event-list">${next}</div>`:''}`;
}
function render(){
  const sub=document.getElementById('sessionSub');
  const box=document.getElementById('players');
  const count=document.getElementById('countPill');
  if(!session){
    sub.textContent='출석 링크를 확인하고 있습니다.';
    box.className='empty';box.textContent='명단을 불러오는 중입니다.';count.textContent='0명';
    renderLastSent();
    renderEvent();
    return;
  }
  renderLastSent();
  renderEvent();
  const players=(session.players||[]).filter(p=>playerMatchesQuery(p,query));
  const updated=session.updatedAt?new Date(session.updatedAt).toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'}):'방금';
  sub.textContent=`${session.title||'콕매치 민턴LIVE'} · ${updated} 업데이트${voteDeadlineText()?` · ${voteDeadlineText()}`:''}`;
  count.textContent=`${players.length}명`;
  if(!players.length){
    box.className='empty';box.textContent='검색된 선수가 없습니다.';
    return;
  }
  box.className='';
  const last=getLastSent();
  box.innerHTML=players.map(p=>{
    const locked=!!p.locked;
    const voteLocked=!!p.voteLocked;
    const recent=last&&last.playerId===p.id;
    const disabled=sendingKey||voteLocked?'disabled':'';
    const selected=getSelectedStatus(p);
    const requested=!!latestStatusRequest(p.id);
    const highlighted=recent||requested;
    const mainButtons=statusButtons(p,MAIN_STATUS_KEYS,disabled);
    const subSection=statusSection(p,'상태 변경',SUB_STATUS_KEYS,disabled);
    return `<article class="player ${locked?'locked':''} ${highlighted?'recent':''}">
      <div class="phead">
        <div>
          <div class="name">${esc(p.name)}${p.isGuest?' <span class="meta">게스트</span>':''}</div>
          <div class="meta">현재 ${esc(compactLabel(selected))} · ${p.games||0}게임${locked?' · 관리자 확인 필요':''}${voteLocked?' · 투표 마감':''}</div>
        </div>
        <div class="badge ${highlighted?'selected':''}">${highlighted?`선택 ${esc(compactLabel(selected))}`:(voteLocked?'마감':(locked?'확인 후 반영':'바로 반영'))}</div>
      </div>
      <div class="buttons main-actions">${mainButtons}</div>
      ${subSection}
      ${gameRequestBox(p,disabled)}
    </article>`;
  }).join('');
}
function statusButtons(p,keys,disabled){
  const existing=new Set((session?.statuses||[]).map(s=>s.key));
  const selected=getSelectedStatus(p);
  return keys.filter(k=>existing.has(k)).map(k=>{
    const last=getLastSent();
    const applied=p.status===k;
    const sent=last&&last.playerId===p.id&&last.status===k;
    const active=selected===k;
    const action=(k==='wait'&&active)?'done':k;
    const cls=['status-btn',active?'active':'',applied?'applied':'',sent&&!applied?'sent':''].filter(Boolean).join(' ');
    return `<button class="${cls}" ${disabled} onclick="sendStatus('${esc(p.id)}','${esc(action)}')"><span>${esc(compactLabel(k))}</span></button>`;
  }).join('');
}
function statusSection(p,title,keys,disabled){
  const existing=new Set((session?.statuses||[]).map(s=>s.key));
  const usable=keys.filter(k=>existing.has(k));
  if(!usable.length)return '';
  const selected=getSelectedStatus(p);
  const active=usable.includes(selected);
  const state=active?compactLabel(selected):'선택';
  return `<details class="status-section ${active?'active':''}" ${active?'open':''}>
    <summary><span>${esc(title)}</span><small>${esc(state)}</small></summary>
    <div class="compact-actions">${statusButtons(p,usable,disabled)}</div>
  </details>`;
}
function requestPlayerOptions(selfId,selected){
  const players=(session?.players||[]).filter(p=>p.id!==selfId&&!p.voteLocked&&p.status!=='invited'&&p.status!=='done');
  return '<option value="">선택 안 함</option>'+players.map(p=>`<option value="${esc(p.id)}" ${p.id===selected?'selected':''}>${esc(p.name)} · ${esc(compactLabel(p.status))}</option>`).join('');
}
function gameRequestBox(p,disabled){
  if(p.voteLocked||p.status==='invited'||p.status==='done')return '';
  return `<details class="game-request">
    <summary>게임 신청</summary>
    <div class="request-body">
      <select id="reqPartner_${esc(p.id)}">${requestPlayerOptions(p.id,'')}</select>
      <select id="reqOpp1_${esc(p.id)}">${requestPlayerOptions(p.id,'')}</select>
      <select id="reqOpp2_${esc(p.id)}">${requestPlayerOptions(p.id,'')}</select>
      <input id="reqNote_${esc(p.id)}" placeholder="메모 선택: 예) 혼복 연습, 오늘 한 번만">
      <button ${disabled} onclick="sendGameRequest('${esc(p.id)}')">게임 신청 보내기</button>
    </div>
  </details>`;
}
async function sendStatus(playerId,status){
  if(!db||!checkinId||!session||sendingKey)return;
  const p=(session.players||[]).find(x=>x.id===playerId);
  if(!p)return toast('선수를 찾지 못했습니다.');
  if(p.voteLocked)return toast('참석투표가 마감됐습니다. 관리자에게 말해주세요.');
  const last=getLastSent();
  if(last&&last.playerId===p.id&&last.status===status&&Date.now()-(last.savedAt||0)<10000){
    return toast('방금 같은 상태를 전송했어요.');
  }
  sendingKey=playerId+'_'+status;
  render();
  const req={
    playerId:p.id,
    playerName:p.name,
    status,
    statusLabel:compactLabel(status),
    createdAt:Date.now(),
    source:'member-checkin'
  };
  try{
    await db.ref(checkinPath()+'/requests').push(req);
    setLastSent(req);
    toast(`${p.name} · ${compactLabel(status)} 전송 완료`);
  }catch(e){
    toast('전송에 실패했습니다. 잠시 후 다시 눌러주세요.');
  }finally{
    sendingKey='';
    render();
  }
}
async function sendGameRequest(playerId){
  if(!db||!checkinId||!session||sendingKey)return;
  const p=(session.players||[]).find(x=>x.id===playerId);
  if(!p)return toast('선수를 찾지 못했습니다.');
  if(p.voteLocked)return toast('참석투표가 마감됐습니다. 관리자에게 말해주세요.');
  const partnerId=document.getElementById('reqPartner_'+playerId)?.value||'';
  const opp1=document.getElementById('reqOpp1_'+playerId)?.value||'';
  const opp2=document.getElementById('reqOpp2_'+playerId)?.value||'';
  const ids=[playerId,partnerId,opp1,opp2].filter(Boolean);
  if(!partnerId)return toast('같은 편으로 뛸 선수를 선택해 주세요.');
  if(new Set(ids).size!==ids.length)return toast('같은 선수가 중복 선택됐어요.');
  if((opp1&&!opp2)||(!opp1&&opp2))return toast('상대를 지정하려면 2명을 모두 선택해 주세요.');
  const mode=opp1&&opp2?'match':'pair';
  const req={
    type:'reservation',
    mode,
    playerId:p.id,
    playerName:p.name,
    team1:[p.id,partnerId],
    team2:mode==='match'?[opp1,opp2]:[],
    note:(document.getElementById('reqNote_'+playerId)?.value||'').trim(),
    createdAt:Date.now(),
    source:'member-game-request'
  };
  sendingKey=playerId+'_reservation';
  render();
  try{
    await db.ref(checkinPath()+'/requests').push(req);
    toast(mode==='match'?'4명 경기 신청을 보냈어요.':'같은 편 신청을 보냈어요.');
  }catch(e){
    toast('전송에 실패했습니다. 잠시 후 다시 눌러주세요.');
  }finally{
    sendingKey='';
    render();
  }
}
function boot(){
  checkinId=qs('id');
  if(!checkinId){
    document.getElementById('players').textContent='출석 링크가 올바르지 않습니다.';
    return;
  }
  try{
    firebase.initializeApp(FB_CONFIG);
    db=firebase.database();
  }catch(e){
    document.getElementById('players').textContent='서버 연결에 실패했습니다.';
    return;
  }
  db.ref(checkinPath()+'/session').on('value',snap=>{
    session=snap.val();
    if(!session){
      renderEvent();
      document.getElementById('sessionSub').textContent='종료된 출석 링크입니다.';
      document.getElementById('players').className='empty';
      document.getElementById('players').textContent='관리자가 링크를 종료했거나 아직 명단을 공유하지 않았습니다.';
      return;
    }
    render();
  });
  db.ref(checkinPath()+'/requests').on('value',snap=>{
    const raw=snap.val()||{};
    statusRequests=Object.keys(raw).map(key=>({key,...raw[key]}))
      .filter(r=>!r.ignoredAt&&r.type!=='reservation'&&r.status)
      .sort((a,b)=>(a.createdAt||0)-(b.createdAt||0));
    render();
  });
  document.getElementById('search').addEventListener('input',e=>{
    query=e.target.value.trim();
    render();
  });
}
boot();
</script>
