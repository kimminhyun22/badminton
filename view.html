<style>
:root{
  --bg:#f7f8fb;--sur:#ffffff;--sur2:#f3f5f9;
  --bdr:#e9edf3;--bdr2:#d4dae4;
  --txt:#2b3038;--dim:#737a86;--dim2:#a2a9b5;
  --bl:#5b8def;--bl-deep:#4a78d6;--bl-soft:#eaf1fe;--bl-softbdr:#d3e2fc;
  --red:#e8736f;--amber:#c79134;
  --women-soft:#fbeef3;--men-soft:#eaf1fe;--mixed-soft:#f2edfb;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--txt);padding:14px;max-width:600px;margin:0 auto;-webkit-text-size-adjust:100%;}
.head{display:flex;align-items:center;gap:8px;padding:6px 2px 14px;}
.head h1{font-size:1.15rem;font-weight:900;}
.live-dot{width:9px;height:9px;border-radius:50%;background:var(--red);animation:pulse 1.4s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.live-label{font-size:.7rem;color:var(--red);font-weight:700;}
.status{text-align:center;padding:40px 16px;color:var(--dim);font-size:.9rem;}
.title{font-size:1rem;font-weight:700;text-align:center;margin-bottom:12px;color:var(--txt);}
/* 팀 스코어 */
.team-score{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:10px;background:var(--sur);border:1px solid var(--bdr);border-radius:16px;padding:18px 16px;margin-bottom:14px;box-shadow:0 1px 3px rgba(45,55,75,.06);}
.ts-side{text-align:center;}
.ts-name{font-size:.8rem;font-weight:700;color:var(--dim);margin-bottom:4px;}
.ts-wins{font-size:2.4rem;font-weight:900;line-height:1;}
.ts-blue .ts-wins{color:var(--bl-deep);}
.ts-white .ts-wins{color:var(--amber);}
.ts-vs{font-size:.85rem;font-weight:700;color:var(--dim2);}
.ts-lead{text-align:center;font-size:.78rem;font-weight:700;margin-bottom:14px;padding:7px;border-radius:9px;background:var(--bl-soft);color:var(--bl-deep);}
.ts-lead.tie{background:var(--sur2);color:var(--dim);}
.ts-lead.white-lead{background:#fdf3e0;color:var(--amber);}
.gauge-wrap{display:flex;flex-direction:column;align-items:center;margin-bottom:14px;}
.gauge-sec{animation:secIn .6s ease-out both;}
@keyframes secIn{from{opacity:0;}to{opacity:1;}}
.gauge-arc{animation:arcIn .6s ease-out both;}
@keyframes arcIn{from{opacity:0;}to{opacity:1;}}
.needle-grp{transform-origin:150px 158px;transform:rotate(0deg);}
.gauge-svg{width:100%;max-width:300px;height:auto;}
.gauge-needle{transform-origin:140px 130px;}
.gauge-needle.settle{transition:transform .9s cubic-bezier(.34,1.56,.64,1);}
.gauge-title{font-size:.7rem;font-weight:700;color:var(--dim);letter-spacing:1px;margin-bottom:2px;}
.gauge-caption{font-size:.82rem;font-weight:800;color:var(--dim);margin-top:4px;}
.gauge-caption.blue{color:var(--bl-deep);}
.gauge-caption.red{color:#d3332e;}
50%{r:9;opacity:.7;}}
12%{transform:rotate(-58deg);}28%{transform:rotate(52deg);}44%{transform:rotate(-38deg);}60%{transform:rotate(30deg);}74%{transform:rotate(-18deg);}86%{transform:rotate(12deg);}100%{transform:rotate(0deg);}}
/* 진행 정보 */
.progress{text-align:center;font-size:.76rem;color:var(--dim);background:var(--sur2);border:1px solid var(--bdr);border-radius:8px;padding:8px;margin-bottom:14px;}
.mvp-card{position:relative;overflow:hidden;background:linear-gradient(135deg,#fbbf24 0%,#f59e0b 55%,#d97706 100%);border:none;border-radius:18px;padding:18px 16px;margin-bottom:14px;text-align:center;box-shadow:0 6px 20px rgba(217,119,6,.28);}
.mvp-card::after{content:"";position:absolute;top:-40%;left:-30%;width:60%;height:180%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.35),transparent);transform:rotate(20deg);animation:mvpShine 3.6s ease-in-out infinite;}
@keyframes mvpShine{0%{left:-40%;}60%,100%{left:130%;}}
.mvp-label{position:relative;z-index:1;font-size:.74rem;font-weight:800;color:#fff7e6;letter-spacing:.3px;margin-bottom:10px;text-shadow:0 1px 2px rgba(146,64,14,.4);}
.mvp-names{position:relative;z-index:1;display:flex;flex-wrap:wrap;gap:6px;justify-content:center;}
.mvp-chip{display:inline-block;background:rgba(255,255,255,.96);color:#b45309;font-size:1.02rem;font-weight:800;letter-spacing:-.3px;padding:5px 14px;border-radius:999px;box-shadow:0 2px 5px rgba(146,64,14,.18);}
.mvp-chip.solo{font-size:1.45rem;padding:7px 22px;}
.mvp-sub{position:relative;z-index:1;font-size:.78rem;font-weight:700;color:#fffbeb;margin-top:11px;text-shadow:0 1px 2px rgba(146,64,14,.35);}
/* 경기 종료 축하 연출 */
.finale{position:relative;overflow:hidden;background:linear-gradient(135deg,#6366f1 0%,#8b5cf6 50%,#ec4899 100%);border-radius:20px;padding:26px 18px;margin-bottom:16px;text-align:center;box-shadow:0 10px 30px rgba(124,58,237,.35);animation:finalePop .6s cubic-bezier(.18,1.25,.4,1);}
@keyframes finalePop{0%{transform:scale(.88);opacity:0;}100%{transform:scale(1);opacity:1;}}
.finale-crown{font-size:2.4rem;line-height:1;margin-bottom:8px;animation:crownBob 2s ease-in-out infinite;}
@keyframes crownBob{0%,100%{transform:translateY(0) rotate(-4deg);}50%{transform:translateY(-6px) rotate(4deg);}}
.finale-label{font-size:.8rem;font-weight:800;letter-spacing:2px;color:rgba(255,255,255,.9);margin-bottom:8px;}
.finale-title{font-size:1.6rem;font-weight:900;color:#fff;letter-spacing:-.5px;line-height:1.2;text-shadow:0 2px 8px rgba(76,29,149,.4);}
.finale-sub{font-size:.85rem;font-weight:700;color:rgba(255,255,255,.92);margin-top:10px;}
#confetti{position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:9999;}
/* 브리핑 */
.roster-bar{display:flex;gap:8px;margin-bottom:10px;}
.roster-btn{flex:1;padding:8px 12px;border:1.5px solid var(--bdr);border-radius:10px;background:var(--sur);font-family:'Noto Sans KR',sans-serif;font-size:.78rem;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:5px;justify-content:center;}
.roster-btn.t1side{border-color:#b3cef7;color:#4a78d6;background:#eaf1fe;}
.roster-btn.t2side{border-color:#f7c3c2;color:#d84f4a;background:#fdf0f0;}
.roster-panel{background:var(--sur);border:1.5px solid var(--bdr);border-radius:10px;padding:12px 14px;margin-bottom:10px;}
.roster-panel-title{font-size:.72rem;font-weight:800;color:var(--dim);margin-bottom:6px;letter-spacing:.5px;}
.roster-names{font-size:.86rem;font-weight:600;color:var(--txt);line-height:1.8;}
.roster-dot-b{color:#5b8def;font-size:.6rem;}
.roster-dot-r{color:#d84f4a;font-size:.6rem;}
.briefing{background:linear-gradient(135deg,#f0f6ff,#f8f0ff);border:1.5px solid #d4e2fc;border-radius:16px;padding:16px;margin-bottom:14px;}
.brief-title{font-size:.7rem;font-weight:800;color:var(--dim);letter-spacing:1.5px;margin-bottom:8px;}
.brief-situation{font-size:1.1rem;font-weight:900;color:var(--txt);margin-bottom:10px;letter-spacing:-.3px;}
.brief-row{font-size:.82rem;font-weight:600;color:var(--txt);padding:4px 0;display:flex;align-items:center;gap:6px;}
.brief-dot-b{color:#5b8def;font-size:.6rem;}
.brief-dot-r{color:#d84f4a;font-size:.6rem;}
.brief-momentum{margin-top:8px;font-size:.78rem;font-weight:700;color:var(--dim);border-top:1px solid var(--bdr);padding-top:8px;}
.brief-b{color:#4a78d6;}
.brief-r{color:#d84f4a;}
.streak-box{display:flex;flex-wrap:wrap;gap:7px;justify-content:center;margin-bottom:14px;}
.streak-chip{display:inline-flex;align-items:center;gap:5px;background:linear-gradient(135deg,#ffece0,#ffd9c2);border:1px solid #f5c4a8;border-radius:999px;padding:6px 13px;font-size:.8rem;font-weight:700;color:#c2511e;box-shadow:0 1px 4px rgba(224,100,40,.15);}
.streak-fire{font-size:.95rem;animation:flicker 1.1s ease-in-out infinite;}
@keyframes flicker{0%,100%{transform:scale(1);opacity:1;}50%{transform:scale(1.18);opacity:.85;}}
.streak-n{font-weight:900;}
.streak-hot{background:linear-gradient(135deg,#ffe0e0,#ffc2c2);border-color:#f5a8a8;color:#d8362f;}
.rank-box{background:var(--sur);border:1px solid var(--bdr);border-radius:14px;padding:6px;margin-bottom:14px;}
.rank-title{font-size:.7rem;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:1px;padding:8px 10px 6px;}
.rank-row{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:9px;font-size:.84rem;}
.rank-row.top{background:var(--bl-soft);}
.rank-medal{min-width:22px;text-align:center;font-weight:700;font-size:.92rem;color:var(--dim);}
.rank-name{flex:1;font-weight:700;}
.rank-rec{font-size:.76rem;color:var(--dim);}
.rank-rate{font-weight:700;color:var(--bl-deep);min-width:42px;text-align:right;}
/* 라운드 블록 */
.round{margin-bottom:20px;}
.round-h{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.round-badge{font-weight:900;font-size:.86rem;letter-spacing:1px;padding:5px 16px;border-radius:8px;background:var(--sur2);color:var(--dim);border:1px solid var(--bdr);}
.round.cur .round-badge{background:#d84f4a;color:#fff;border-color:#d84f4a;box-shadow:0 2px 8px rgba(216,79,74,.3);}
.now{font-size:.68rem;font-weight:800;color:#fff;background:#d84f4a;border-radius:999px;padding:3px 11px;animation:pulse 1.4s ease-in-out infinite;letter-spacing:.3px;}
.round.cur{background:rgba(216,79,74,.04);border-radius:14px;padding:12px 10px;margin-left:-10px;margin-right:-10px;border:1.5px solid rgba(216,79,74,.18);}
.round-line{flex:1;height:1.5px;background:var(--bdr);}
/* 경기 카드 */
.match{background:var(--sur);border:1px solid var(--bdr);border-radius:14px;padding:14px;margin-bottom:10px;box-shadow:0 1px 4px rgba(45,55,75,.06);}
.match.women{border-left:4px solid #d99bb0;}
.match.men{border-left:4px solid #7fa8f2;}
.match.mixed{border-left:4px solid #b3a0db;}
.m-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.m-type{font-size:.72rem;font-weight:700;padding:3px 10px;border-radius:6px;}
.m-type.women{background:var(--women-soft);color:#b06b85;}
.m-type.men{background:var(--men-soft);color:var(--bl-deep);}
.m-type.mixed{background:var(--mixed-soft);color:#7d68b0;}
/* 코트 번호 크고 선명하게 */
.m-court{font-size:.9rem;font-weight:900;color:var(--txt);background:var(--sur2);border:1.5px solid var(--bdr2);border-radius:8px;padding:3px 12px;letter-spacing:.5px;}
.m-body{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px;}
/* 청팀/홍팀 배경색 */
.m-team{padding:10px;border-radius:10px;background:#eaf1fe;}
.m-team.t2side{background:#fdf0f0;}
.m-team.win{border:2px solid currentColor;}
.m-team.t1side.win{background:#d6e8ff;border-color:#5b8def;}
.m-team.t2side.win{background:#fddcdb;border-color:#d84f4a;}
.m-team.win .m-player{opacity:.82;}
.m-player{font-size:.92rem;font-weight:700;line-height:1.6;}
.m-grade{font-size:.7rem;color:var(--dim2);font-weight:500;}
.m-vs{font-size:.72rem;font-weight:700;color:var(--dim2);text-align:center;}
/* 팀 라벨 (청/홍) */
.m-team-label{font-size:.62rem;font-weight:800;letter-spacing:.5px;margin-bottom:4px;opacity:.7;}
.m-team.t1side .m-team-label{color:#4a78d6;}
.m-team.t2side .m-team-label{color:#d84f4a;}
.m-team{position:relative;overflow:hidden;}
.win-stamp{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) rotate(-14deg);
  border:3px solid #e0463f;color:#e0463f;border-radius:10px;
  font-family:'Noto Sans KR',sans-serif;font-weight:900;font-size:1.15rem;letter-spacing:2px;
  padding:3px 12px;background:rgba(255,255,255,.35);
  box-shadow:0 0 0 2px rgba(224,70,63,.15);
  text-shadow:0 1px 0 rgba(255,255,255,.4);
  pointer-events:none;white-space:nowrap;
  animation:stampIn .35s cubic-bezier(.2,1.3,.6,1) both;}
@keyframes stampIn{0%{transform:translate(-50%,-50%) rotate(-14deg) scale(2.2);opacity:0;}
  60%{opacity:1;}100%{transform:translate(-50%,-50%) rotate(-14deg) scale(1);opacity:1;}}
.foot{text-align:center;font-size:.66rem;color:var(--dim2);padding:18px 0 12px;line-height:1.9;}
.foot b{color:var(--txt);font-weight:700;}
.refresh-note{text-align:center;font-size:.68rem;color:var(--dim);margin-top:4px;}
/* 바로가기 플로팅 버튼 */
.jump-fab{position:fixed;right:14px;z-index:900;display:flex;flex-direction:column;gap:8px;}
.jump-fab.bottom{bottom:18px;}
.jb{display:flex;align-items:center;gap:6px;padding:10px 14px;border:none;border-radius:999px;font-family:'Noto Sans KR',sans-serif;font-weight:700;font-size:.76rem;cursor:pointer;box-shadow:0 3px 12px rgba(45,55,75,.18);}
.jb-now{background:#fdeceb;color:#d84f4a;}
.jb-score{background:var(--bl);color:#fff;}
.jb:active{transform:scale(.96);}
</style>
</head>

function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

const params=new URLSearchParams(location.search);
const liveId=(params.get('id')||'').toUpperCase();

const content=document.getElementById('content');

if(!liveId){
  content.innerHTML='<div class="status">잘못된 링크입니다.<br>대회 ID가 없습니다.</div>';

function buildGauge(bW, wW, blueName, whiteName){
  var tot=bW+wW;
  var bShare = tot>0 ? bW/tot : 0.5;
  var cx=150, cy=162, r=100, sw=58;
  var A0=150, A1=390;
  var span=A1-A0;
  function pt(deg, rad){ var a=deg*Math.PI/180; return [cx+rad*Math.cos(a), cy+rad*Math.sin(a)]; }
  function arcPath(d0, d1, rad){ var p0=pt(d0,rad), p1=pt(d1,rad); var large=(d1-d0)>180?1:0; return "M "+p0[0].toFixed(1)+" "+p0[1].toFixed(1)+" A "+rad+" "+rad+" 0 "+large+" 1 "+p1[0].toFixed(1)+" "+p1[1].toFixed(1); }
  var boundary=A0+span*bShare;
  var ticks='';
  var nT=16;
  for(var t=0;t<=nT;t++){ var td=A0+span*(t/nT); var o=pt(td,r+sw/2-2), i2=pt(td,r-sw/2+2); ticks+='<line x1="'+o[0].toFixed(1)+'" y1="'+o[1].toFixed(1)+'" x2="'+i2[0].toFixed(1)+'" y2="'+i2[1].toFixed(1)+'" stroke="var(--bg)" stroke-width="3.5"/>'; }
  var bluePart = tot>0 && bW>0 ? arcPath(A0, boundary, r) : "";
  var redPart = tot>0 && wW>0 ? arcPath(boundary, A1, r) : "";
  var fullPart = arcPath(A0, A1, r);
  var needleLen = r+sw/2+4;
  var settleDeg = boundary - 270;
  var svg='<svg class="gauge-svg" viewBox="0 0 300 285" xmlns="http://www.w3.org/2000/svg">'
    +'<defs>'
    +'<linearGradient id="gBlue" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#aac6f7"/><stop offset="45%" stop-color="#5b8def"/><stop offset="100%" stop-color="#1f47a0"/></linearGradient>'
    +'<linearGradient id="gRed" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#f9b3af"/><stop offset="45%" stop-color="#ea5b55"/><stop offset="100%" stop-color="#a81f1a"/></linearGradient>'
    +'<filter id="glow" x="-30%" y="-30%" width="160%" height="160%"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>'
    +'</defs>'
    +'<path d="'+fullPart+'" fill="none" stroke="var(--sur2)" stroke-width="'+sw+'" stroke-linecap="butt"/>'
    +(bluePart? '<path d="'+bluePart+'" fill="none" stroke="url(#gBlue)" stroke-width="'+sw+'" stroke-linecap="butt" opacity="0.22" filter="url(#glow)"/>':'')
    +(redPart? '<path d="'+redPart+'" fill="none" stroke="url(#gRed)" stroke-width="'+sw+'" stroke-linecap="butt" opacity="0.22" filter="url(#glow)"/>':'')
    +(bluePart? '<path class="gauge-arc" d="'+bluePart+'" fill="none" stroke="url(#gBlue)" stroke-width="'+sw+'" stroke-linecap="butt"/>':'')
    +(redPart? '<path class="gauge-arc" d="'+redPart+'" fill="none" stroke="url(#gRed)" stroke-width="'+sw+'" stroke-linecap="butt"/>':'')
    +ticks
    +'<text x="150" y="154" text-anchor="middle" font-size="58" font-weight="900" letter-spacing="-2">'
      +'<tspan fill="#2f5fc0">'+bW+'</tspan>'
      +'<tspan fill="var(--dim2)" font-size="34" dx="4" dy="-3"> : </tspan>'
      +'<tspan fill="#d3332e" dy="3">'+wW+'</tspan>'
    +'</text>'
    +'<text x="150" y="183" text-anchor="middle" font-size="12" font-weight="700" fill="var(--dim2)" letter-spacing="3">VS</text>'
    +'<g class="needle-grp" id="needleGrp" style="transform-origin:150px 162px;">'
    +'<line x1="150" y1="162" x2="150" y2="'+(162-needleLen).toFixed(1)+'" stroke="#9aa1ad" stroke-width="4.5" stroke-linecap="round"/>'
    +'<line x1="150" y1="162" x2="150" y2="178" stroke="#c2c8d2" stroke-width="4.5" stroke-linecap="round"/>'
    +'</g>'
    +'<circle cx="150" cy="162" r="11" fill="#9aa1ad"/><circle cx="150" cy="162" r="5" fill="var(--sur)"/>'
    +'</svg>';
  setTimeout(function(){ var g=document.getElementById("needleGrp"); if(!g) return;
    var seq=[ -60, 50, -40, 30, -18, 10, 0 ]; var idx=0;
    function step(){ if(idx>=seq.length){ g.style.transition="transform .55s cubic-bezier(.34,1.45,.6,1)"; g.style.transform="rotate("+settleDeg+"deg)"; return; }
      g.style.transition="transform .15s ease-in-out"; g.style.transform="rotate("+seq[idx]+"deg)"; idx++; setTimeout(step,150); }
    step();
  }, 150);
  return '<div class="gauge-wrap" id="scoreBoard">'+svg+'</div>';
}

function buildStreaks(matches){
  const ordered=[...matches].filter(m=>m.win).sort((a,b)=>(a.round-b.round)||(a.court-b.court));
  const streak={};
  ordered.forEach(m=>{
    const winners=m.win==='t1'?[m.t1[0],m.t1[1]]:[m.t2[0],m.t2[1]];
    const losers=m.win==='t1'?[m.t2[0],m.t2[1]]:[m.t1[0],m.t1[1]];
    winners.forEach(n=>{ if(n)streak[n]=(streak[n]||0)+1; });
    losers.forEach(n=>{ if(n)streak[n]=0; });
  });
  const hot=Object.entries(streak).filter(([n,c])=>c>=2).sort((a,b)=>b[1]-a[1]);
  if(!hot.length) return '';
  let html='<div class="streak-box">';
  hot.forEach(([n,c])=>{
    const isHot=c>=3;
    html+='<span class="streak-chip'+(isHot?' streak-hot':'')+'"><span class="streak-fire">🔥</span>'+esc(n)+' <span class="streak-n">'+c+'연승</span></span>';
  });
  html+='</div>';
  return html;
}

/* AI 브리핑: 청/홍팀 현황 요약 */
function buildBriefing(matches, d){
  if(!d.isTeam) return '';
  const bW=d.blueWins||0, wW=d.whiteWins||0;
  const total=bW+wW;
  const bn=esc(d.teamBlue||'청팀'), wn=esc(d.teamWhite||'홍팀');
  if(total===0) return '';

  // 팀별 선수 승/패 집계
  const bPlayers={}, rPlayers={};
  const members=d.members||{};
  const bNames=new Set(members.blue||[]);
  const rNames=new Set(members.red||[]);

  matches.filter(m=>m.win).forEach(m=>{
    const winners=m.win==='t1'?[m.t1[0],m.t1[1]]:[m.t2[0],m.t2[1]];
    const losers=m.win==='t1'?[m.t2[0],m.t2[1]]:[m.t1[0],m.t1[1]];
    [...winners,...losers].forEach((n,i)=>{
      const isWin=i<2;
      const tgt=bNames.has(n)?bPlayers:rPlayers;
      if(!tgt[n])tgt[n]={w:0,l:0};
      isWin?tgt[n].w++:tgt[n].l++;
    });
  });

  // 각 팀 MVP (승리 많은 선수)
  const topPlayer=(stat)=>{
    const arr=Object.entries(stat).filter(([,s])=>s.w>0).sort((a,b)=>b[1].w-a[1].w||a[1].l-b[1].l);
    return arr.length?{name:arr[0][0],...arr[0][1]}:null;
  };
  const bTop=topPlayer(bPlayers), rTop=topPlayer(rPlayers);

  // 최근 3경기 흐름
  const recent=[...matches].filter(m=>m.win).sort((a,b)=>(b.round-a.round)||(b.court-a.court)).slice(0,5);
  let bRec=0,rRec=0;
  recent.forEach(m=>{
    const isT1blue=bNames.has(m.t1[0])||bNames.has(m.t1[1]);
    const winner=m.win==='t1'?isT1blue:!isT1blue;
    winner?bRec++:rRec++;
  });

  const gap=Math.abs(bW-wW);
  let situation='';
  if(bW>wW) situation=`<b class="brief-b">${bn}</b> ${gap}승 앞서는 중`;
  else if(wW>bW) situation=`<b class="brief-r">${wn}</b> ${gap}승 앞서는 중`;
  else situation='동점 팽팽';

  const momentum=bRec>rRec?`<b class="brief-b">${bn}</b> 최근 흐름 우세`
    :rRec>bRec?`<b class="brief-r">${wn}</b> 최근 흐름 우세`:'양팀 팽팽히 맞서는 중';

  let bLine=`${bn} ${bW}승 ${wW>bW?'(추격 중)':bW>wW?'(선두)':'(동점)'}`;
  let rLine=`${wn} ${wW}승 ${bW>wW?'(추격 중)':wW>bW?'(선두)':'(동점)'}`;
  if(bTop) bLine+=` · 에이스 ${esc(bTop.name)} ${bTop.w}승`;
  if(rTop) rLine+=` · 에이스 ${esc(rTop.name)} ${rTop.w}승`;

  return '<div class="briefing">'
    +'<div class="brief-title">📢 지금 현황</div>'
    +'<div class="brief-situation">'+situation+'</div>'
    +'<div class="brief-row brief-row-b"><span class="brief-dot-b">●</span>'+bLine+'</div>'
    +'<div class="brief-row brief-row-r"><span class="brief-dot-r">●</span>'+rLine+'</div>'
    +'<div class="brief-momentum">'+momentum+'</div>'
    +'</div>';
}

function buildRanking(matches, d){
  const goal=(typeof d.gamesPerPlayer==='number'&&d.gamesPerPlayer>0)?d.gamesPerPlayer:4;
  const stat={}; const played={};
  const ordered=[...matches].sort((a,b)=>(a.round-b.round)||(a.court-b.court));
  ordered.forEach(m=>{
    const four=[m.t1[0],m.t1[1],m.t2[0],m.t2[1]];
    four.forEach(n=>{ if(!n)return; if(!stat[n])stat[n]={name:n,w:0,l:0}; if(played[n]==null)played[n]=0; });
    const within={};
    four.forEach(n=>{ if(!n)return; played[n]++; within[n]=played[n]<=goal; });
    if(!m.win) return;
    const winners=m.win==='t1'?[m.t1[0],m.t1[1]]:[m.t2[0],m.t2[1]];
    const losers=m.win==='t1'?[m.t2[0],m.t2[1]]:[m.t1[0],m.t1[1]];
    winners.forEach(n=>{ if(n&&within[n])stat[n].w++; });
    losers.forEach(n=>{ if(n&&within[n])stat[n].l++; });
  });
  const arr=Object.values(stat).filter(s=>(s.w+s.l)>0);
  if(arr.length<2) return '';
  const rate=s=>(s.w+s.l)>0?s.w/(s.w+s.l):0;
  const rateStr=s=>(s.w+s.l)>0?Math.round(rate(s)*100)+'%':'—';
  const byRate=[...arr].sort((a,b)=>rate(b)-rate(a)||b.w-a.w);
  const byWin=[...arr].sort((a,b)=>b.w-a.w||rate(b)-rate(a));
  const sameRank=(a,b)=>a&&b&&a.w===b.w&&Math.round(rate(a)*100)===Math.round(rate(b)*100);
  const top=byRate[0];
  const mvps=byRate.filter(s=>sameRank(s,top));
  let html='';
  const _solo=mvps.length===1?' solo':'';
  html+='<div class="mvp-card"><div class="mvp-label">🏆 실시간 MVP'+(mvps.length>1?' · 공동 '+mvps.length+'명':'')+'</div>'
    +'<div class="mvp-names">'+mvps.map(s=>'<span class="mvp-chip'+_solo+'">'+esc(s.name)+'</span>').join('')+'</div>'
    +'<div class="mvp-sub">'+top.w+'승 '+top.l+'패 · 승률 '+rateStr(top)+'</div></div>';
  html+='<div class="rank-box"><div class="rank-title">전적 순위</div>';
  let rankNum=0,prev=null;
  byWin.slice(0,5).forEach((s,i)=>{
    if(prev===null||!sameRank(s,prev))rankNum=i+1; prev=s;
    const medal=rankNum===1?'🥇':rankNum===2?'🥈':rankNum===3?'🥉':rankNum;
    html+='<div class="rank-row'+(rankNum<=3?' top':'')+'">'
      +'<span class="rank-medal">'+medal+'</span>'
      +'<span class="rank-name">'+esc(s.name)+'</span>'
      +'<span class="rank-rec">'+s.w+'승 '+s.l+'패</span>'
      +'<span class="rank-rate">'+rateStr(s)+'</span></div>';
  });
  html+='</div>';
  return html;
}

function buildFinale(matches, d){
  let label='🎉 경기 종료', title='', sub='수고하셨습니다!';
  if(d.isTeam){
    const bW=d.blueWins||0, wW=d.whiteWins||0;
    if(bW>wW){ title='🔵 '+esc(d.teamBlue||'청 팀')+' 우승!'; sub=bW+' : '+wW+' 승리'; }
    else if(wW>bW){ title='🔴 '+esc(d.teamWhite||'홍 팀')+' 우승!'; sub=wW+' : '+bW+' 승리'; }
    else { title='⚖️ 무승부!'; sub=bW+' : '+wW+' 동점'; }
  } else {
    const goal=(typeof d.gamesPerPlayer==='number'&&d.gamesPerPlayer>0)?d.gamesPerPlayer:4;
    const stat={}, played={};
    [...matches].sort((a,b)=>(a.round-b.round)||(a.court-b.court)).forEach(m=>{
      const four=[m.t1[0],m.t1[1],m.t2[0],m.t2[1]];
      four.forEach(n=>{ if(!n)return; if(!stat[n])stat[n]={name:n,w:0,l:0}; if(played[n]==null)played[n]=0; });
      const within={};
      four.forEach(n=>{ if(!n)return; played[n]++; within[n]=played[n]<=goal; });
      if(!m.win)return;
      const W=m.win==='t1'?[m.t1[0],m.t1[1]]:[m.t2[0],m.t2[1]];
      const L=m.win==='t1'?[m.t2[0],m.t2[1]]:[m.t1[0],m.t1[1]];
      W.forEach(n=>{ if(n&&within[n])stat[n].w++; });
      L.forEach(n=>{ if(n&&within[n])stat[n].l++; });
    });
    const arr=Object.values(stat).filter(s=>(s.w+s.l)>0);
    if(arr.length){
      const rate=s=>s.w/(s.w+s.l);
      const byRate=[...arr].sort((a,b)=>rate(b)-rate(a)||b.w-a.w);
      const top=byRate[0];
      const champs=byRate.filter(s=>s.w===top.w&&Math.round(rate(s)*100)===Math.round(rate(top)*100));
      title='🏆 '+champs.map(s=>esc(s.name)).join(' · ')+(champs.length>1?' 공동 우승!':' 우승!');
      sub=top.w+'승 '+top.l+'패 · 승률 '+Math.round(rate(top)*100)+'%';
    } else { title='🏸 모든 경기 완료!'; }
  }
  if(!window._finaleFired){ window._finaleFired=true; setTimeout(fireConfetti, 350); }
  return '<div class="finale"><div class="finale-crown">👑</div>'
    +'<div class="finale-label">'+label+'</div>'
    +'<div class="finale-title">'+title+'</div>'
    +'<div class="finale-sub">'+sub+'</div></div>';
}

function fireConfetti(){
  let cv=document.getElementById('confetti');
  if(!cv){ cv=document.createElement('canvas'); cv.id='confetti'; document.body.appendChild(cv); }
  const ctx=cv.getContext('2d');
  const dpr=window.devicePixelRatio||1;
  cv.width=innerWidth*dpr; cv.height=innerHeight*dpr;
  const colors=['#fbbf24','#f59e0b','#ef4444','#ec4899','#8b5cf6','#6366f1','#22c55e','#3b82f6'];
  const N=140, parts=[];
  for(let i=0;i<N;i++){
    parts.push({ x:innerWidth*(.2+Math.random()*.6)*dpr, y:-20*dpr,
      vx:(Math.random()-.5)*5*dpr, vy:(2+Math.random()*4)*dpr, g:.12*dpr,
      w:(6+Math.random()*6)*dpr, h:(8+Math.random()*8)*dpr,
      rot:Math.random()*Math.PI, vr:(Math.random()-.5)*.3,
      c:colors[(Math.random()*colors.length)|0], life:0, max:120+Math.random()*60 });
  }
  let frame=0;
  function tick(){
    ctx.clearRect(0,0,cv.width,cv.height); let alive=false;
    parts.forEach(p=>{ if(p.life>p.max)return; alive=true;
      p.life++; p.vy+=p.g; p.x+=p.vx; p.y+=p.vy; p.rot+=p.vr;
      const a=Math.max(0,1-(p.life/p.max));
      ctx.save(); ctx.globalAlpha=a; ctx.translate(p.x,p.y); ctx.rotate(p.rot);
      ctx.fillStyle=p.c; ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h); ctx.restore(); });
    frame++;
    if(alive&&frame<260) requestAnimationFrame(tick);
    else ctx.clearRect(0,0,cv.width,cv.height);
  }
  requestAnimationFrame(tick);
}

function render(d){
  let html='';
  // 제목
  html+='<div class="title">'+esc(d.title||'대진표')+'</div>';
  // 팀원 명단 버튼 (팀전이고 members 데이터 있을 때)
  if(d.isTeam && d.members && (d.members.blue||[]).length){
    const bn=esc(d.teamBlue||'청팀'), wn=esc(d.teamWhite||'홍팀');
    const bList=(d.members.blue||[]).map(n=>esc(n)).join(' · ');
    const wList=(d.members.red||[]).map(n=>esc(n)).join(' · ');
    html+='<div class="roster-bar">'
      +'<button class="roster-btn t1side" onclick="toggleRoster(\'blue\')">'
        +'<span class="roster-dot-b">●</span> '+bn+' 명단</button>'
      +'<button class="roster-btn t2side" onclick="toggleRoster(\'red\')">'
        +'<span class="roster-dot-r">●</span> '+wn+' 명단</button>'
      +'</div>'
      +'<div class="roster-panel" id="roster-blue" style="display:none">'
        +'<div class="roster-panel-title"><span class="brief-dot-b">●</span> '+bn+'</div>'
        +'<div class="roster-names">'+bList+'</div></div>'
      +'<div class="roster-panel" id="roster-red" style="display:none">'
        +'<div class="roster-panel-title"><span class="brief-dot-r">●</span> '+wn+'</div>'
        +'<div class="roster-names">'+wList+'</div></div>';
  }

  // 팀 스코어 (팀전일 때)
  if(d.isTeam){
    const bW=d.blueWins||0, wW=d.whiteWins||0;
    html+=buildGauge(bW, wW, d.teamBlue, d.teamWhite);
    let lead='', cls='';
    if(bW>wW){ lead='🔵 '+esc(d.teamBlue||'청 팀')+' '+(bW-wW)+'점 차로 앞서는 중!'; cls=''; }
    else if(wW>bW){ lead='🔴 '+esc(d.teamWhite||'홍 팀')+' '+(wW-bW)+'점 차로 앞서는 중!'; cls='white-lead'; }
    else { lead='⚖️ 동점! 접전 중'; cls='tie'; }
    html+='<div class="ts-lead '+cls+'">'+lead+'</div>';
  }

  // 진행 현황
  const matches=d.matches||[];
  const byRound={};
  matches.forEach(m=>{(byRound[m.round]=byRound[m.round]||[]).push(m);});
  const rounds=Object.keys(byRound).map(Number).sort((a,b)=>a-b);
  const totalR=rounds.length;
  let doneR=0;
  rounds.forEach(r=>{ if(byRound[r].every(m=>m.win)) doneR++; });
  html+='<div class="progress">📊 '+totalR+'라운드 중 '+doneR+'라운드 완료'
    + (d.pointSystem? ' · '+d.pointSystem+'점 경기':'') +'</div>';

  // ── 경기 종료 축하 연출 ──
  const allDone = totalR>0 && matches.length>0 && matches.every(m=>m.win);
  if(allDone){ html+=buildFinale(matches, d); }

  html+=buildBriefing(matches, d);
  html+=buildRanking(matches, d);
  html+=buildStreaks(matches);

  // 라운드별 경기
  rounds.forEach(r=>{
    const isCur=(r===d.currentRound);
    html+='<div class="round'+(isCur?' cur':'')+'" id="round_'+r+'">';
    html+='<div class="round-h"><span class="round-badge">ROUND '+r+'</span>'
      +(isCur?'<span class="now">● 진행중</span>':'')+'<span class="round-line"></span></div>';
    byRound[r].sort((a,b)=>a.court-b.court).forEach(m=>{
      const tc=m.type==='여복'?'women':m.type==='남복'?'men':'mixed';
      const t1win=m.win==='t1', t2win=m.win==='t2';
      html+='<div class="match '+tc+'">';
      html+='<div class="m-top"><span class="m-type '+tc+'">'+esc(m.type)+(m.isFiller?'(보완)':'')+'</span>'
        +'<span class="m-court">코트 '+m.court+'</span></div>';
      // 청팀/홍팀 배경색 구분 + 라벨
      const _t1label=d.isTeam?(esc(d.teamBlue||'청팀')):'1팀';
      const _t2label=d.isTeam?(esc(d.teamWhite||'홍팀')):'2팀';
      html+='<div class="m-body">';
      html+='<div class="m-team t1side'+(t1win?' win':'')+'">'        +'<div class="m-team-label">'+_t1label+'</div>'        +'<div class="m-player">'+esc(m.t1[0])+' <span class="m-grade">'+esc(m.t1g?m.t1g[0]:'')+"</span></div>"        +'<div class="m-player">'+esc(m.t1[1])+' <span class="m-grade">'+esc(m.t1g?m.t1g[1]:'')+"</span></div>"        +(t1win?'<span class="win-stamp">승리</span>':'')+"</div>";      html+='<div class="m-vs">VS</div>';      html+='<div class="m-team t2side'+(t2win?' win':'')+'">'        +'<div class="m-team-label">'+_t2label+'</div>'        +'<div class="m-player">'+esc(m.t2[0])+' <span class="m-grade">'+esc(m.t2g?m.t2g[0]:'')+"</span></div>"        +'<div class="m-player">'+esc(m.t2[1])+' <span class="m-grade">'+esc(m.t2g?m.t2g[1]:'')+"</span></div>"        +(t2win?'<span class="win-stamp">승리</span>':'')+"</div>";      html+='</div></div>';

    });
    html+='</div>';
  });

  content.innerHTML=html;
  // 바로가기 버튼 표시
  window._viewCurRound = d.currentRound||null;
  window._viewHasScore = !!d.isTeam;
  const fab=document.getElementById('jumpFab');
  const jbNow=document.getElementById('jbNow');
  const jbScore=document.getElementById('jbScore');
  if(fab){
    let any=false;
    if(window._viewCurRound){ jbNow.style.display='flex'; any=true; } else { jbNow.style.display='none'; }
    if(window._viewHasScore){ jbScore.style.display='flex'; any=true; } else { jbScore.style.display='none'; }
    fab.style.display = any?'flex':'none';
  }
}

function toggleRoster(team){
  const el=document.getElementById('roster-'+team);
  if(!el) return;
  el.style.display=el.style.display==='none'?'block':'none';
}

function jumpToCurrent(){
  const r=window._viewCurRound;
  if(r==null) return;
  const el=document.getElementById('round_'+r);
  if(el) el.scrollIntoView({behavior:'smooth',block:'start'});
}
function jumpToScore(){
  window.scrollTo({top:0,behavior:'smooth'});
}
