<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>🏸 콕매치 실시간 현황</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<style>
:root{
  --bg:#f4f6fb;--sur:#ffffff;--sur2:#f0f3f9;
  --bdr:#e4e9f2;--bdr2:#cdd4e3;
  --txt:#1e2430;--dim:#6b7585;--dim2:#9ea8b8;
  --bl:#5b8def;--bl-deep:#4270cc;--bl-soft:#e8f0fd;--bl-softbdr:#c8d9f8;
  --red:#e05a58;--amber:#c48a20;
  --women-soft:#fdeef4;--men-soft:#e8f0fd;--mixed-soft:#ede9f8;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--txt);
  padding:16px;max-width:600px;margin:0 auto;-webkit-text-size-adjust:100%;
  font-size:16px;line-height:1.5;}

/* ── 헤더 ── */
.head{display:flex;align-items:center;gap:8px;padding:6px 2px 16px;}
.head h1{font-size:1.2rem;font-weight:900;}
.live-dot{width:10px;height:10px;border-radius:50%;background:var(--red);animation:pulse 1.4s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.live-label{font-size:.76rem;color:var(--red);font-weight:700;}
.status{text-align:center;padding:44px 16px;color:var(--dim);font-size:1rem;}
.title{font-size:1.05rem;font-weight:800;text-align:center;margin-bottom:14px;color:var(--txt);}

/* ── 팀 스코어 ── */
.team-score{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:10px;
  background:var(--sur);border:1px solid var(--bdr);border-radius:18px;
  padding:20px 16px;margin-bottom:14px;box-shadow:0 2px 8px rgba(45,55,75,.07);}
.ts-side{text-align:center;}
.ts-name{font-size:.88rem;font-weight:700;color:var(--dim);margin-bottom:4px;}
.ts-wins{font-size:2.6rem;font-weight:900;line-height:1;}
.ts-blue .ts-wins{color:var(--bl-deep);}
.ts-white .ts-wins{color:var(--amber);}
.ts-vs{font-size:.9rem;font-weight:700;color:var(--dim2);}
.ts-lead{text-align:center;font-size:.84rem;font-weight:700;margin-bottom:14px;
  padding:9px;border-radius:10px;background:var(--bl-soft);color:var(--bl-deep);}
.ts-lead.tie{background:var(--sur2);color:var(--dim);}
.ts-lead.white-lead{background:#fdf5e4;color:var(--amber);}

/* ── 게이지 ── */
.gauge-wrap{display:flex;flex-direction:column;align-items:center;margin-bottom:14px;}
.gauge-sec{animation:secIn .6s ease-out both;}
@keyframes secIn{from{opacity:0;}to{opacity:1;}}
.gauge-arc{animation:arcIn .6s ease-out both;}
@keyframes arcIn{from{opacity:0;}to{opacity:1;}}
.needle-grp{transform-origin:150px 158px;transform:rotate(0deg);}
.gauge-svg{width:100%;max-width:300px;height:auto;}
.gauge-needle{transform-origin:140px 130px;}
.gauge-needle.settle{transition:transform .9s cubic-bezier(.34,1.56,.64,1);}
.gauge-title{font-size:.76rem;font-weight:700;color:var(--dim);letter-spacing:1px;margin-bottom:2px;}
.gauge-caption{font-size:.86rem;font-weight:800;color:var(--dim);margin-top:4px;}
.gauge-caption.blue{color:var(--bl-deep);}
.gauge-caption.red{color:#c73230;}

/* ── 브리핑 ── */
.briefing{background:linear-gradient(135deg,#eef4ff,#f5efff);
  border:1.5px solid #d4e3fb;border-radius:18px;padding:18px;margin-bottom:14px;}
.brief-title{font-size:.72rem;font-weight:800;color:var(--dim);letter-spacing:1.8px;margin-bottom:10px;text-transform:uppercase;}
.brief-situation{font-size:1.15rem;font-weight:900;color:var(--txt);margin-bottom:12px;letter-spacing:-.3px;}
.brief-row{font-size:.88rem;font-weight:600;color:var(--txt);padding:4px 0;display:flex;align-items:center;gap:7px;}
.brief-dot-b{color:var(--bl);font-size:.65rem;}
.brief-dot-r{color:var(--red);font-size:.65rem;}
.brief-momentum{margin-top:10px;font-size:.82rem;font-weight:700;color:var(--dim);
  border-top:1px solid var(--bdr);padding-top:10px;}
.brief-b{color:var(--bl-deep);}
.brief-r{color:var(--red);}
.brief-says{margin-top:12px;border-top:1px solid var(--bdr);padding-top:12px;display:flex;flex-direction:column;gap:8px;}
.brief-say{font-size:.84rem;font-weight:600;color:var(--txt);line-height:1.6;padding:9px 12px;border-radius:10px;}
.brief-say.t1side{background:#e8f0fd;border-left:3px solid var(--bl);}
.brief-say.t2side{background:#fdf0ef;border-left:3px solid var(--red);}

/* ── 명언 카드 (파스텔 그라디언트로 통일) ── */
.quote-card{background:linear-gradient(135deg,#e8eeff,#f0e8ff);
  border:1.5px solid #d0d8f8;border-radius:16px;padding:16px 20px;
  margin-bottom:14px;text-align:center;}
.quote-text{font-size:.95rem;font-weight:700;color:#3a3060;line-height:1.7;letter-spacing:-.2px;}
.quote-src{font-size:.72rem;color:#7a7aaa;margin-top:7px;font-weight:600;}

/* ── 진행 정보 ── */
.progress{text-align:center;font-size:.82rem;color:var(--dim);
  background:var(--sur2);border:1px solid var(--bdr);border-radius:10px;
  padding:9px;margin-bottom:14px;}

/* ── MVP 카드 ── */
.mvp-card{position:relative;overflow:hidden;
  background:linear-gradient(135deg,#fbbf24 0%,#f59e0b 55%,#d97706 100%);
  border:none;border-radius:18px;padding:18px 16px;margin-bottom:14px;
  text-align:center;box-shadow:0 6px 20px rgba(217,119,6,.25);}
.mvp-card::after{content:"";position:absolute;top:-40%;left:-30%;width:60%;height:180%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.3),transparent);
  transform:rotate(20deg);animation:mvpShine 3.6s ease-in-out infinite;}
@keyframes mvpShine{0%{left:-40%;}60%,100%{left:130%;}}
.mvp-label{position:relative;z-index:1;font-size:.78rem;font-weight:800;
  color:#fff7e6;letter-spacing:.3px;margin-bottom:10px;text-shadow:0 1px 2px rgba(146,64,14,.4);}
.mvp-names{position:relative;z-index:1;display:flex;flex-wrap:wrap;gap:6px;justify-content:center;}
.mvp-chip{display:inline-block;background:rgba(255,255,255,.96);color:#92580a;
  font-size:1.05rem;font-weight:800;letter-spacing:-.3px;padding:6px 16px;border-radius:999px;
  box-shadow:0 2px 5px rgba(146,64,14,.15);}
.mvp-chip.solo{font-size:1.5rem;padding:8px 24px;}
.mvp-sub{position:relative;z-index:1;font-size:.82rem;font-weight:700;
  color:#fffbeb;margin-top:12px;text-shadow:0 1px 2px rgba(146,64,14,.3);}

/* ── 경기 종료 축하 ── */
.finale{position:relative;overflow:hidden;
  background:linear-gradient(135deg,#6366f1 0%,#8b5cf6 50%,#ec4899 100%);
  border-radius:20px;padding:28px 18px;margin-bottom:16px;text-align:center;
  box-shadow:0 10px 30px rgba(124,58,237,.3);animation:finalePop .6s cubic-bezier(.18,1.25,.4,1);}
@keyframes finalePop{0%{transform:scale(.88);opacity:0;}100%{transform:scale(1);opacity:1;}}
.finale-crown{font-size:2.5rem;line-height:1;margin-bottom:8px;animation:crownBob 2s ease-in-out infinite;}
@keyframes crownBob{0%,100%{transform:translateY(0) rotate(-4deg);}50%{transform:translateY(-6px) rotate(4deg);}}
.finale-label{font-size:.84rem;font-weight:800;letter-spacing:2px;color:rgba(255,255,255,.9);margin-bottom:8px;}
.finale-title{font-size:1.7rem;font-weight:900;color:#fff;letter-spacing:-.5px;line-height:1.2;
  text-shadow:0 2px 8px rgba(76,29,149,.4);}
.finale-sub{font-size:.88rem;font-weight:700;color:rgba(255,255,255,.92);margin-top:10px;}
#confetti{position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:9999;}

/* ── 연승 스트릭 ── */
.streak-box{display:flex;flex-wrap:wrap;gap:7px;justify-content:center;margin-bottom:14px;}
.streak-chip{display:inline-flex;align-items:center;gap:5px;
  background:linear-gradient(135deg,#ffece0,#ffd9c2);border:1px solid #f5c4a8;
  border-radius:999px;padding:7px 14px;font-size:.84rem;font-weight:700;color:#c2511e;
  box-shadow:0 1px 4px rgba(224,100,40,.12);}
.streak-fire{font-size:1rem;animation:flicker 1.1s ease-in-out infinite;}
@keyframes flicker{0%,100%{transform:scale(1);opacity:1;}50%{transform:scale(1.18);opacity:.85;}}
.streak-n{font-weight:900;}
.streak-hot{background:linear-gradient(135deg,#ffe0e0,#ffc2c2);border-color:#f5a8a8;color:#d8362f;}

/* ── 순위 ── */
.rank-box{background:var(--sur);border:1px solid var(--bdr);border-radius:16px;padding:6px;margin-bottom:14px;}
.rank-title{font-size:.74rem;font-weight:700;color:var(--dim);text-transform:uppercase;
  letter-spacing:1px;padding:10px 12px 7px;}
.rank-row{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;font-size:.9rem;}
.rank-row.top{background:var(--bl-soft);}
.rank-medal{min-width:24px;text-align:center;font-weight:700;font-size:.95rem;color:var(--dim);}
.rank-name{flex:1;font-weight:700;font-size:.95rem;}
.rank-rec{font-size:.8rem;color:var(--dim);}
.rank-rate{font-weight:800;color:var(--bl-deep);min-width:44px;text-align:right;font-size:.9rem;}

/* ── 명단 ── */
.roster-bar{display:flex;gap:8px;margin-bottom:10px;}
.roster-btn{flex:1;padding:10px 12px;border:1.5px solid var(--bdr);border-radius:12px;
  background:var(--sur);font-family:'Noto Sans KR',sans-serif;
  font-size:.84rem;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:6px;justify-content:center;}
.roster-btn.t1side{border-color:#b3cef7;color:var(--bl-deep);background:var(--bl-soft);}
.roster-btn.t2side{border-color:#f7c3c2;color:var(--red);background:#fdf0ef;}
.roster-panel{background:var(--sur);border:1.5px solid var(--bdr);border-radius:12px;padding:14px;margin-bottom:10px;}
.roster-panel-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.roster-panel-title{font-size:.82rem;font-weight:800;color:var(--dim);letter-spacing:.5px;}
.roster-sort-btns{display:flex;gap:4px;}
.rsort-btn{font-family:'Noto Sans KR',sans-serif;font-size:.72rem;font-weight:700;
  padding:4px 10px;border:1.5px solid var(--bdr);border-radius:7px;background:var(--sur2);color:var(--dim);cursor:pointer;}
.rsort-btn.active{background:var(--bl);color:#fff;border-color:var(--bl);}
.roster-names{font-size:.86rem;line-height:1.3;}
.roster-row{display:flex;align-items:center;gap:8px;padding:8px 2px;border-bottom:1px solid var(--bdr);}
.roster-row:last-child{border-bottom:none;}
.roster-gender{font-size:.86rem;font-weight:900;min-width:20px;text-align:center;}
.roster-m{color:var(--bl);}
.roster-f{color:var(--red);}
.roster-name{flex:1;font-size:.95rem;font-weight:700;color:var(--txt);}
.roster-lv{font-size:.76rem;font-weight:800;color:var(--dim);background:var(--sur2);
  border:1px solid var(--bdr);border-radius:6px;padding:2px 8px;white-space:nowrap;}
.roster-divider{height:1px;background:var(--bdr2);margin:6px 0;}
.roster-dot-b{color:var(--bl);font-size:.72rem;}
.roster-dot-r{color:var(--red);font-size:.72rem;}

/* ── 라운드 블록 ── */
.round{margin-bottom:22px;}
.round-h{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.round-badge{font-weight:900;font-size:.9rem;letter-spacing:1px;
  padding:6px 18px;border-radius:9px;background:var(--sur2);color:var(--dim);border:1px solid var(--bdr);}
.round-line{flex:1;height:1.5px;background:var(--bdr);}
.now{font-size:.72rem;font-weight:800;color:#fff;background:var(--red);
  border-radius:999px;padding:3px 12px;animation:pulse 1.4s ease-in-out infinite;letter-spacing:.3px;}

/* 진행 중 라운드 — 네온 테두리만, 배경은 파스텔 유지 */
.round.cur{border-radius:18px;padding:16px 14px;
  margin-left:-14px;margin-right:-14px;
  background:#fff;
  border:2.5px solid #ff4d6d;
  box-shadow:0 0 0 1px rgba(255,77,109,.12),
             0 0 16px rgba(255,77,109,.35),
             0 0 36px rgba(255,77,109,.15);
  animation:neonPulse 2.2s ease-in-out infinite;}
@keyframes neonPulse{
  0%,100%{box-shadow:0 0 0 1px rgba(255,77,109,.12),0 0 12px rgba(255,77,109,.3),0 0 24px rgba(255,77,109,.1);}
  50%{box-shadow:0 0 0 1px rgba(255,77,109,.2),0 0 22px rgba(255,77,109,.55),0 0 44px rgba(255,77,109,.25);}
}
.round.cur .round-badge{background:#ff4d6d;color:#fff;border-color:#ff4d6d;
  box-shadow:0 0 8px rgba(255,77,109,.6);letter-spacing:1px;}
.round.cur .now{background:#ff4d6d;}
/* 진행 중엔 일반 텍스트 색 그대로 — 가독성 최우선 */
.round.cur .round-line{background:rgba(255,77,109,.25);}

/* ── 경기 카드 ── */
.match{background:var(--sur);border:1px solid var(--bdr);border-radius:14px;
  padding:14px;margin-bottom:10px;box-shadow:0 1px 4px rgba(45,55,75,.05);}
.match.women{border-left:4px solid #d99bb0;}
.match.men{border-left:4px solid #7fa8f2;}
.match.mixed{border-left:4px solid #b3a0db;}
.m-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.m-type{font-size:.76rem;font-weight:700;padding:3px 11px;border-radius:7px;}
.m-type.women{background:var(--women-soft);color:#b06b85;}
.m-type.men{background:var(--men-soft);color:var(--bl-deep);}
.m-type.mixed{background:var(--mixed-soft);color:#7d68b0;}
.m-court{font-size:1rem;font-weight:900;color:var(--txt);background:var(--sur2);
  border:2px solid var(--bdr2);border-radius:9px;padding:4px 14px;
  letter-spacing:.5px;min-width:62px;text-align:center;}
.m-body{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px;}
.m-team{padding:11px;border-radius:11px;}
.m-team.t1side{background:#e8f0fd;}
.m-team.t2side{background:#fdf0ef;}
.m-team.t1side.win{background:#d0e2ff;border:2px solid var(--bl);}
.m-team.t2side.win{background:#fddcdb;border:2px solid var(--red);}
.m-team{position:relative;overflow:hidden;}
/* 선수 이름: 4~50대 가독성 최우선 */
.m-player{font-size:1.12rem;font-weight:900;line-height:1.75;color:var(--txt);letter-spacing:-.3px;}
.m-grade{font-size:.72rem;color:var(--dim2);font-weight:500;}
.m-vs{font-size:.76rem;font-weight:700;color:var(--dim2);text-align:center;padding:0 2px;}
.m-team-label{font-size:.72rem;font-weight:900;letter-spacing:.8px;margin-bottom:5px;opacity:.8;}
.m-team.t1side .m-team-label{color:var(--bl-deep);}
.m-team.t2side .m-team-label{color:var(--red);}
.win-stamp{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) rotate(-14deg);
  border:3px solid #e0463f;color:#e0463f;border-radius:10px;
  font-family:'Noto Sans KR',sans-serif;font-weight:900;font-size:1.15rem;letter-spacing:2px;
  padding:3px 12px;background:rgba(255,255,255,.4);
  box-shadow:0 0 0 2px rgba(224,70,63,.12);
  pointer-events:none;white-space:nowrap;
  animation:stampIn .35s cubic-bezier(.2,1.3,.6,1) both;}
@keyframes stampIn{0%{transform:translate(-50%,-50%) rotate(-14deg) scale(2.2);opacity:0;}
  60%{opacity:1;}100%{transform:translate(-50%,-50%) rotate(-14deg) scale(1);opacity:1;}}

/* ── 푸터 ── */
.foot{text-align:center;font-size:.72rem;color:var(--dim2);padding:18px 0 14px;line-height:2;}
.foot b{color:var(--txt);font-weight:700;}
.refresh-note{text-align:center;font-size:.72rem;color:var(--dim);margin-top:4px;}

/* ── 플로팅 바로가기 ── */
.jump-fab{position:fixed;right:16px;z-index:900;display:flex;flex-direction:column;gap:8px;}
.jump-fab.bottom{bottom:20px;}
.jb{display:flex;align-items:center;gap:6px;padding:11px 16px;border:none;
  border-radius:999px;font-family:'Noto Sans KR',sans-serif;font-weight:700;
  font-size:.82rem;cursor:pointer;box-shadow:0 3px 14px rgba(45,55,75,.18);}
.jb-now{background:#fdeceb;color:#c94040;}
.jb-score{background:var(--bl);color:#fff;}
.jb:active{transform:scale(.96);}
</style>
</head>
<body>
<div class="head">
  <span>🏸</span>
  <h1>콕매치 실시간 현황</h1>
  <span class="live-dot"></span>
  <span class="live-label">LIVE</span>
</div>

  <div class="status">현황을 불러오는 중…</div>
</div>

  <button class="jb jb-now" id="jbNow" onclick="jumpToCurrent()" style="display:none">🔴 진행중</button>
  <button class="jb jb-score" id="jbScore" onclick="jumpToScore()" style="display:none">📊 점수</button>
</div>

</div>

<script>
const FB_CONFIG = {
  apiKey: "AIzaSyAo2AfN_ekzelCe17x1s6CVqCet0Hsq4II",
  authDomain: "kokmatch-23b31.firebaseapp.com",
  databaseURL: "https://kokmatch-23b31-default-rtdb.firebaseio.com",
  projectId: "kokmatch-23b31",

  messagingSenderId: "57349245242",
  appId: "1:57349245242:web:6c0ac6f4cc131b44192803"
};

function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

const params=new URLSearchParams(location.search);
const liveId=(params.get('id')||'').toUpperCase();

const content=document.getElementById('content');

if(!liveId){
  content.innerHTML='<div class="status">잘못된 링크입니다.<br>대회 ID가 없습니다.</div>';
} else {
  let app, db;
  try{
    app=firebase.initializeApp(FB_CONFIG);
    db=firebase.database();
  }catch(e){
    content.innerHTML='<div class="status">서버 연결에 실패했습니다.<br>잠시 후 다시 시도해주세요.</div>';
  }
  if(db){
    db.ref('live/'+liveId).on('value', snap=>{
      const data=snap.val();
      if(!data){
        content.innerHTML='<div class="status">진행 중인 현황이 없습니다.<br>대회가 아직 시작되지 않았거나 종료되었습니다.</div>';
        return;
      }
      render(data);
    }, err=>{
      content.innerHTML='<div class="status">데이터를 불러올 수 없습니다.<br>'+esc(err.message)+'</div>';
    });
  }
}

function buildGauge(bW, wW, blueName, whiteName){
  var tot=bW+wW;
  var bShare = tot>0 ? bW/tot : 0.5;
  var cx=150, cy=162, r=100, sw=58;
  var A0=150, A1=390;
  var span=A1-A0;
  function pt(deg, rad){ var a=deg*Math.PI/180; return [cx+rad*Math.cos(a), cy+rad*Math.sin(a)]; }
  function arcPath(d0, d1, rad){ var p0=pt(d0,rad), p1=pt(d1,rad); var large=(d1-d0)>180?1:0; return "M "+p0[0].toFixed(1)+" "+p0[1].toFixed(1)+" A "+rad+" "+rad+" 0 "+large+" 1 "+p1[0].toFixed(1)+" "+p1[1].toFixed(1); }
  var boundary=A0+span*bShare;
  var ticks='';
  var nT=16;

function buildStreaks(matches){
  const ordered=[...matches].filter(m=>m.win).sort((a,b)=>(a.round-b.round)||(a.court-b.court));
  const streak={};
  ordered.forEach(m=>{
    const winners=m.win==='t1'?[m.t1[0],m.t1[1]]:[m.t2[0],m.t2[1]];
    const losers=m.win==='t1'?[m.t2[0],m.t2[1]]:[m.t1[0],m.t1[1]];
    winners.forEach(n=>{ if(n)streak[n]=(streak[n]||0)+1; });
    losers.forEach(n=>{ if(n)streak[n]=0; });
  });
  const hot=Object.entries(streak).filter(([n,c])=>c>=2).sort((a,b)=>b[1]-a[1]);
  if(!hot.length) return '';
  let html='<div class="streak-box">';
  hot.forEach(([n,c])=>{
    const isHot=c>=3;
    html+='<span class="streak-chip'+(isHot?' streak-hot':'')+'"><span class="streak-fire">🔥</span>'+esc(n)+' <span class="streak-n">'+c+'연승</span></span>';
  });
  html+='</div>';
  return html;
}

function buildBriefing(matches, d){
  if(!d.isTeam) return '';
  const bW=d.blueWins||0, wW=d.whiteWins||0;
  const total=bW+wW;
  const bn=esc(d.teamBlue||'청팀'), wn=esc(d.teamWhite||'홍팀');
  if(total===0) return '';

  // 팀별 선수 승/패 집계
  const bPlayers={}, rPlayers={};
  const members=d.members||{};
  const bNames=new Set(members.blue||[]);
  const rNames=new Set(members.red||[]);

  matches.filter(m=>m.win).forEach(m=>{
    const winners=m.win==='t1'?[m.t1[0],m.t1[1]]:[m.t2[0],m.t2[1]];
    const losers=m.win==='t1'?[m.t2[0],m.t2[1]]:[m.t1[0],m.t1[1]];
    [...winners,...losers].forEach((n,i)=>{
      const isWin=i<2;
      const tgt=bNames.has(n)?bPlayers:rPlayers;
      if(!tgt[n])tgt[n]={w:0,l:0};
      isWin?tgt[n].w++:tgt[n].l++;
    });
  });

  // 각 팀 MVP (승리 많은 선수)
  const topPlayer=(stat)=>{
    const arr=Object.entries(stat).filter(([,s])=>s.w>0).sort((a,b)=>b[1].w-a[1].w||a[1].l-b[1].l);
    return arr.length?{name:arr[0][0],...arr[0][1]}:null;
  };
  const bTop=topPlayer(bPlayers), rTop=topPlayer(rPlayers);

  // 최근 3경기 흐름
  const recent=[...matches].filter(m=>m.win).sort((a,b)=>(b.round-a.round)||(b.court-a.court)).slice(0,5);
  let bRec=0,rRec=0;
  recent.forEach(m=>{
    const isT1blue=bNames.has(m.t1[0])||bNames.has(m.t1[1]);
    const winner=m.win==='t1'?isT1blue:!isT1blue;
    winner?bRec++:rRec++;
  });

  const gap=Math.abs(bW-wW);
  let situation='';
  if(bW>wW) situation=`<b class="brief-b">${bn}</b> ${gap}승 앞서는 중`;
  else if(wW>bW) situation=`<b class="brief-r">${wn}</b> ${gap}승 앞서는 중`;
  else situation='동점 팽팽';

  const momentum=bRec>rRec?`<b class="brief-b">${bn}</b> 최근 흐름 우세`
    :rRec>bRec?`<b class="brief-r">${wn}</b> 최근 흐름 우세`:'양팀 팽팽히 맞서는 중';

  let bLine=`${bn} ${bW}승 ${wW>bW?'(추격 중)':bW>wW?'(선두)':'(동점)'}`;
  let rLine=`${wn} ${wW}승 ${bW>wW?'(추격 중)':wW>bW?'(선두)':'(동점)'}`;
  if(bTop) bLine+=` · 에이스 ${esc(bTop.name)} ${bTop.w}승`;
  if(rTop) rLine+=` · 에이스 ${esc(rTop.name)} ${rTop.w}승`;

  const bDiff=bW-wW, rDiff=wW-bW;
  const bSay=_getTeamLine('blue',bDiff,bRec,bTop?bTop.name:null);
  const rSay=_getTeamLine('red',rDiff,rRec,rTop?rTop.name:null);
  const q=_getQuote(matches);
  return '<div class="briefing">'
    +'<div class="brief-title">📢 지금 현황</div>'
    +'<div class="brief-situation">'+situation+'</div>'
    +'<div class="brief-row brief-row-b"><span class="brief-dot-b">●</span>'+bLine+'</div>'
    +'<div class="brief-row brief-row-r"><span class="brief-dot-r">●</span>'+rLine+'</div>'
    +'<div class="brief-momentum">'+momentum+'</div>'
    +'<div class="brief-says">'
      +'<div class="brief-say t1side">🔵 '+esc(d.teamBlue||'청팀')+' 한마디 — "'+bSay+'"</div>'
      +'<div class="brief-say t2side">🔴 '+esc(d.teamWhite||'홍팀')+' 한마디 — "'+rSay+'"</div>'
    +'</div>'
    +'</div>'
    +'<div class="quote-card">'
      +'<div class="quote-text">"'+q.t+'"</div>'
      +'<div class="quote-src">— '+q.s+'</div>'
    +'</div>';
}

function buildRanking(matches, d){
  const goal=(typeof d.gamesPerPlayer==='number'&&d.gamesPerPlayer>0)?d.gamesPerPlayer:4;
  const stat={}; const played={};
  const ordered=[...matches].sort((a,b)=>(a.round-b.round)||(a.court-b.court));
  ordered.forEach(m=>{
    const four=[m.t1[0],m.t1[1],m.t2[0],m.t2[1]];
    four.forEach(n=>{ if(!n)return; if(!stat[n])stat[n]={name:n,w:0,l:0}; if(played[n]==null)played[n]=0; });
    const within={};
    four.forEach(n=>{ if(!n)return; played[n]++; within[n]=played[n]<=goal; });
    if(!m.win) return;
    const winners=m.win==='t1'?[m.t1[0],m.t1[1]]:[m.t2[0],m.t2[1]];
    const losers=m.win==='t1'?[m.t2[0],m.t2[1]]:[m.t1[0],m.t1[1]];
    winners.forEach(n=>{ if(n&&within[n])stat[n].w++; });
    losers.forEach(n=>{ if(n&&within[n])stat[n].l++; });
  });
  const arr=Object.values(stat).filter(s=>(s.w+s.l)>0);
  if(arr.length<2) return '';
  const rate=s=>(s.w+s.l)>0?s.w/(s.w+s.l):0;
  const rateStr=s=>(s.w+s.l)>0?Math.round(rate(s)*100)+'%':'—';
  const byRate=[...arr].sort((a,b)=>rate(b)-rate(a)||b.w-a.w);
  const byWin=[...arr].sort((a,b)=>b.w-a.w||rate(b)-rate(a));
  const sameRank=(a,b)=>a&&b&&a.w===b.w&&Math.round(rate(a)*100)===Math.round(rate(b)*100);
  const top=byRate[0];
  const mvps=byRate.filter(s=>sameRank(s,top));
  let html='';
  const _solo=mvps.length===1?' solo':'';
  html+='<div class="mvp-card"><div class="mvp-label">🏆 실시간 MVP'+(mvps.length>1?' · 공동 '+mvps.length+'명':'')+'</div>'
    +'<div class="mvp-names">'+mvps.map(s=>'<span class="mvp-chip'+_solo+'">'+esc(s.name)+'</span>').join('')+'</div>'
    +'<div class="mvp-sub">'+top.w+'승 '+top.l+'패 · 승률 '+rateStr(top)+'</div></div>';
  html+='<div class="rank-box"><div class="rank-title">전적 순위</div>';
  let rankNum=0,prev=null;
  byWin.slice(0,5).forEach((s,i)=>{
    if(prev===null||!sameRank(s,prev))rankNum=i+1; prev=s;
    const medal=rankNum===1?'🥇':rankNum===2?'🥈':rankNum===3?'🥉':rankNum;
    html+='<div class="rank-row'+(rankNum<=3?' top':'')+'">'
      +'<span class="rank-medal">'+medal+'</span>'
      +'<span class="rank-name">'+esc(s.name)+'</span>'
      +'<span class="rank-rec">'+s.w+'승 '+s.l+'패</span>'
      +'<span class="rank-rate">'+rateStr(s)+'</span></div>';
  });
  html+='</div>';
  return html;
}

function buildFinale(matches, d){
  let label='🎉 경기 종료', title='', sub='수고하셨습니다!';
  if(d.isTeam){
    const bW=d.blueWins||0, wW=d.whiteWins||0;
    if(bW>wW){ title='🔵 '+esc(d.teamBlue||'청 팀')+' 우승!'; sub=bW+' : '+wW+' 승리'; }
    else if(wW>bW){ title='🔴 '+esc(d.teamWhite||'홍 팀')+' 우승!'; sub=wW+' : '+bW+' 승리'; }
    else { title='⚖️ 무승부!'; sub=bW+' : '+wW+' 동점'; }
  } else {
    const goal=(typeof d.gamesPerPlayer==='number'&&d.gamesPerPlayer>0)?d.gamesPerPlayer:4;
    const stat={}, played={};
    [...matches].sort((a,b)=>(a.round-b.round)||(a.court-b.court)).forEach(m=>{
      const four=[m.t1[0],m.t1[1],m.t2[0],m.t2[1]];
      four.forEach(n=>{ if(!n)return; if(!stat[n])stat[n]={name:n,w:0,l:0}; if(played[n]==null)played[n]=0; });
      const within={};
      four.forEach(n=>{ if(!n)return; played[n]++; within[n]=played[n]<=goal; });
      if(!m.win)return;
      const W=m.win==='t1'?[m.t1[0],m.t1[1]]:[m.t2[0],m.t2[1]];
      const L=m.win==='t1'?[m.t2[0],m.t2[1]]:[m.t1[0],m.t1[1]];
      W.forEach(n=>{ if(n&&within[n])stat[n].w++; });
      L.forEach(n=>{ if(n&&within[n])stat[n].l++; });
    });
    const arr=Object.values(stat).filter(s=>(s.w+s.l)>0);
    if(arr.length){
      const rate=s=>s.w/(s.w+s.l);
      const byRate=[...arr].sort((a,b)=>rate(b)-rate(a)||b.w-a.w);
      const top=byRate[0];
      const champs=byRate.filter(s=>s.w===top.w&&Math.round(rate(s)*100)===Math.round(rate(top)*100));
      title='🏆 '+champs.map(s=>esc(s.name)).join(' · ')+(champs.length>1?' 공동 우승!':' 우승!');
      sub=top.w+'승 '+top.l+'패 · 승률 '+Math.round(rate(top)*100)+'%';
    } else { title='🏸 모든 경기 완료!'; }
  }
  if(!window._finaleFired){ window._finaleFired=true; setTimeout(fireConfetti, 350); }
  return '<div class="finale"><div class="finale-crown">👑</div>'
    +'<div class="finale-label">'+label+'</div>'
    +'<div class="finale-title">'+title+'</div>'
    +'<div class="finale-sub">'+sub+'</div></div>';
}

  let cv=document.getElementById('confetti');
  if(!cv){ cv=document.createElement('canvas'); cv.id='confetti'; document.body.appendChild(cv); }
  const ctx=cv.getContext('2d');
  const dpr=window.devicePixelRatio||1;
  cv.width=innerWidth*dpr; cv.height=innerHeight*dpr;
  const colors=['#fbbf24','#f59e0b','#ef4444','#ec4899','#8b5cf6','#6366f1','#22c55e','#3b82f6'];
  const N=140, parts=[];
  for(let i=0;i<N;i++){
    parts.push({ x:innerWidth*(.2+Math.random()*.6)*dpr, y:-20*dpr,
      vx:(Math.random()-.5)*5*dpr, vy:(2+Math.random()*4)*dpr, g:.12*dpr,
      w:(6+Math.random()*6)*dpr, h:(8+Math.random()*8)*dpr,
      rot:Math.random()*Math.PI, vr:(Math.random()-.5)*.3,
      c:colors[(Math.random()*colors.length)|0], life:0, max:120+Math.random()*60 });
  }
  let frame=0;
  function tick(){
    ctx.clearRect(0,0,cv.width,cv.height); let alive=false;
    parts.forEach(p=>{ if(p.life>p.max)return; alive=true;
      p.life++; p.vy+=p.g; p.x+=p.vx; p.y+=p.vy; p.rot+=p.vr;
      const a=Math.max(0,1-(p.life/p.max));
      ctx.save(); ctx.globalAlpha=a; ctx.translate(p.x,p.y); ctx.rotate(p.rot);
      ctx.fillStyle=p.c; ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h); ctx.restore(); });
    frame++;
    if(alive&&frame<260) requestAnimationFrame(tick);
    else ctx.clearRect(0,0,cv.width,cv.height);
  }
  requestAnimationFrame(tick);
}

function render(d){
  let html='';
  // 제목
  html+='<div class="title">'+esc(d.title||'대진표')+'</div>';
  // 팀원 명단 버튼 (팀전이고 members 데이터 있을 때)
  if(d.isTeam && d.members && (d.members.blue||[]).length){
    const bn=esc(d.teamBlue||'청팀'), wn=esc(d.teamWhite||'홍팀');
    // 명단: 성별구분 + 급수 + 이름/급수 정렬
    const _mkRoster=(list,sortBy)=>{
      const arr=(list||[]).map(x=>typeof x==='string'?{n:x,l:0,g:''}:x);
      const males=[...arr].filter(p=>p.g==='M').sort((a,b)=>sortBy==='level'?(b.l-a.l||a.n.localeCompare(b.n,'ko')):a.n.localeCompare(b.n,'ko'));
      const females=[...arr].filter(p=>p.g!=='M').sort((a,b)=>sortBy==='level'?(b.l-a.l||a.n.localeCompare(b.n,'ko')):a.n.localeCompare(b.n,'ko'));
      const row=p=>'<div class="roster-row"><span class="roster-gender '+(p.g==='M'?'roster-m':'roster-f')+'">'+(p.g==='M'?'♂':'♀')+'</span><span class="roster-name">'+esc(p.n)+'</span><span class="roster-lv">Lv'+p.l+'</span></div>';
      return males.map(row).join('')+(males.length&&females.length?'<div class="roster-divider"></div>':'')+females.map(row).join('');
    };
    window._rosterData=d.members;
    html+='<div class="roster-bar">'
      +'<button class="roster-btn t1side" onclick="toggleRoster(\'blue\')">'+'<span class="roster-dot-b">●</span> '+bn+' 명단</button>'
      +'<button class="roster-btn t2side" onclick="toggleRoster(\'red\')">'+'<span class="roster-dot-r">●</span> '+wn+' 명단</button>'
      +'</div>'
      +'<div class="roster-panel" id="roster-blue" style="display:none">'
        +'<div class="roster-panel-head"><div class="roster-panel-title"><span class="roster-dot-b">●</span> '+bn+'</div>'
        +'<div class="roster-sort-btns">'
          +'<button class="rsort-btn active" onclick="rosterSort(\'blue\',\'level\',this)">급수순</button>'
          +'<button class="rsort-btn" onclick="rosterSort(\'blue\',\'name\',this)">이름순</button>'
        +'</div></div>'
        +'<div class="roster-names" id="roster-names-blue">'+_mkRoster(d.members.blue,'level')+'</div></div>'
      +'<div class="roster-panel" id="roster-red" style="display:none">'
        +'<div class="roster-panel-head"><div class="roster-panel-title"><span class="roster-dot-r">●</span> '+wn+'</div>'
        +'<div class="roster-sort-btns">'
          +'<button class="rsort-btn active" onclick="rosterSort(\'red\',\'level\',this)">급수순</button>'
          +'<button class="rsort-btn" onclick="rosterSort(\'red\',\'name\',this)">이름순</button>'
        +'</div></div>'
        +'<div class="roster-names" id="roster-names-red">'+_mkRoster(d.members.red,'level')+'</div></div>';
  }

  // 팀 스코어 (팀전일 때)
  if(d.isTeam){
    const bW=d.blueWins||0, wW=d.whiteWins||0;
    html+=buildGauge(bW, wW, d.teamBlue, d.teamWhite);
    let lead='', cls='';
    if(bW>wW){ lead='🔵 '+esc(d.teamBlue||'청 팀')+' '+(bW-wW)+'점 차로 앞서는 중!'; cls=''; }
    else if(wW>bW){ lead='🔴 '+esc(d.teamWhite||'홍 팀')+' '+(wW-bW)+'점 차로 앞서는 중!'; cls='white-lead'; }
    else { lead='⚖️ 동점! 접전 중'; cls='tie'; }
    html+='<div class="ts-lead '+cls+'">'+lead+'</div>';
  }

  // 진행 현황
  const matches=d.matches||[];
  const byRound={};
  matches.forEach(m=>{(byRound[m.round]=byRound[m.round]||[]).push(m);});
  const rounds=Object.keys(byRound).map(Number).sort((a,b)=>a-b);
  const totalR=rounds.length;
  let doneR=0;
  rounds.forEach(r=>{ if(byRound[r].every(m=>m.win)) doneR++; });
  html+='<div class="progress">📊 '+totalR+'라운드 중 '+doneR+'라운드 완료'
    + (d.pointSystem? ' · '+d.pointSystem+'점 경기':'') +'</div>';

  // ── 경기 종료 축하 연출 ──
  const allDone = totalR>0 && matches.length>0 && matches.every(m=>m.win);
  if(allDone){ html+=buildFinale(matches, d); }

  html+=buildBriefing(matches, d);
  html+=buildRanking(matches, d);
  html+=buildStreaks(matches);

  // 라운드별 경기
  rounds.forEach(r=>{
    const isCur=(r===d.currentRound);
    html+='<div class="round'+(isCur?' cur':'')+'" id="round_'+r+'">';
    html+='<div class="round-h"><span class="round-badge">ROUND '+r+'</span>'
      +(isCur?'<span class="now">● 진행중</span>':'')+'<span class="round-line"></span></div>';
    byRound[r].sort((a,b)=>a.court-b.court).forEach(m=>{
      const tc=m.type==='여복'?'women':m.type==='남복'?'men':'mixed';
      const t1win=m.win==='t1', t2win=m.win==='t2';
      html+='<div class="match '+tc+'">';
      html+='<div class="m-top"><span class="m-type '+tc+'">'+esc(m.type)+(m.isFiller?'(보완)':'')+'</span>'
        +'<span class="m-court">코트 '+m.court+'</span></div>';
      // 청팀/홍팀 배경색 구분 + 라벨
      const _t1label=d.isTeam?(esc(d.teamBlue||'청팀')):'1팀';
      const _t2label=d.isTeam?(esc(d.teamWhite||'홍팀')):'2팀';
      html+='<div class="m-body">';
      html+='<div class="m-team t1side'+(t1win?' win':'')+'">'        +'<div class="m-team-label">'+_t1label+'</div>'        +'<div class="m-player">'+esc(m.t1[0])+' <span class="m-grade">'+esc(m.t1g?m.t1g[0]:'')+"</span></div>"        +'<div class="m-player">'+esc(m.t1[1])+' <span class="m-grade">'+esc(m.t1g?m.t1g[1]:'')+"</span></div>"        +(t1win?'<span class="win-stamp">승리</span>':'')+"</div>";      html+='<div class="m-vs">VS</div>';      html+='<div class="m-team t2side'+(t2win?' win':'')+'">'        +'<div class="m-team-label">'+_t2label+'</div>'        +'<div class="m-player">'+esc(m.t2[0])+' <span class="m-grade">'+esc(m.t2g?m.t2g[0]:'')+"</span></div>"        +'<div class="m-player">'+esc(m.t2[1])+' <span class="m-grade">'+esc(m.t2g?m.t2g[1]:'')+"</span></div>"        +(t2win?'<span class="win-stamp">승리</span>':'')+"</div>";      html+='</div></div>';

    });
    html+='</div>';
  });

  content.innerHTML=html;
  // 바로가기 버튼 표시
  window._viewCurRound = d.currentRound||null;
  window._viewHasScore = !!d.isTeam;
  const fab=document.getElementById('jumpFab');
  const jbNow=document.getElementById('jbNow');
  const jbScore=document.getElementById('jbScore');
  if(fab){
    let any=false;
    if(window._viewCurRound){ jbNow.style.display='flex'; any=true; } else { jbNow.style.display='none'; }
    if(window._viewHasScore){ jbScore.style.display='flex'; any=true; } else { jbScore.style.display='none'; }
    fab.style.display = any?'flex':'none';
  }
}

function toggleRoster(team){
  const el=document.getElementById('roster-'+team);
  if(!el) return;
  el.style.display=el.style.display==='none'?'block':'none';
}

function rosterSort(team,sortBy,btn){
  if(!window._rosterData) return;
  const list=window._rosterData[team==='blue'?'blue':'red']||[];
  const arr=(list||[]).map(x=>typeof x==='string'?{n:x,l:0,g:''}:x);
  const males=[...arr].filter(p=>p.g==='M').sort((a,b)=>sortBy==='level'?(b.l-a.l||a.n.localeCompare(b.n,'ko')):a.n.localeCompare(b.n,'ko'));
  const females=[...arr].filter(p=>p.g!=='M').sort((a,b)=>sortBy==='level'?(b.l-a.l||a.n.localeCompare(b.n,'ko')):a.n.localeCompare(b.n,'ko'));
  const row=p=>'<div class="roster-row"><span class="roster-gender '+(p.g==='M'?'roster-m':'roster-f')+'">'+(p.g==='M'?'♂':'♀')+'</span><span class="roster-name">'+p.n+'</span><span class="roster-lv">Lv'+p.l+'</span></div>';
  const html=males.map(row).join('')+(males.length&&females.length?'<div class="roster-divider"></div>':'')+females.map(row).join('');
  const el=document.getElementById('roster-names-'+team);
  if(el) el.innerHTML=html;
  // 버튼 active 상태
  const wrap=btn.closest('.roster-sort-btns');
  if(wrap) wrap.querySelectorAll('.rsort-btn').forEach(b=>b.classList.toggle('active',b===btn));
}

function jumpToCurrent(){
  const r=window._viewCurRound;
  if(r==null) return;
  const el=document.getElementById('round_'+r);
  if(el) el.scrollIntoView({behavior:'smooth',block:'start'});
}
function jumpToScore(){
  window.scrollTo({top:0,behavior:'smooth'});
}
</script>
